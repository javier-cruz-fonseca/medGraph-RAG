  therapeutic_indication: Miglustat Dipharma is indicated for the oral treatment of
    adult patients with mild to moderate type 1 Gaucher disease. Miglustat Dipharma
    may be used only in the treatment of patients for whom enzyme replacement therapy
    is unsuitable. Miglustat Dipharma is indicated for the treatment of progressive
    neurological manifestations in adult patients and paediatric patients with Niemann-Pick
    type C disease.
