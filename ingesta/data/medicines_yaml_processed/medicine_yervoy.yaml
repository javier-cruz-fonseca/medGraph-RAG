  therapeutic_indication: MelanomaYervoy as monotherapy or combination with nivolumab
    is indicated for the treatment of advanced (unresectable or metastatic) melanoma
    in adults and adolescents 12 years of age and older (see section 4.4).&nbsp; Yervoy
    in combination with nivolumab is indicated for the treatment of advanced (unresectable
    or metastatic) melanoma in adults. Relative to nivolumab monotherapy, an increase
    in progression-free survival (PFS) and overall survival (OS) for the combination
    of nivolumab with ipilimumab is established only in patients with low tumour PD-L1
    expression (see sections 4.4 and 5.1). Renal cell carcinoma (RCC) Yervoy in combination
    with nivolumab is indicated for the first-line treatment of adult patients with
    intermediate/poor-risk advanced renal cell carcinoma (see section 5.1). Non-small
    cell lung cancer (NSCLC) Yervoy in combination with nivolumab and 2 cycles of
    platinum-based chemotherapy is indicated for the first-line treatment of metastatic
    non-small cell lung cancer in adults whose tumours have no sensitising EGFR mutation
    or ALK translocation. Malignant pleural mesothelioma (MPM) Yervoy in combination
    with nivolumab is indicated for the first-line treatment of adult patients with
    unresectable malignant pleural mesothelioma. Mismatch repair deficient (dMMR)
    or microsatellite instability-high (MSI-H) colorectal cancer (CRC) Yervoy in combination
    with nivolumab is indicated for the treatment of adult patients with mismatch
    repair deficient or microsatellite instability high colorectal cancer in the following
    settings:- first-line treatment of unresectable or metastatic colorectal cancer;-
    treatment of metastatic colorectal cancer after prior fluoropyrimidine based combination
    chemotherapy (see section 5.1). Oesophageal squamous cell carcinoma (OSCC) Yervoy
    in combination with nivolumab is indicated for the first-line treatment of adult
    patients with unresectable advanced, recurrent or metastatic oesophageal squamous
    cell carcinoma with tumour cell PD-L1 expression ≥ 1%.Hepatocellular carcinoma
    (HCC)Yervoy in combination with nivolumab is indicated for the first line treatment
    of adult patients with unresectable or advanced hepatocellular carcinoma.
