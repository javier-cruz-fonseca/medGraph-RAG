  therapeutic_indication: Delstrigo is indicated for the treatment of adults infected
    with HIV 1 without past or present evidence of resistance to the NNRTI class,
    lamivudine, or tenofovir. Delstrigo is also indicated for the treatment of adolescents
    aged 12 years and older weighing at least 35 kg who are infected with HIV-1 without
    past or present evidence of resistance to the NNRTI class, lamivudine, or tenofovir
    and who have experienced toxicities which preclude the use of other regimens that
    do not contain tenofovir disoproxil.
