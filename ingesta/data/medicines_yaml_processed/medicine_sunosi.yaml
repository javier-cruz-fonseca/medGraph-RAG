  therapeutic_indication: Sunosi is indicated to improve wakefulness and reduce excessive
    daytime sleepiness in adult patients with narcolepsy (with or without cataplexy).
    Sunosi is indicated to improve wakefulness and reduce excessive daytime sleepiness
    (EDS) in adult patients with obstructive sleep apnoea (OSA) whose EDS has not
    been satisfactorily treated by primary OSA therapy, such as continuous positive
    airway pressure (CPAP).
