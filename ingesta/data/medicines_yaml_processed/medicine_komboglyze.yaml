  therapeutic_indication: Komboglyze is indicated as an adjunct to diet and exercise
    to improve glycaemic control in adult patients aged 18 years and older with type-2
    diabetes mellitus inadequately controlled on their maximally tolerated dose of
    metformin alone or those already being treated with the combination of saxagliptin
    and metformin as separate tablets. Komboglyze is also indicated in combination
    with insulin (i.e. triple combination therapy) as an adjunct to diet and exercise
    to improve glycaemic control in adult patients aged 18 years and older with type-2
    diabetes mellitus when insulin and metformin alone do not provide adequate glycaemic
    control.
