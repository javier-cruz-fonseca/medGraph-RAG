  therapeutic_indication: Levetiracetam Hospira is indicated as monotherapy in the
    treatment of partial onset seizures with or without secondary generalisation in
    adults and adolescents from 16 years of age with newly diagnosed epilepsy. Levetiracetam
    Hospira is indicated as adjunctive therapy  in the treatment of partial onset
    seizures with or without secondary generalisation in adults, adolescents and children
    from 4 years of age with epilepsy. in the treatment of myoclonic seizures in adults
    and adolescents from 12 years of age with Juvenile Myoclonic Epilepsy. in the
    treatment of primary generalised tonic-clonic seizures in adults and adolescents
    from 12 years of age with Idiopathic Generalised Epilepsy.  Levetiracetam Hospira
    concentrate is an alternative for patients when oral administration is temporarily
    not feasible.
