  therapeutic_indication: 'Powder for concentrate for solution for infusion: Cresemba
    is indicated in patients from 1 year of age and older for the treatment of  invasive
    aspergillosis mucormycosis in patients for whom amphotericin B is inappropriate
    (see sections 4.4 and 5.1)  Consideration should be given to official guidance
    on the appropriate use of antifungal agents. Hard capsules: Cresemba hard capsules
    are indicated in adults and in paediatric patients from 6 years of age for the
    treatment of  invasive aspergillosis mucormycosis in patients for whom amphotericin
    B is inappropriate (see sections 4.4 and 5.1)  Consideration should be given to
    official guidance on the appropriate use of antifungal agents. Cresemba 40 mg
    hard capsules are intended to be used for paediatric patients.'
