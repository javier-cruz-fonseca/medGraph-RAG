  therapeutic_indication: Emtricitabine/Rilpivirine/Tenofovir Alafenamide Viatris
    is indicated for the treatment of adults and adolescents (aged 12 years and older
    with body weight at least 35 kg) infected with human immunodeficiency virus-1
    (HIV-1) without known mutations associated with resistance to the non-nucleoside
    reverse transcriptase inhibitor (NNRTI) class, tenofovir or emtricitabine and
    with a viral load ≤ 100 000 HIV 1 RNA copies/mL&nbsp;(see sections 4.2, 4.4 and
    5.1).&nbsp;
