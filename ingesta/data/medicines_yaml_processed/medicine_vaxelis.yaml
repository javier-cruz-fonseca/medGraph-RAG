  therapeutic_indication: Vaxelis (DTaP-HB-IPV-Hib) is indicated for primary and booster
    vaccination in infants and toddlers from the age of 6 weeks, against diphtheria,
    tetanus, pertussis, hepatitis B, poliomyelitis and invasive diseases caused by
    Haemophilus influenzae type b (Hib). The use of Vaxelis should be in accordance
    with official recommendations.
