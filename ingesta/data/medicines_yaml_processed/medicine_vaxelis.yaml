  inn_common_name: diphtheria, tetanus, pertussis (acellular, component), hepatitis
    B (rDNA), poliomyelitis (inactivated) and Haemophilus type b conjugate vaccine
    (adsorbed)
  active_substance: 'Diphtheria toxoid;tetanus toxoid;Bordetella pertussis antigens:
    pertussis toxoid, filamentous haemagglutinin, pertactin, fimbriae Types 2 and
    3;hepatitis B surface antigen produced in yeast cells;poliovirus (inactivated):
    type 1 (Mahoney), type 2 (MEF-1), type 3 (Saukett) produced in Vero cells/ Haemophilus
    influenzae type b polysaccharide (polyribosylribitol phosphate) conjugated to
    meningococcal protein.'
