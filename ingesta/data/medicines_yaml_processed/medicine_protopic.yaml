  therapeutic_indication: Flare treatment Adults and adolescents (16 years of age
    and above) Treatment of moderate to severe atopic dermatitis in adults who are
    not adequately responsive to or are intolerant of conventional therapies such
    as topical corticosteroids. Children (two years of age and above) Treatment of
    moderate to severe atopic dermatitis in children (two years of age and above)
    who failed to respond adequately to conventional therapies such as topical corticosteroids.
    Maintenance treatment Maintenance treatment of moderate to severe atopic dermatitis
    for the prevention of flares and the prolongation of flare-free intervals in patients
    experiencing a high frequency of disease exacerbations (i.e. occurring four or
    more times per year) who have had an initial response to a maximum of six weeks
    treatment of twice daily tacrolimus ointment (lesions cleared, almost cleared
    or mildly affected).
