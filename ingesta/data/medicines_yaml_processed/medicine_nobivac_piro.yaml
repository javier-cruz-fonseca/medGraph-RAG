  therapeutic_indication: 'For active immunisation of dogs of six months of age or
    older against Babesia canis to reduce the severity of clinical signs associated
    with acute babesiosis (B. canis) and anaemia as measured by packed cell volume.
    Onset of immunity: Three weeks after the basic vaccination course. Duration of
    immunity: Six months after the last (re-)vaccination.'
