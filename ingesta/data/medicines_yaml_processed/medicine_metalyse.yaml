  therapeutic_indication: Metalyse is indicated for the thrombolytic treatment of
    suspected myocardial infarction with persistent ST elevation or recent left-bundle-branch
    block within six hours after the onset of acute-myocardial-infarction symptoms.
    Metalyse is indicated in adults for the thrombolytic treatment of acute ischaemic
    stroke (AIS) within 4.5 hours from last known well and after exclusion of intracranial
    haemorrhage.
