  therapeutic_indication: ORLAAM is indicated for the substitution maintenance treatment
    of opiate addiction in adults previously treated with methadone, as part of a
    comprehensive treatment plan including medical, social and psychological care.
    ORLAAM should be administered under the supervision of physicians with experience
    in addiction treatment and whenever practicable, in centres specialising in the
    treatment of drug addiction. ORLAAM is not intended for take home use.
