  therapeutic_indication: TEPADINA is indicated, in combination with other chemotherapy
    medicinal products:- with or without total body irradiation (TBI), as conditioning
    treatment prior to allogeneic or autologous haematopoietic progenitor cell transplantation
    (HPCT) in haematological diseases in adult and paediatric patients;- when high
    dose chemotherapy with HPCT support is appropriate for the treatment of solid
    tumours in adult and paediatric patients.
