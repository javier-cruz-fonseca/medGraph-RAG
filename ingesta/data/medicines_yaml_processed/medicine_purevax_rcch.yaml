name: Purevax RCCh
basic_information:
  category: Veterinary
  ema_product_number: EMEA/V/C/000092
  medicine_status: Lapsed
  opinion_status: ''
  inn_common_name: vaccine against feline viral rhinotracheitis, feline calicivirosis
    and feline Chlamydophila infections
  active_substance: attenuated feline rhinotracheitis herpesvirus (FHV F2 strain);inactivated
    feline calicivirosis antigens (FCV 431 and G1 strains);attenuated Chlamydophila
    felis (905 strain)
therapeutic_information:
  therapeutic_area_mesh: ''
  atc_code_human: ''
  atcvet_code_veterinary: QI06AH
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: 'Active immunisation of cats aged 8 weeks and older:  against
    feline viral rhinotracheitis to reduce clinical signs; against calicivirus infection
    to reduce clinical signs and excretion; against Chlamydophila felis infection
    to reduce clinical signs.  Onsets of immunity have been demonstrated 1 week after
    primary vaccination course for rhinotracheitis, calicivirus and Chlamydophila
    felis components. The duration of immunity is 1 year after the last (re-)vaccination.'
