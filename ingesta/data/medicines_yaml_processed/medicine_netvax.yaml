name: Netvax
basic_information:
  category: Veterinary
  ema_product_number: EMEA/V/C/000134
  medicine_status: Withdrawn
  opinion_status: ''
  inn_common_name: adjuvanted vaccine against necrotic enteritis of chickens due to
    Clostridium perfringens
  active_substance: Clostridium-perfringens-type-A alpha toxoid
therapeutic_information:
  therapeutic_area_mesh: ''
  atc_code_human: ''
  atcvet_code_veterinary: QI01AB08
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: 'For the active immunisation of chickens to provide passive
    immunisation against necrotic enteritis to their progeny, during the laying period.
    To reduce mortality and the incidence and severity of lesions caused by Clostridium-perfringens-type-A-induced
    necrotic enteritis. Efficacy was demonstrated by challenge of chicks approximately
    three weeks after hatching. The onset of passive transfer of immunity: 6 weeks
    following completion of the vaccination procedure. The duration of passive transfer
    of immunity: 51 weeks following completion of the vaccination procedure.'
