  therapeutic_indication: 'Arsenic trioxide medac is indicated for induction of remission,
    and consolidation in adult patients with:  Newly diagnosed low-to-intermediate
    risk acute promyelocytic leukaemia (APL) (white blood cell count, ? 10 x 10³/?l)
    in combination with all-trans-retinoic acid (ATRA) Relapsed/refractory APL (previous
    treatment should have included a retinoid and chemotherapy) characterised by the
    presence of the t(15;17) translocation and/or the presence of the pro-myelocytic
    leukaemia/retinoic-acid-receptor-alpha (PML/RAR?) gene.  The response rate of
    other acute myelogenous leukaemia subtypes to arsenic trioxide has not been examined.'
