  therapeutic_indication: Treatment of osteoporosis in postmenopausal women and in
    men at increased risk of fractures. In postmenopausal women denosumab significantly
    reduces the risk of vertebral, non-vertebral and hip fractures. Treatment of bone
    loss associated with hormone ablation in men with prostate cancer at increased
    risk of fractures (see section 5.1). In men with prostate cancer receiving hormone
    ablation, denosumab significantly reduces the risk of vertebral fractures. Treatment
    of bone loss associated with long-term systemic glucocorticoid therapy in adult
    patients at increased risk of fracture (see section 5.1).
