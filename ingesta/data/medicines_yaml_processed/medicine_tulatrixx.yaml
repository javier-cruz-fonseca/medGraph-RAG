  therapeutic_indication: 'Cattle: Treatment and metaphylaxis of of bovine respiratory
    disease (BRD) associated with Mannheimia haemolytica, Pasteurella multocida, Histophilus
    somni and Mycoplasma bovis sensitive to tulathromycin. The presence of the disease
    in the herd should be established before metaphylactic treatment. Treatment of
    infectious bovine keratoconjunctivitis (IBK) associated with Moraxella bovis sensitive
    to tulathromycin. Pigs: Treatment and metaphylaxis of swine respiratory disease
    (SRD) associated with Actinobacillus pleuropneumoniae, Pasteurella multocida,
    Mycoplasma hyopneumoniae, Haemophilus parasuis and Bordetella bronchiseptica sensitive
    to tulathromycin. The presence of the disease in the herd should be established
    before metaphylactic treatment. Draxxin should only be used if pigs are expected
    to develop the disease within 2-3 days. Sheep: Treatment of the early stages of
    infectious pododermatitis (foot rot) associated with virulent Dichelobacter nodosus
    requiring systemic treatment.'
