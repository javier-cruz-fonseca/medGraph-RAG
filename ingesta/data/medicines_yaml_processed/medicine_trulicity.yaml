  therapeutic_indication: Trulicity is indicated for the treatment of patients 10
    years and above&nbsp;with insufficiently controlled type&nbsp;2 diabetes mellitus
    as an adjunct to diet and exercise  as monotherapy when metformin is considered
    inappropriate due to intolerance or contraindications in addition to other medicinal
    products for the treatment of diabetes.  For study results with respect to combinations,
    effects on glycaemic control and cardiovascular events, and the populations studied,
    see sections 4.4, 4.5 and 5.1.
