  therapeutic_indication: Angiox is indicated as an anticoagulant in adult patients
    undergoing percutaneous coronary intervention (PCI), including patients with ST-segment-elevation
    myocardial infarction (STEMI) undergoing primary PCI. Angiox is also indicated
    for the treatment of adult patients with unstable angina / non-ST-segment-elevation
    myocardial infarction (UA / NSTEMI) planned for urgent or early intervention.
    Angiox should be administered with aspirin and clopidogrel.
