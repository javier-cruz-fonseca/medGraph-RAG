  therapeutic_indication: Hodgkin lymphomaAdcetris is indicated for adult patients
    with previously untreated CD30+ Stage IV Hodgkin lymphoma (HL) in combination
    with doxorubicin, vinblastine and dacarbazine (AVD).Adcetris is indicated for
    adult patients with previously untreated CD30+ Stage IIB with risk factors, Stage
    III or Stage IV HL in combination with etoposide, cyclophosphamide, doxorubicin,
    dacarbazine, dexamethasone (BrECADD).Adcetris is indicated for the treatment of
    adult patients with CD30+ HL at increased risk of relapse or progression following
    autologous stem cell transplant (ASCT).Adcetris is indicated for the treatment
    of adult patients with relapsed or refractory CD30+ Hodgkin lymphoma (HL):- following
    ASCT, or- following at least two prior therapies when ASCT or multi-agent chemotherapy
    is not a treatment option.Systemic anaplastic large cell lymphomaAdcetris in combination
    with cyclophosphamide, doxorubicin and prednisone (CHP) is indicated for adult
    patients with previously untreated systemic anaplastic large cell lymphoma (sALCL).
    Adcetris is indicated for the treatment of adult patients with relapsed or refractory
    sALCL.Cutaneous T-cell lymphomaAdcetris is indicated for the treatment of adult
    patients with CD30+ cutaneous T-cell lymphoma (CTCL) after at least 1 prior systemic
    therapy.
