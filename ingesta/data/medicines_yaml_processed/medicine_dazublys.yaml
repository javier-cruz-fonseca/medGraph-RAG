  therapeutic_indication: 'Breast cancer Metastatic breast cancer Dazublys is indicated
    for the treatment of adult patients with HER2-positive metastatic breast cancer
    (MBC):  as monotherapy for the treatment of those patients who have received at
    least two chemotherapy regimens for their metastatic disease. Prior chemotherapy
    must have included at least an anthracycline and a taxane unless patients are
    unsuitable for these treatments. Hormone receptor-positive patients must also
    have failed hormonal therapy unless patients are unsuitable for these treatments.
    in combination with paclitaxel for the treatment of those patients who have not
    received chemotherapy for their metastatic disease and for whom an anthracycline
    is not suitable. in combination with docetaxel for the treatment of those patients
    who have not received chemotherapy for their metastatic disease. in combination
    with an aromatase inhibitor for the treatment of postmenopausal patients with
    hormone-receptor-positive MBC, not previously treated with trastuzumab.  Early
    breast cancer Dazublys is indicated for the treatment of adult patients with HER2-positive
    early breast cancer. (EBC).  following surgery, chemotherapy (neoadjuvant or adjuvant)
    and radiotherapy (if applicable) (see section 5.1). following adjuvant chemotherapy
    with doxorubicin and cyclophosphamide in combination with paclitaxel or docetaxel.
    in combination with adjuvant chemotherapy consisting of docetaxel and carboplatin.
    in combination with neoadjuvant chemotherapy followed by adjuvant Dazublys therapy
    for locally advanced (including inflammatory) disease or tumors&gt;&nbsp;2&nbsp;cm
    in diameter (see sections 4.4 and 5.1).  Dazublys should only be used in patients
    with metastatic or early breast cancer whose tumors have either HER2 overexpression
    or HER2 gene amplification as determined by an accurate and validated assay (see
    sections 4.4 and 5.1). Metastatic gastric cancer Dazublys in combination with
    capecitabine or 5-fluorouracil and cisplatin is indicated for the treatment of
    adult patients with HER2 positive metastatic adenocarcinoma of the stomach or
    gastro-esophageal junction who have not received prior anti-cancer treatment for
    their metastatic disease. Dazublys should only be used in patients with metastatic
    gastric cancer (MGC) whose tumors have HER2 overexpression as defined by IHC2+
    and a confirmatory SISH or FISH result or by an IHC 3+ result. Accurate and validated
    assay methods should be used (see sections 4.4 and 5.1).'
