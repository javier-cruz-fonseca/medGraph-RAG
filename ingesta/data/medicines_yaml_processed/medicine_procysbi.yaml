  therapeutic_indication: Procysbi is indicated for the treatment of proven nephropathic
    cystinosis. Cysteamine reduces cystine accumulation in some cells (e.g. leukocytes,
    muscle and liver cells) of nephropathic cystinosis patients and, when treatment
    is started early, it delays the development of renal failure.
