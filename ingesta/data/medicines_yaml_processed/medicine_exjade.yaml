  therapeutic_indication: 'Exjade is indicated for the treatment of chronic iron overload
    due to frequent blood transfusions (? 7 ml/kg/month of packed red blood cells)
    in patients with beta thalassaemia major aged six years and older. Exjade is also
    indicated for the treatment of chronic iron overload due to blood transfusions
    when deferoxamine therapy is contraindicated or inadequate in the following patient
    groups:  in patients with beta thalassaemia major with iron overload due to frequent
    blood transfusions (? 7 ml/kg/month of packed red blood cells) aged two to five
    years; in patients with beta thalassaemia major with iron overload due to infrequent
    blood transfusions (&lt; 7 ml/kg/month of packed red blood cells) aged two years
    and older; in patients with other anaemias aged two years and older.  Exjade is
    also indicated for the treatment of chronic iron overload requiring chelation
    therapy when deferoxamine therapy is contraindicated or inadequate in patients
    with non-transfusion-dependent thalassaemia syndromes aged 10 years and older.'
