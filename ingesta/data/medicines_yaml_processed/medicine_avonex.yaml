  therapeutic_indication: 'Avonex is indicated for the treatment of:  patients diagnosed
    with relapsing multiple sclerosis (MS). In clinical trials, this was characterised
    by two or more acute exacerbations (relapses) in the previous three years without
    evidence of continuous progression between relapses; Avonex slows the progression
    of disability and decreases the frequency of relapses; patients with a single
    demyelinating event with an active inflammatory process, if it is severe enough
    to warrant treatment with intravenous corticosteroids, if alternative diagnoses
    have been excluded, and if they are determined to be at high risk of developing
    clinically definite MS.  Avonex should be discontinued in patients who develop
    progressive MS.'
