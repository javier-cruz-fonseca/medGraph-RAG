  therapeutic_indication: Stocrin is indicated in antiviral combination treatment
    of human-immunodeficiency-virus-1 (HIV-1)-infected adults, adolescents and children
    three years of age and older. Stocrin has not been adequately studied in patients
    with advanced HIV disease, namely in patients with CD4 counts &lt; 50 cells/mm3,
    or after failure of protease-inhibitor (PI)-containing regimens. Although cross-resistance
    of efavirenz with PIs has not been documented, there are at present insufficient
    data on the efficacy of subsequent use of PI-based combination therapy after failure
    of regimens containing Stocrin.
