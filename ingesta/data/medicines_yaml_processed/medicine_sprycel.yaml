  therapeutic_indication: 'Sprycel is indicated for the treatment of paediatric patients
    with:  newly diagnosed Philadelphia chromosome-positive chronic myelogenous leukaemia
    in chronic phase (Ph+ CML CP) or Ph+ CML CP resistant or intolerant to prior therapy
    including imatinib. newly diagnosed Ph+ acute lymphoblastic leukaemia (ALL) in
    combination with chemotherapy.  Sprycel is indicated for the treatment of adult
    patients with:  newly diagnosed Philadelphia-chromosome-positive (Ph+) chronic
    myelogenous leukaemia (CML) in the chronic phase; chronic, accelerated or blast
    phase CML with resistance or intolerance to prior therapy including imatinib mesilate;
    Ph+ acute lymphoblastic leukaemia (ALL) and lymphoid blast CML with resistance
    or intolerance to prior therapy.  Sprycel is indicated for the treatment of paediatric
    patients with:  newly diagnosed Ph+ CML in chronic phase (Ph+ CML-CP) or Ph+ CML-CP
    resistant or intolerant to prior therapy including imatinib.'
