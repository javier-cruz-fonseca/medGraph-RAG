  therapeutic_indication: Crohn’s Disease  Steqeyma is indicated for the treatment
    of adult patients with moderately to severely active Crohn’s disease who have
    had an inadequate response with, lost response to, or were intolerant to either
    conventional therapy or a TNFα antagonist or have medical contraindications to
    such therapies.  Plaque psoriasis  Steqeyma is indicated for the treatment of
    moderate to severe plaque psoriasis in adults who failed to respond to, or who
    have a contraindication to, or are intolerant to other systemic therapies including
    ciclosporin, methotrexate (MTX) or PUVA (psoralen and ultraviolet A) (see section
    5.1).  Paediatric plaque psoriasis  Steqeyma is indicated for the treatment of
    moderate to severe plaque psoriasis in children and adolescent patients from the
    age of 6 years and older, who are inadequately controlled by, or are intolerant
    to, other systemic therapies or phototherapies (see section 5.1).  Psoriatic arthritis
    (PsA)  Steqeyma, alone or in combination with MTX, is indicated for the treatment
    of active psoriatic arthritis in adult patients when the response to previous
    non-biological disease-modifying anti-rheumatic drug (DMARD) therapy has been
    inadequate (see section 5.1).
