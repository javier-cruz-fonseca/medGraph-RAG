  therapeutic_indication: 'Tikosyn is a Class III antiarrhythmic agent that is indicated
    for the following:  Conversion of persistent atrial fibrillation or atrial flutter
    to normal sinus rhythm in patients in whom cardioversion by electrical means is
    not appropriate and in whom the duration of the arrhythmic episode is less than
    6 months (see section 5.1). Maintenance of sinus rhythm (after conversion) in
    patients with persistent atrial fibrillation or atrial flutter. Because TIKOSYN
    can cause ventricular arrhythmias, it should be reserved for patients in whom
    atrial fibrillation/atrial flutter is highly symptomatic and in whom other antiarrhythmic
    therapy is not appropriate.  Dofetilide has not been shown to be effective in
    patients with paroxysmal atrial arrhythmias (including paroxysmal atrial fibrillation).'
