  therapeutic_indication: Zefylti is indicated for the reduction in the duration of
    neutropenia and the incidence of febrile neutropenia in patients treated with
    established cytotoxic chemotherapy for malignancy (with the exception of chronic
    myeloid leukaemia and myelodysplastic syndromes) and for the reduction in the
    duration of neutropenia in patients undergoing myeloablative therapy followed
    by bone marrow transplantation considered to be at increased risk of prolonged
    severe neutropenia.
