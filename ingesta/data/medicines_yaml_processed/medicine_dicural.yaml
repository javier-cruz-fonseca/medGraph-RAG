  therapeutic_indication: 'Chickens: for the treatment of chronic respiratory infections
    caused by sensitive strains of Escherichia coli and Mycoplasma gallisepticum.
    Turkeys:  For the treatment of chronic respiratory infections caused by sensitive
    strains of Escherichia coli and Mycoplasma gallisepticum. Also for the treatment
    of infections caused by Pasteurella multocida.  Dogs:  For the treatment of acute
    uncomplicated urinary-tract infections caused by Escherichia coli or Staphylococcus
    spp. and superficial pyoderma caused by Staphylococcus intermedius.  Cattle:  For
    the treatment of bovine respiratory disease (shipping fever, calf pneumonia) caused
    by single or mixed infections with Pasteurella haemolytica, Pasteurella multocida
    and / or Mycoplasma spp.'
