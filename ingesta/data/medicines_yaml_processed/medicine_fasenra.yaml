  therapeutic_indication: AsthmaFasenra is indicated as an add on maintenance treatment
    in adult patients with severe eosinophilic asthma inadequately controlled despite
    high-dose inhaled corticosteroids plus long acting β agonists (see section 5.1).Eosinophilic
    granulomatosis with polyangiitis (EGPA)Fasenra is indicated as an add-on treatment
    for adult patients with relapsing or refractory eosinophilic granulomatosis with
    polyangiitis (see section 5.1).
