  therapeutic_indication: 'Treatment of HIV-1 infection:  Emtricitabine/Tenofovir
    disoproxil Mylan is indicated in antiretroviral combination therapy for the treatment
    of HIV-1 infected adults (see section 5.1). Emtricitabine/Tenofovir disoproxil
    Mylan is also indicated for the treatment of HIV-1 infected adolescents, with
    NRTI resistance or toxicities precluding the use of first line agents, (see sections
    4.2, 4.4 and 5.1).  Pre-exposure prophylaxis (PrEP):  Emtricitabine/Tenofovir
    disoproxil Mylan is indicated in combination with safer sex practices for pre-exposure
    prophylaxis to reduce the risk of sexually acquired HIV-1 infection in adults
    and adolescents at high risk (see sections 4.2, 4.4 and 5.1).'
