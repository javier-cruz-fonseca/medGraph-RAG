  therapeutic_indication: Zirabev in combination with fluoropyrimidine-based chemotherapy
    is indicated for treatment of adult patients with metastatic carcinoma of the
    colon or rectum. Zirabev in combination with paclitaxel is indicated for first-line
    treatment of adult patients with metastatic breast cancer. For further information
    as to human epidermal growth factor receptor 2 (HER2) status. Zirabev, in addition
    to platinum-based chemotherapy, is indicated for first-line treatment of adult
    patients with unresectable advanced, metastatic or recurrent non-small cell lung
    cancer other than predominantly squamous cell histology. Zirabev in combination
    with interferon alfa-2a is indicated for first line treatment of adult patients
    with advanced and/or metastatic renal cell cancer. Zirabev, in combination with
    paclitaxel and cisplatin or, alternatively, paclitaxel and topotecan in patients
    who cannot receive platinum therapy, is indicated for the treatment of adult patients
    with persistent, recurrent, or metastatic carcinoma of the cervix.
