  therapeutic_indication: Tibsovo in combination with azacitidine is indicated for
    the treatment of adult patients with newly diagnosed acute myeloid leukaemia (AML)
    with an isocitrate dehydrogenase-1 (IDH1) R132 mutation who are not eligible to
    receive standard induction chemotherapy (see section 5.1). Tibsovo monotherapy
    is indicated for the treatment of adult patients with locally advanced or metastatic
    cholangiocarcinoma with an IDH1 R132 mutation who were previously treated by at
    least one prior line of systemic therapy.
