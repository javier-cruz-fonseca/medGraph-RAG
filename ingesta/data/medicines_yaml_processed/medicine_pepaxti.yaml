  therapeutic_indication: Pepaxti is indicated, in combination with dexamethasone,
    for the treatment of adult patients with multiple myeloma who have received at
    least three prior lines of therapies, whose disease is refractory to at least
    one proteasome inhibitor, one immunomodulatory agent, and one anti-CD38 monoclonal
    antibody, and who have demonstrated disease progression on or after the last therapy.
    For patients with a prior autologous stem cell transplantation, the time to progression
    should be at least 3 years from transplantation (see section 4.4).
