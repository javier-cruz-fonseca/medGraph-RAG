  therapeutic_indication: Optruma is indicated for the treatment and prevention of
    osteoporosis in post-menopausal women. A significant reduction in the incidence
    of vertebral, but not hip fractures has been demonstrated. When determining the
    choice of Optruma or other therapies, including oestrogens, for an individual
    postmenopausal woman, consideration should be given to menopausal symptoms, effects
    on uterine and breast tissues, and cardiovascular risks and benefits (see section
    5.1).
