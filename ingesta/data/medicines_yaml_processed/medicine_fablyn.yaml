  therapeutic_indication: Fablyn is indicated for the treatment of osteoporosis in
    postmenopausal women at increased risk of fracture. A significant reduction in
    the incidence of vertebral and non-vertebral fractures but not hip fractures has
    been demonstrated (see section 5.1). When determining the choice of Fablyn or
    other therapies, including oestrogens, for a postmenopausal woman, consideration
    should be given to menopausal symptoms, effects on uterine and breast tissues,
    and cardiovascular risks and benefits (see section 5.1).
