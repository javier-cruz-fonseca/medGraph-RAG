  therapeutic_indication: Onsenal is indicated for the reduction of the number of
    adenomatous intestinal polyps in familial adenomatous polyposis (FAP), as an adjunct
    to surgery and further endoscopic surveillance (see section 4.4). The effect of
    Onsenal-induced reduction of polyp burden on the risk of intestinal cancer has
    not been demonstrated (see sections 4.4 and 5.1)
