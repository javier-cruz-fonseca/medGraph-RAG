  therapeutic_indication: Rheumatoid arthritisRINVOQ is indicated for the treatment
    of moderate to severe active rheumatoid arthritis in adult patients who have responded
    inadequately to, or who are intolerant to one or more disease-modifying anti-rheumatic
    drugs (DMARDs). RINVOQ may be used as monotherapy or in combination with methotrexate.
    Psoriatic arthritisRINVOQ is indicated for the treatment of active psoriatic arthritis
    in adult patients who have responded inadequately to, or who are intolerant to
    one or more DMARDs. RINVOQ may be used as monotherapy or in combination with methotrexate.
    Axial spondyloarthritis Non-radiographic axial spondyloarthritis (nr-axSpA)&nbsp;RINVOQ
    is indicated for the treatment of active non-radiographic axial spondyloarthritis
    in adult patients with objective signs of inflammation as indicated by elevated
    C-reactive protein (CRP) and/or magnetic resonance imaging (MRI), who have responded
    inadequately to nonsteroidal anti-inflammatory drugs (NSAIDs). Ankylosing spondylitis
    (AS, radiographic axial spondyloarthritis)&nbsp;RINVOQ is indicated for the treatment
    of active ankylosing spondylitis in adult patients who have responded inadequately
    to conventional therapy. Giant cell arteritisRINVOQ is indicated for the treatment
    of giant cell arteritis in adult patients. Atopic dermatitisRINVOQ is indicated
    for the treatment of moderate to severe atopic dermatitis in adults and adolescents
    12 years and older who are candidates for systemic therapy. Ulcerative colitisRINVOQ
    is indicated for the treatment of adult patients with moderately to severely active
    ulcerative colitis who have had an inadequate response, lost response or were
    intolerant to either conventional therapy or a biologic agent.&nbsp; Crohn’s diseaseRINVOQ
    is indicated for the treatment of adult patients with moderately to severely active
    Crohn’s disease who have had an inadequate response, lost response or were intolerant
    to either conventional therapy or a biologic agent.
