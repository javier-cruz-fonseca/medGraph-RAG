  therapeutic_indication: Translarna is indicated for the treatment of Duchenne muscular
    dystrophy resulting from a nonsense mutation in the dystrophin gene, in ambulatory
    patients aged 2 years and older. Efficacy has not been demonstrated in non-ambulatory
    patients. The presence of a nonsense mutation in the dystrophin gene should be
    determined by genetic testing.
