  therapeutic_indication: Neuropathic pain  Pregabalin Zentiva k.s. is indicated for
    the treatment of peripheral and central neuropathic pain in adults.  Epilepsy  Pregabalin
    Zentiva k.s. is indicated as adjunctive therapy in adults with partial seizures
    with or without secondary generalisation.  Generalised anxiety disorder  Pregabalin
    Zentiva k.s. is indicated for the treatment of generalised anxiety disorder (GAD)
    in adults.
