    impairment due to diabetic macular oedema (DME) • The treatment of proliferative
    diabetic retinopathy (PDR) • The treatment of visual impairment due to macular
    oedema secondary to retinal vein occlusion (branch RVO or central RVO) • The treatment
    of visual impairment due to choroidal neovascularisation (CNV)'
