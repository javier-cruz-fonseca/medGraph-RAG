  therapeutic_indication: Dukoral is indicated for active immunisation against disease
    caused by Vibrio cholerae serogroup O1 in adults and children from 2 years of
    age who will be visiting endemic/epidemic areas. The use of Dukoral should be
    determined on the basis of official recommendations taking into consideration
    the variability of epidemiology and the risk of contracting disease in different
    geographical areas and travelling conditions. Dukoral should not replace standard
    protective measures. In the event of diarrhoea measures of rehydration should
    be instituted.
