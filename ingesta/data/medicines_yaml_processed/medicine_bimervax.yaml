  therapeutic_indication: Bimervax is indicated as a booster for active immunisation
    to prevent COVID-19 in individuals 12 years of age and older who have previously
    received a mRNA COVID-19 vaccine (see sections 4.2 and 5.1). The use of this vaccine
    should be in accordance with official recommendations. Bimervax XBB.1.16 is indicated
    for active immunisation to prevent COVID-19 caused by SARS-CoV-2 in individuals
    12 years of age and older. The use of this vaccine should be in accordance with
    official recommendations. Bimervax LP.8.1 is indicated for active immunisation
    to prevent COVID-19 caused by SARS CoV-2 in individuals 12 years of age and older.
    The use of this vaccine should be in accordance with official recommendations.
