  therapeutic_indication: Treatment of essential hypertension. Actelsar HCT fixed-dose
    combination (40 mg telmisartan / 12.5 mg hydrochlorothiazide) is indicated in
    adults whose blood pressure is not adequately controlled on telmisartan alone.
    Actelsar HCT fixed-dose combination (80 mg telmisartan / 12.5 mg hydrochlorothiazide)
    is indicated in adults whose blood pressure is not adequately controlled on telmisartan
    alone. Actelsar HCT fixed-dose combination (80 mg telmisartan / 25 mg hydrochlorothiazide)
    is indicated in adults whose blood pressure is not adequately controlled on Actelsar
    HCT 80 mg / 12.5 mg (80 mg telmisartan / 12.5 mg hydrochlorothiazide) or adults
    who have been previously stabilised on telmisartan and hydrochlorothiazide given
    separately.
