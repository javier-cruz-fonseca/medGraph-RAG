  therapeutic_indication: Lenvima&nbsp;is indicated as monotherapy for the treatment
    of adult patients with progressive, locally advanced or metastatic, differentiated
    (papillary/follicular/Hürthle cell) thyroid carcinoma (DTC), refractory to radioactive
