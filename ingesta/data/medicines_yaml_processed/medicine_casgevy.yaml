  therapeutic_indication: β thalassemia Casgevy is indicated for the treatment of
    transfusion dependent β thalassemia (TDT) in patients 12 years of age and older
    for whom haematopoietic stem cell (HSC) transplantation is appropriate and a human
    leukocyte antigen (HLA) matched related HSC donor is not available. Sickle cell
    disease Casgevy is indicated for the treatment of severe sickle cell disease (SCD)
    in patients 12 years of age and older with recurrent vaso occlusive crises (VOCs)
    for whom haematopoietic stem cell (HSC) transplantation is appropriate and a human
    leukocyte antigen (HLA) matched related HSC donor is not available.
