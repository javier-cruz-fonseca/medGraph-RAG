  therapeutic_indication: Recarbrio is indicated for:- Treatment of hospital-acquired
    pneumonia (HAP), including ventilator associated pneumonia (VAP), in adults (see
    sections 4.4 and 5.1).- Treatment of bacteraemia that occurs in association with,
    or is suspected to be associated with HAP or VAP, in adults.- Treatment of infections
    due to aerobic Gram-negative organisms in adults with limited treatment options
    (see sections 4.2, 4.4, and 5.1). Consideration should be given to official guidance
    on the appropriate use of antibacterial agents.
