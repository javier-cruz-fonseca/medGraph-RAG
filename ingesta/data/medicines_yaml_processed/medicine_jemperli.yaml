  therapeutic_indication: Jemperli is indicated in combination with carboplatin and
    paclitaxel for the first-line treatment of adult patients with primary advanced
    or recurrent endometrial cancer (EC) and who are candidates for systemic therapy.
    Jemperli is indicated as monotherapy for the treatment of adult patients with
    mismatch repair deficient (dMMR)/ microsatellite instability‑high (MSI‑H) recurrent
    or advanced EC that has progressed on or following prior treatment with a platinum‑containing
    regimen.
