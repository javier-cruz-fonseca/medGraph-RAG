  therapeutic_indication: Lojuxta is indicated as an adjunct to a low?fat diet and
    other lipid?lowering medicinal products with or without low-density-lipoprotein
    (LDL) apheresis in adult patients with homozygous familial hypercholesterolaemia
    (HoFH). Genetic confirmation of HoFH should be obtained whenever possible. Other
    forms of primary hyperlipoproteinaemia and secondary causes of hypercholesterolaemia
    (e.g. nephrotic syndrome, hypothyroidism) must be excluded.
