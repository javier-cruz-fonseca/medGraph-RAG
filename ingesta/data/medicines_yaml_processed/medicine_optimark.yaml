  therapeutic_indication: This medicinal product is for diagnostic use only. Optimark
    is indicated for use with magnetic resonance imaging (MRI) of the central nervous
    system (CNS) and liver. It provides contrast enhancement and facilitates visualisation
    and helps with the characterisation of focal lesions and abnormal structures in
    the CNS and liver in patients with known or highly suspected pathology.
