  therapeutic_indication: Hexyon (DTaP-IPV-HB-Hib) is indicated for primary and booster
    vaccination of infants and toddlers from six weeks of age against diphtheria,
    tetanus, pertussis, hepatitis B, poliomyelitis and invasive diseases caused by
    Haemophilus influenzae type b (Hib). The use of this vaccine should be in accordance
    with official recommendations.
