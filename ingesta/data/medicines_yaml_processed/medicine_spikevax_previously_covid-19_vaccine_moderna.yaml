name: Spikevax (previously COVID-19 Vaccine Moderna)
basic_information:
  category: Human
  ema_product_number: EMEA/H/C/005791
  medicine_status: Authorised
  opinion_status: ''
  inn_common_name: COVID-19 mRNA vaccine
  active_substance: single-stranded, 5’-capped messenger RNA (mRNA) produced using
    a cell-free in vitro transcription from the corresponding DNA templates, encoding
    the viral spike (S) protein of SARS-CoV-2
therapeutic_information:
  therapeutic_area_mesh: COVID-19 virus infection
  atc_code_human: J07BN01
  atcvet_code_veterinary: ''
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: Spikevax is indicated for active immunisation to prevent
    COVID-19 caused by SARS-CoV-2 in individuals 6 months of age and older. The use
    of this vaccine should be in accordance with official recommendations. Spikevax
    bivalent Original/Omicron BA.1 is indicated for active immunisation to prevent
    COVID-19 caused by SARS-CoV-2 in individuals 6 years of age and older who have
    previously received at least a primary vaccination course against COVID-19. The
    use of this vaccine should be in accordance with official recommendations. Spikevax
    bivalent Original/Omicron BA.4-5 is indicated for active immunisation to prevent
    COVID-19 caused by SARS-CoV-2 in individuals 6 months of age and older.&nbsp;The
    use of this vaccine should be in accordance with official recommendations. Spikevax
    XBB.1.5 is indicated for active immunisation to prevent COVID-19 caused by SARS-CoV-2
    in individuals 6 months of age and older. Spikevax JN.1 is indicated for active
    immunisation to prevent COVID-19 caused by SARS-CoV-2 in individuals 6 months
    of age and older.&nbsp;The use of this vaccine should be in accordance with official
    recommendations. Spikevax JN.1 is indicated for active immunisation to prevent
    COVID-19 caused by SARS-CoV-2 in individuals 6 months of age and older.&nbsp;The
    use of this vaccine should be in accordance with official recommendations. Spikevax
    LP.8.1 is indicated for active immunisation to prevent COVID 19 caused by SARS-CoV-2
    in individuals 6 months of age and older. The use of this vaccine should be in
    accordance with official recommendations.
