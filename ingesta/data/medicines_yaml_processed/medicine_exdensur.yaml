  therapeutic_indication: Asthma&nbsp;Exdensur is indicated as add-on maintenance
    treatment for severe asthma with type 2 inflammation characterised by blood eosinophil
    count in adults and adolescents 12 years and older who are inadequately controlled&nbsp;despite
    high dose inhaled corticosteroids (ICS) plus another asthma controller (see section
    5.1). Chronic rhinosinusitis with nasal polyps (CRSwNP)&nbsp;Exdensur is indicated
    as an add-on therapy with intranasal corticosteroids for the treatment of adult
    patients with severe CRSwNP for whom therapy with systemic corticosteroids and/or
    surgery do not provide adequate disease control.&nbsp;
