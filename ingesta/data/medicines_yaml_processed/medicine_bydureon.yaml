  therapeutic_indication: 'Bydureon is indicated in adults 18 years and older with
    type 2 diabetes mellitus to improve glycaemic control in combination with other
    glucose lowering medicinal products when the therapy in use, together with diet
    and exercise, does not provide adequate glycaemic control (see section 4.4, 4.5
    and 5.1 for available data on different combinations). Bydureon is indicated for
    treatment of type 2 diabetes mellitus in combination with:  Metformin Sulphonylurea
    Thiazolidinedione Metformin and sulphonylurea Metformin and thiazolidinedione  in
    adults who have not achieved adequate glycaemic control on maximally tolerated
    doses of these oral therapies.'
