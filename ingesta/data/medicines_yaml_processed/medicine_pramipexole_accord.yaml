  therapeutic_indication: Pramipexole Accord is indicated in adults for treatment
    of the signs and symptoms of idiopathic Parkinson's disease, alone (without levodopa)
    or in combination with levodopa, i.e. over the course of the disease, through
    to late stages when the effect of levodopa wears off or becomes inconsistent and
    fluctuations of the therapeutic effect occur (end-of-dose or 'on-off' fluctuations).
