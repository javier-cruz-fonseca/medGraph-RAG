  therapeutic_indication: Calquence as monotherapy or in combination with obinutuzumab
    is indicated for the treatment of adult patients with previously untreated chronic
    lymphocytic leukaemia (CLL).Calquence in combination with venetoclax with or without
    obinutuzumab is indicated for the treatment of adult patients with previously
    untreated chronic lymphocytic leukaemia (CLL).Calquence as monotherapy is indicated
    for the treatment of adult patients with chronic lymphocytic leukaemia (CLL) who
    have received at least one prior therapy.Calquence in combination with bendamustine
    and rituximab (BR) is indicated for the treatment of adult patients with previously
    untreated mantle cell lymphoma (MCL) who are not eligible for autologous stem
    cell transplant (ASCT).Calquence as monotherapy is indicated for the treatment
    of adult patients with relapsed or refractory mantle cell lymphoma (MCL) not previously
    treated with a BTK inhibitor.
