  therapeutic_indication: Anovulation (including polycystic ovarian disease, PCOD)
    in women who have been unresponsive to treatment with clomiphene citrate. Stimulation
    of multifollicular development in patients undergoing superovulation for assisted
    reproductive technologies (ART) such as in-vitro fertilisation (IVF), gamete intra-fallopian
    transfer (GIFT) and zygote intra-fallopian transfer (ZIFT). GONAL-f in association
    with a luteinising hormone (LH) preparation is recommended for the stimulation
    of follicular development in women with severe LH and FSH deficiency. In clinical
    trials these patients were defined by an endogenous serum LH level &lt;1.2 IU/l.
    GONAL-f is indicated for the stimulation of spermatogenesis in men who have congenital
    or acquired hypogonadotrophic hypogonadism with concomitant human chorionic gonadotrophin
    (hCG) therapy.
