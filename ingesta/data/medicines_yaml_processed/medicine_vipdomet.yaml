  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: 'Vipdomet is indicated in the treatment of adult patients
    aged 18 years and older with type-2 diabetes mellitus:  as an adjunct to diet
    and exercise to improve glycaemic control in adult patients, inadequately controlled
    on their maximal tolerated dose of metformin alone, or those already being treated
    with the combination of alogliptin and metformin; in combination with pioglitazone
    (i.e. triple combination therapy) as an adjunct to diet and exercise in adult
    patients inadequately controlled on their maximal tolerated dose of metformin
    and pioglitazone; in combination with insulin (i.e. triple combination therapy)
    as an adjunct to diet and exercise to improve glycaemic control in patients when
    insulin at a stable dose and metformin alone do not provide adequate glycaemic
    control.'
