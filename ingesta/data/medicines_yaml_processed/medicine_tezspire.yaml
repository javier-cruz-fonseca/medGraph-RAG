  therapeutic_indication: AsthmaTezspire is indicated as an add-on maintenance treatment
    in adults and adolescents 12 years and older with severe asthma who are inadequately
    controlled despite high dose inhaled corticosteroids plus another medicinal product
    for maintenance treatment. Chronic rhinosinusitis with nasal polyps (CRSwNP)&nbsp;Tezspire
    is indicated as an add-on therapy with intranasal corticosteroids for the treatment
    of adult patients with severe CRSwNP for whom therapy with systemic corticosteroids,
    and/or surgery do not provide adequate disease control.
