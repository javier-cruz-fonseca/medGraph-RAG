  therapeutic_indication: Eylea 114.3 mg/ml solution for injection and Eylea 114.3
    mg/ml solution for injection in pre-filled syringe Eylea is indicated for adults
    for the treatment of  neovascular (wet) age-related macular degeneration (AMD)
    visual impairment due to diabetic macular oedema (DME) visual impairment due to
    macular oedema secondary to retinal vein occlusion (branch, central and hemiretinal
    RVO)  Eylea 40&nbsp;mg/mL&nbsp;solution for injection in pre-filled syringe Eylea
    is indicated for adults for the treatment of  neovascular (wet) age-related macular
    degeneration (AMD) visual impairment due to macular oedema secondary to retinal
    vein occlusion (branch RVO or central RVO) visual impairment due to diabetic macular
    oedema (DME) visual impairment due to myopic choroidal neovascularisation (myopic
    CNV)  Eylea is indicated in preterm infants for the treatment of  retinopathy
    of prematurity (ROP) with zone I (stage 1+, 2+, 3 or 3+), zone II (stage 2+ or
    3+) or AP-ROP (aggressive posterior ROP) disease  Eylea 40&nbsp;mg/mL&nbsp;solution
    for injection in a vial Eylea is indicated for adults for the treatment of  neovascular
    (wet) age-related macular degeneration (AMD) visual impairment due to macular
    oedema secondary to retinal vein occlusion (branch RVO or central RVO) visual
    impairment due to diabetic macular oedema (DME) visual impairment due to myopic
    choroidal neovascularisation (myopic CNV)
