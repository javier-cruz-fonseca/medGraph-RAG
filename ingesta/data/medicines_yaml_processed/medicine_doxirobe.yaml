  therapeutic_indication: Treatment of periodontal disease in dogs.Periodontal pocket
    probing depths &gt;=4 mm are evidence of disease that may be responsive to treatment
    with the Doxirobe Gel. Use of this product as directed should result in attachment
    level gains, periodontal pocket depth reductions, local antimicrobial effect and
    improved gingival health. Noticeable improvements in these parameters should be
    evident within 2-4 weeks following treatment. The response in individual dogs
    is dependent on the severity of the condition and rigor of adjunctive therapy.
