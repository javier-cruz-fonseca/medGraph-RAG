  therapeutic_indication: Sebivo is indicated for the treatment of chronic hepatitis
    B in adult patients with compensated liver disease and evidence of viral replication,
    persistently elevated serum alanine aminotransferase (ALT) levels and histological
    evidence of active inflammation and/or fibrosis. Initiation of Sebivo treatment
    should only be considered when the use of an alternative antiviral agent with
    a higher genetic barrier to resistance is not available or appropriate.
