  therapeutic_indication: Treatment of moderate to severe atopic dermatitis in adults
    who are not adequately responsive to or are intolerant of conventional therapies
    such as topical corticosteroids. Treatment of moderate to severe atopic dermatitis
    in children (2 years of age and above) who failed to respond adequately to conventional
    therapies such as topical corticosteroids. Maintenance treatment of moderate to
    severe atopic dermatitis for the prevention of flares and the prolongation of
    flare-free intervals in patients experiencing a high frequency of disease exacerbations
    (i.e. occurring 4 or more times per year) who have had an initial response to
    a maximum of 6 weeks treatment of twice daily tacrolimus ointment (lesions cleared,
    almost cleared or mildly affected).
