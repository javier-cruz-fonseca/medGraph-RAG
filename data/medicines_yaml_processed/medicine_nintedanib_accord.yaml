  therapeutic_indication: Nintedanib Accord is indicated in adults for the treatment
    of idiopathic pulmonary fibrosis (IPF).&nbsp;Nintedanib Accord is also indicated
    in adults for the treatment of other chronic fibrosing interstitial lung diseases
    (ILDs) with a progressive phenotype (see section 5.1).&nbsp;Nintedanib Accord
    is indicated in adults for the treatment of systemic sclerosis associated interstitial
    lung disease (SSc-ILD). Nintedanib Accord is indicated in adults for the treatment
    of idiopathic pulmonary fibrosis (IPF). Nintedanib Accord is also indicated in
    adults for the treatment of other chronic fibrosing interstitial lung diseases
    (ILDs) with a progressive phenotype.&nbsp;Nintedanib Accord is indicated in children
    and adolescents from 6 to 17 years old for the treatment of clinically significant,
    progressive fibrosing interstitial lung diseases (ILDs).&nbsp;Nintedanib Accord
    is indicated in adults, adolescents and children aged 6 years and older for the
    treatment of systemic sclerosis associated interstitial lung disease (SSc-ILD).
