  therapeutic_indication: Efient, co-administered with acetylsalicylic acid (ASA),
    is indicated for the prevention of atherothrombotic events in patients with acute
    coronary syndrome (i.e. unstable angina, non-ST-segment-elevation myocardial infarction
    [UA / NSTEMI] or ST-segment-elevation myocardial infarction [STEMI]) undergoing
    primary or delayed percutaneous coronary intervention (PCI).
