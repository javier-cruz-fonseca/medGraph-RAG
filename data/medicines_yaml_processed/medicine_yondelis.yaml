  therapeutic_indication: Yondelis is indicated for the treatment of patients with
    advanced soft-tissue sarcoma, after failure of anthracyclines and ifosfamide,
    or who are unsuited to receive these agents. Efficacy data are based mainly on
    liposarcoma and leiomyosarcoma patients. Yondelis in combination with pegylated
    liposomal doxorubicin (PLD) is indicated for the treatment of patients with relapsed
    platinum-sensitive ovarian cancer.
