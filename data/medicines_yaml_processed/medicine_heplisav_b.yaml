  therapeutic_indication: Heplisav B is indicated for the active immunisation against
    hepatitis B virus infection (HBV) caused by all known subtypes of hepatitis B
    virus in adults 18 years of age and older. The use of Heplisav B should be in
    accordance with official recommendations. It can be expected that hepatitis D
    will also be prevented by immunisation with Heplisav B as hepatitis D (caused
    by the delta agent) does not occur in the absence of hepatitis B infection.
