  therapeutic_indication: 'Multiple Myeloma&nbsp; Darzalex&nbsp;is&nbsp;indicated:  in
    combination with lenalidomide and dexamethasone&nbsp;or&nbsp;with&nbsp;bortezomib,&nbsp;melphalan&nbsp;and
    prednisone for the treatment of adult patients with newly diagnosed multiple myeloma
    who are ineligible for autologous stem cell transplant. in&nbsp;combination&nbsp;with&nbsp;bortezomib,&nbsp;lenalidomide&nbsp;and
    dexamethasone for the treatment of adult patients with newly diagnosed multiple
    myeloma. in&nbsp;combination&nbsp;with&nbsp;bortezomib,&nbsp;thalidomide&nbsp;and
    dexamethasone&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients
    with newly diagnosed multiple myeloma who are eligible for autologous stem cell
    transplant. in combination with lenalidomide and dexamethasone, or bortezomib
    and dexamethasone,&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients
    with multiple myeloma who have received at least one prior therapy. in combination
    with pomalidomide and dexamethasone for the treatment of adult patients with&nbsp;multiple&nbsp;myeloma&nbsp;who&nbsp;have&nbsp;received&nbsp;one&nbsp;prior
    therapy containing a proteasome inhibitor and lenalidomide and were lenalidomide
    refractory, or who have received at least two prior therapies that included lenalidomide
    and a proteasome inhibitor and have demonstrated disease progression on or after
    the last therapy (see section 5.1). in as monotherapy for the treatment of adult
    patients with relapsed and refractory multiple myeloma, whose prior therapy included
    a proteasome&nbsp;inhibitor&nbsp;and&nbsp;an&nbsp;immunomodulatory agent&nbsp;and&nbsp;who&nbsp;have&nbsp;demonstrated&nbsp;disease
    progression on the last therapy.  Smouldering&nbsp;multiple&nbsp;myeloma Darzalex&nbsp;as&nbsp;monotherapy&nbsp;is&nbsp;indicated&nbsp;for&nbsp;the
    treatment of adult patients with smouldering multiple myeloma at high risk of
    developing multiple myeloma. Light&nbsp;chain&nbsp;(AL)&nbsp;amyloidosis Darzalex
    is indicated in combination with cyclophosphamide,&nbsp;bortezomib&nbsp;and&nbsp;dexamethasone
    for the treatment of adult patients with newly diagnosed systemic light chain
    (AL) amyloidosis. Darzalex&nbsp;is&nbsp;indicated:  in combination with lenalidomide
    and dexamethasone&nbsp;or&nbsp;with&nbsp;bortezomib,&nbsp;melphalan&nbsp;and prednisone
    for the treatment of adult patients with newly diagnosed multiple myeloma who
    are ineligible for autologous stem cell transplant. in&nbsp;combination&nbsp;with&nbsp;bortezomib,&nbsp;thalidomide&nbsp;and
    dexamethasone&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients
    with newly diagnosed multiple myeloma who are eligible for autologous stem cell
    transplant. in combination with lenalidomide and dexamethasone, or bortezomib
    and dexamethasone,&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients
    with multiple myeloma who have received at least one prior therapy. as monotherapy
    for the treatment of adult patients with relapsed and refractory multiple myeloma,
    whose prior therapy included a proteasome&nbsp;inhibitor&nbsp;and&nbsp;an&nbsp;immunomodulatory
    agent and who have demonstrated disease progression on the last therapy.'
