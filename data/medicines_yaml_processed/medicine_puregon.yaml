  therapeutic_indication: 'In the female: Puregon is indicated for the treatment of
    female infertility in the following clinical situations:  anovulation (including
    polycystic ovarian syndrome, PCOS) in women who have been unresponsive to treatment
    with clomifene citrate; controlled ovarian hyperstimulation to induce the development
    of multiple follicles in medically assisted reproduction programs (e.g. in-vitro
    fertilisation / embryo transfer (IVF/ET), gamete intrafallopian transfer (GIFT)
    and intracytoplasmic sperm injection (ICSI)).  In the male:  Deficient spermatogenesis
    due to hypogonadotrophic hypogonadism.'
