  therapeutic_indication: Treatment of essential hypertension in adults. Riprazo HCT
    is indicated in patients whose blood pressure is not adequately controlled on
    aliskiren or hydrochlorothiazide used alone. Rirpozo HCT is indicated as substitution
    therapy in patients adequately controlled with aliskiren and hydrochlorothiazide,
    given concurrently, at the same dose level as in the combination.
