  therapeutic_indication: Riluzole Zentiva is indicated to extend life or the time
    to mechanical ventilation for patients with amyotrophic lateral sclerosis (ALS).
    Clinical trials have demonstrated that Riluzole Zentiva extends survival for patients
    with ALS. Survival was defined as patients who were alive, not intubated for mechanical
    ventilation and tracheotomy-free. There is no evidence that Riluzole Zentiva exerts
    a therapeutic effect on motor function, lung function, fasciculations, muscle
    strength and motor symptoms. Riluzole Zentiva has not been shown to be effective
    in the late stages of ALS. Safety and efficacy of Riluzole Zentiva has only been
    studied in ALS. Therefore, Riluzole Zentiva should not be used in patients with
    any other form of motor-neurone disease.
