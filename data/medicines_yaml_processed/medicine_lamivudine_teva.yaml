  therapeutic_indication: 'Lamivudine Teva is indicated for the treatment of chronic
    hepatitis B in adults with:  compensated liver disease with evidence of active
    viral replication, persistently elevated serum alanine aminotransferase (ALT)
    levels and histological evidence of active liver inflammation and / or fibrosis.
    Initiation of lamivudine treatment should only be considered when the use of an
    alternative antiviral agent with a higher genetic barrier is not available or
    appropriate (see in section 5.1).'
