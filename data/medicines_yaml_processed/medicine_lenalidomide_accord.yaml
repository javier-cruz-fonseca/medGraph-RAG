  therapeutic_indication: Multiple myelomaLenalidomide Accord as monotherapy is indicated
    for the maintenance treatment of adult patients with newly diagnosed multiple
    myeloma who have undergone autologous stem cell transplantation. Lenalidomide
    Accord as combination therapy with dexamethasone, or bortezomib and dexamethasone,
    or melphalan and prednisone (see section 4.2) is indicated for the treatment of
    adult patients with previously untreated multiple myeloma who are not eligible
    for transplant. Lenalidomide Accord in combination with dexamethasone is indicated
    for the treatment of multiple myeloma in adult patients who have received at least
    one prior therapy. Follicular lymphomaLenalidomide Accord in combination with
    rituximab (anti-CD20 antibody) is indicated for the treatment of adult patients
    with previously treated follicular lymphoma (Grade 1 – 3a).
