  therapeutic_indication: Xeplion is indicated for maintenance treatment of schizophrenia
    in adult patients stabilised with paliperidone or risperidone. In selected adult
    patients with schizophrenia and previous responsiveness to oral paliperidone or
    risperidone, Xeplion may be used without prior stabilisation with oral treatment
    if psychotic symptoms are mild to moderate and a long-acting injectable treatment
    is needed.
