  therapeutic_indication: 'Early breast cancer (EBC) Phesgo is indicated for use in
    combination with chemotherapy in:  the neoadjuvant treatment of adult patients
    with HER2-positive, locally advanced, inflammatory, or early stage breast cancer
    at high risk of recurrence the adjuvant treatment of adult patients with HER2-positive
    early breast cancer at high risk of recurrence  Metastatic breast cancer (MBC)
    Phesgo is indicated for use in combination with docetaxel in adult patients with
    HER2-positive metastatic or locally recurrent unresectable breast cancer, who
    have not received previous anti-HER2 therapy or chemotherapy for their metastatic
    disease.'
