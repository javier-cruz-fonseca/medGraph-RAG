  therapeutic_indication: Kivexa is indicated in antiretroviral combination therapy
    for the treatment of Human Immunodeficiency Virus (HIV) infection in adults, adolescents
    and children weighing at least 25 kg. Before initiating treatment with abacavir,
    screening for carriage of the HLA-B*5701 allele should be performed in any HIV-infected
    patient, irrespective of racial origin. Abacavir should not be used in patients
    known to carry the HLA-B*5701 allele.
