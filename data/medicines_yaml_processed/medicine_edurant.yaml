  therapeutic_indication: EDURANT, in combination with other antiretroviral medicinal
    products, is indicated for the treatment of human immunodeficiency virus type
    1 (HIV 1) infection in paediatric patients 2 to less than 18 years of age and
    weighing at least 14 kg to less than 25 kg without known mutations associated
    with resistance to the non-nucleoside reverse transcriptase inhibitor (NNRTI)
    class, and with a viral load ≤ 100,000 HIV 1 RNA copies/ml (see sections 4.4 and
    5.1).Genotypic resistance testing should guide the use of EDURANT (see sections
    4.4 and 5.1).EDURANT, in combination with other antiretroviral medicinal products,
    is indicated for the treatment of human immunodeficiency virus type 1 (HIV 1)
    infection in adults and paediatric patients weighing at least 25 kg without known
    mutations associated with resistance to the non-nucleoside reverse transcriptase
    inhibitor (NNRTI) class, and with a viral load ≤ 100,000 HIV 1 RNA copies/ml (see
    sections 4.4 and 5.1).Genotypic resistance testing should guide the use of EDURANT
    (see sections 4.4 and 5.1).
