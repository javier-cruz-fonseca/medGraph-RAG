  therapeutic_indication: 'Anagrelide Viatris is indicated for the reduction of elevated
    platelet counts in at risk essential thrombocythaemia (ET) patients who are intolerant
    to their current therapy or whose elevated platelet counts are not reduced to
    an acceptable level by their current therapy.An at-risk patient An at-risk essential
    thrombocythaemia patient is defined by one or more of the following features:  &gt;60
    years of age or a platelet count &gt;1,000 x 10⁹/l or a history of thrombo-haemorrhagic
    events.'
