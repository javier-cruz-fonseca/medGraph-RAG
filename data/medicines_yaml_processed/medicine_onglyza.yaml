  therapeutic_indication: 'Add-on combination therapy Onglyza is indicated in adult
    patients aged 18 years and older with type-2 diabetes mellitus to improve glycaemic
    control: as monotherapy:  in patients inadequately controlled by diet and exercise
    alone and for whom metformin is inappropriate due to contraindications or intolerance;  as
    dual oral therapy:  in combination with metformin, when metformin alone, with
    diet and exercise, does not provide adequate glycaemic control; in combination
    with a sulphonylurea, when the sulphonylurea alone, with diet and exercise, does
    not provide adequate glycaemic control in patients for whom use of metformin is
    considered inappropriate; in combination with a thiazolidinedione, when the thiazolidinedione
    alone with diet and exercise, does not provide adequate glycaemic control in patients
    for whom use of a thiazolidinedione is considered appropriate;  as triple oral
    therapy:  in combination with metformin plus a sulphonylurea when this regimen
    alone, with diet and exercise, does not provide adequate glycaemic control;  as
    combination therapy with insulin (with or without metformin), when this regimen
    alone, with diet and exercise, does not provide adequate glycaemic control.'
