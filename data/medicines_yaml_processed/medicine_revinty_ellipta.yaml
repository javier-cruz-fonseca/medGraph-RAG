  therapeutic_indication: 'Asthma Indication Revinty Ellipta is indicated in the regular
    treatment of asthma in adults and adolescents aged 12 years and older, where use
    of a combination product (long-acting beta2-agonist and inhaled corticosteroid)
    is appropriate:  patients not adequately controlled with inhaled corticosteroids
    and “as needed” inhaled short acting beta2-agonists.  COPD Indication Revinty
    Ellipta is indicated for the symptomatic treatment of adults with COPD with a
    FEV1 &lt;70% predicted normal (post-bronchodilator) in patients with an exacerbation
    history despite bronchodilator therapy.'
