  therapeutic_indication: Unituxin is indicated for the treatment of high-risk neuroblastoma
    in patients aged 12 months to 17years, who have previously received induction
    chemotherapy and achieved at least a partial response, followed by myeloablative
    therapy and autologous stem cell transplantation (ASCT). It is administered in
    combination with granulocyte-macrophage colony-stimulating factor (GM-CSF), interleukin-2
    (IL-2), and isotretinoin.
