  therapeutic_indication: Cejemly in combination with platinum-based chemotherapy
    is indicated for the first line treatment of adults with metastatic non small
    cell lung cancer (NSCLC) with no sensitising EGFR mutations, or ALK, ROS1 or RET
    genomic tumour aberrations.&nbsp;Cejemly as monotherapy is indicated for the treatment
    of unresectable stage III NSCLC with no sensitising EGFR mutations, or ALK, ROS1
    genomic tumour aberrations in adults whose tumours express PD-L1 on ≥ 1% of tumour
    cells and whose disease has not progressed following platinum-based chemoradiotherapy.
