  therapeutic_indication: 'Kalydeco tablets are indicated:&nbsp;&nbsp;- As monotherapy
    for the treatment of adults, adolescents, and children aged 6 years and older
    and weighing 25 kg or more with cystic fibrosis (CF) who have an R117H CFTR mutation
    or one of the following gating (Class III) mutations in the cystic fibrosis transmembrane
    conductance regulator (CFTR) gene: G551D, G1244E, G1349D, G178R, G551S, S1251N,
    S1255P, S549N or S549R.&nbsp;- In a combination regimen with tezacaftor/ivacaftor
    tablets for the treatment of adults, adolescents, and children aged 6 years and
    older with cystic fibrosis (CF) who are homozygous for the F508del mutation or
    who are heterozygous for the F508del mutation and have one of the following mutations
    in the CFTR gene: P67L, R117C, L206W, R352Q, A455E, D579G, 711+3Aâ†’G, S945L, S977F,
    R1070W, D1152H, 2789+5Gâ†’A, 3272 26Aâ†’G, and 3849+10kbCâ†’T.&nbsp;- In a combination
    regimen with ivacaftor/tezacaftor/elexacaftor tablets for the treatment of adults,
    adolescents, and children aged 6 years and older with cystic fibrosis (CF) who
    have at least one non-Class I mutation in the CFTR gene. Kalydeco granules are
    indicated:&nbsp;- As monotherapy for the treatment of infants aged at least 1
    month, toddlers and children weighing 3 kg to less than 25 kg with cystic fibrosis
    (CF) who have an R117H CFTR mutation or one of the following gating (Class III)
    mutations in the cystic fibrosis transmembrane conductance regulator (CFTR) gene:
    G551D, G1244E, G1349D, G178R, G551S, S1251N, S1255P, S549N or S549R.&nbsp;- In
    a combination regimen with ivacaftor/tezacaftor/elexacaftor for the treatment
    of cystic fibrosis (CF) in paediatric patients aged 2 to less than 6 years who
    have at least one non-Class I mutation in the CFTR gene.'
