  therapeutic_indication: PecFent is indicated for the management of breakthrough
    pain in adults who are already receiving maintenance opioid therapy for chronic
    cancer pain. Breakthrough pain is a transitory exacerbation of pain that occurs
    on a background of otherwise controlled persistent pain. Patients receiving maintenance
    opioid therapy are those who are taking at least 60 mg of oral morphine daily,
    at least 25 micrograms of transdermal fentanyl per hour, at least 30 mg of oxycodone
    daily, at least 8 mg of oral hydromorphone daily or an equi-analgesic dose of
    another opioid for a week or longer.
