  therapeutic_indication: PreHevbri is indicated for active immunisation against infection
    caused by all known subtypes of the hepatitis B virus in adults. It can be expected
    that hepatitis D will also be prevented by immunisation with PreHevbri as hepatitis
    D (caused by the delta agent) does not occur in the absence of hepatitis B infection.
    The use of PreHevbri should be in accordance with official recommendations.
