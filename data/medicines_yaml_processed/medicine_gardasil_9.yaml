  therapeutic_indication: 'Gardasil 9 is indicated for active immunisation of individuals
    from the age of 9 years against the following HPV diseases:  Premalignant lesions
    and cancers affecting the cervix, vulva, vagina and anus caused by vaccine HPV
    types Genital warts (Condyloma acuminata) caused by specific HPV types.  See sections
    4.4 and 5.1 for important information on the data that support these indications.
    The use of Gardasil 9 should be in accordance with official recommendations.'
