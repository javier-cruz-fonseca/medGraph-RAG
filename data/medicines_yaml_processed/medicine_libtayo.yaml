  therapeutic_indication: 'Cutaneous Squamous Cell Carcinoma  Libtayo as monotherapy
    is indicated for the treatment of adult patients with metastatic or locally advanced
    cutaneous squamous cell carcinoma (mCSCC or laCSCC) who are not candidates for
    curative surgery or curative radiation. Libtayo as monotherapy is indicated for
    the adjuvant treatment of adult patients with CSCC at high risk of recurrence
    after surgery and radiation (see section 5.1 for selection criteria).&nbsp;  Basal
    Cell Carcinoma  Libtayo as monotherapy is indicated for the treatment of adult
    patients with locally advanced or metastatic basal cell carcinoma (laBCC or mBCC)
    who have progressed on or are intolerant to a hedgehog pathway inhibitor (HHI).  Non-Small
    Cell Lung Cancer  Libtayo as monotherapy is indicated for the first-line treatment
    of adult patients with non-small cell lung cancer (NSCLC) expressing PD-L1 (in
    ? 50% tumour cells), with no EGFR, ALK or ROS1 aberrations, who have:  locally
    advanced NSCLC who are not candidates for definitive chemoradiation, or metastatic
    NSCLC.   Libtayo in combination with platinum?based chemotherapy is indicated
    for the first?line treatment of adult patients with NSCLC expressing PD-L1 (in
    ? 1% of tumour cells), with no EGFR, ALK or ROS1 aberrations, who have:  locally
    advanced NSCLC who are not candidates for definitive chemoradiation, or metastatic
    NSCLC.    Cervical Cancer  Libtayo as monotherapy is indicated for the treatment
    of adult patients with recurrent or metastatic cervical cancer and disease progression
    on or after platinum-based chemotherapy.'
