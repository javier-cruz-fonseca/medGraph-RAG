  therapeutic_indication: Low-grade glioma Spexotras in combination with dabrafenib
    is indicated for the treatment of paediatric patients aged 1&nbsp;year and older
    with low-grade glioma (LGG) with a BRAF V600E mutation who require systemic therapy.
    High-grade glioma Spexotras in combination with dabrafenib is indicated for the
    treatment of paediatric patients aged 1&nbsp;year and older with high-grade glioma
    (HGG) with a BRAF V600E mutation who have received at least one prior radiation
    and/or chemotherapy treatment.
