  therapeutic_indication: 'Paxene is indicated for the treatment of patients with:  advanced
    AIDS-related Kaposi''s sarcoma (AIDS-KS) who have failed prior liposomal anthracycline
    therapy; metastatic carcinoma of the breast (MBC) who have failed, or are not
    candidates for standard anthracycline-containing therapy; advanced carcinoma of
    the ovary (AOC) or with residual disease (&gt; 1 cm) after initial laparotomy,
    in combination with cisplatin as first-line treatment; metastatic carcinoma of
    the ovary (MOC) after failure of platinum-containing combination therapy without
    taxanes as second-line treatment; non-small cell lung carcinoma (NSCLC) who are
    not candidates for potentially curative surgery and/or radiation therapy, in combination
    with cisplatin. Limited efficacy data supports this indication (see section 5.1).'
