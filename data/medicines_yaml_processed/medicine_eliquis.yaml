  therapeutic_indication: Treatment of venous thromboembolism (VTE) and prevention
    of recurrent VTE in paediatric patients from 28 days to less than 18 years of
    age. AdultsPrevention of venous thromboembolic events (VTE) in adult patients
    who have undergone elective hip or knee replacement surgery. Prevention of stroke
    and systemic embolism in adult patients with non valvular atrial fibrillation
    (NVAF), with one or more risk factors, such as prior stroke or transient ischaemic
    attack (TIA); age ≥ 75 years; hypertension; diabetes mellitus; symptomatic heart
    failure (NYHA Class ≥ II).Treatment of deep vein thrombosis (DVT) and pulmonary
    embolism (PE), and prevention of recurrent DVT and PE in adults (see section 4.4
    for haemodynamically unstable PE patients).Paediatric population Treatment of
    venous thromboembolism (VTE) and prevention of recurrent VTE in paediatric patients
    from 28 days to less than 18 years of age. AdultsPrevention of stroke and systemic
    embolism in adult patients with non valvular atrial fibrillation (NVAF), with
    one or more risk factors, such as prior stroke or transient ischaemic attack (TIA);
    age≥ 75 years; hypertension; diabetes mellitus; symptomatic heart failure (NYHA
    Class ≥ II).Treatment of deep vein thrombosis (DVT) and pulmonary embolism (PE),
    and prevention of recurrent DVT and PE in adults (see section 4.4 for haemodynamically
    unstable PE patients).Paediatric populationTreatment of venous thromboembolism
    (VTE) and prevention of recurrent VTE in paediatric patients from 28 days to less
    than 18 years of age.&nbsp;
