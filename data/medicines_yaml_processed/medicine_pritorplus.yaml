  therapeutic_indication: Treatment of essential hypertension. PritorPlus fixed-dose
    combination (40 mg telmisartan / 12.5 mg hydrochlorothiazide, 80mg telmisartan
    / 12.5 mg hydrochlorothiazide) is indicated in patients whose blood pressure is
    not adequately controlled on telmisartan alone. PritorPlus fixed-dose combination
    (80 mg telmisartan / 25 mg hydrochlorothiazide) is indicated in patients whose
    blood pressure is not adequately controlled on PritorPlus (80 mg telmisartan /
    12.5 mg hydrochlorothiazide) or patients who have been previously stabilised on
    telmisartan and hydrochlorothiazide given separately.
