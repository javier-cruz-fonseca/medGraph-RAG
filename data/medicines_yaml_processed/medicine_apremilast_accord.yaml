  therapeutic_indication: Psoriatic arthritis Apremilast Accord, alone or in combination
    with Disease Modifying Antirheumatic Drugs (DMARDs), is indicated for the treatment
    of active psoriatic arthritis (PsA) in adult patients who have had an inadequate
    response or who have been intolerant to a prior DMARD therapy (see section 5.1).Psoriasis
    Apremilast Accord is indicated for the treatment of moderate to severe chronic
    plaque psoriasis in adult patients who failed to respond to or who have a contraindication
    to, or are intolerant to other systemic therapy including cyclosporine, methotrexate
    or psoralen and ultraviolet-A light (PUVA).Behçet’s disease Apremilast Accord
    is indicated for the treatment of adult patients with oral ulcers associated with
    Behçet’s disease (BD) who are candidates for systemic therapy.
