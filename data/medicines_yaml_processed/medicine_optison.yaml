  therapeutic_indication: This medicinal product is for diagnostic use only. Optison
    is a transpulmonary echocardiographic contrast agent for use in patients with
    suspected or established cardiovascular disease to provide opacification of cardiac
    chambers, enhance left-ventricular-endocardial-border delineation with resulting
    improvement in wall-motion visualisation. Optison should only be used in patients
    where the study without contrast enhancement is inconclusive.
