  therapeutic_indication: '80 mg strength:  Treatment of chronic hyperuricaemia in
    conditions where urate deposition has already occurred (including a history, or
    presence of, tophus and/or gouty arthritis). Adenuric is indicated in adults.  120
    mg strength:  Adenuric is indicated for the treatment of chronic hyperuricaemia
    in conditions where urate deposition has already occurred (including a history,
    or presence of, tophus and/or gouty arthritis). Adenuric is indicated for the
    prevention and treatment of hyperuricaemia in adult patients undergoing chemotherapy
    for haematologic malignancies at intermediate to high risk of Tumor Lysis Syndrome
    (TLS). Adenuric is indicated in adults.'
