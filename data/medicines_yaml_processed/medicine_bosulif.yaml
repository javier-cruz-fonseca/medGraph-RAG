  therapeutic_indication: Bosulif is indicated for the treatment of:• Adult and paediatric
    patients aged 6 years and older with newly-diagnosed (ND) chronic phase (CP) Philadelphia
    chromosome-positive chronic myelogenous leukaemia (Ph+ CML).• Adult and paediatric
    patients aged 6 years and older with CP Ph+ CML previously treated with one or
    more tyrosine kinase inhibitor(s) [TKI(s)] and for whom imatinib, nilotinib and
    dasatinib are not considered appropriate treatment options.• Adult patients with
    accelerated phase (AP), and blast phase (BP) Ph+ CML previously treated with one
    or more tyrosine kinase inhibitor(s) [TKI(s)] and for whom imatinib, nilotinib
    and dasatinib are not considered appropriate treatment options.
