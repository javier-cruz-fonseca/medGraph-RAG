  therapeutic_indication: Active immunisation for the prevention of invasive disease,
    pneumonia and acute otitis media caused by Streptococcus pneumoniae in infants,
    children and adolescents from 6 weeks to 17 years of age. Active immunisation
    for the prevention of invasive disease caused by Streptococcus pneumoniae in adults
    ?18 years of age and the elderly. See sections 4.4 and 5.1 for information on
    protection against specific pneumococcal serotypes. The use of Prevenar 13 should
    be determined on the basis of official recommendations taking into consideration
    the risk of invasive disease in different age groups, underlying comorbidities
    as well as the variability of serotype epidemiology in different geographical
    areas.
