  therapeutic_indication: Adult patients with histologically proven chronic hepatitis
    C who are positive for hepatitis C virus (HCV) antibodies or HCV RNA and have
    elevated serum alanine aminotransferase (ALT) without liver decompensation.The
    efficacy of Interferon alfa-2a in the treatment of hepatitis C is enhanced when
    combined with ribavirin. Alpheon should be given alone mainly in case of intolerance
    or contra-indication to ribavirin.
