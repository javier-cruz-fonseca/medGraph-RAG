    patients 12 years of age and older with advanced solid tumours expressing a NTRK&nbsp;gene
    fusion, and  who have received a prior NTRK inhibitor, or&nbsp; have not received
    a prior NTRK inhibitor and treatment options not targeting NTRK provide limited
    clinical benefit, or have been exhausted (see sections 4.4 and 5.1)
