  therapeutic_indication: Abilify is indicated for the treatment of schizophrenia
    in adults and in adolescents aged 15 years and older. Abilify is indicated for
    the treatment of moderate to severe manic episodes in Bipolar I Disorder and for
    the prevention of a new manic episode in adults who experienced predominantly
    manic episodes and whose manic episodes responded to aripiprazole treatment. Abilify
    is indicated for the treatment up to 12 weeks of moderate to severe manic episodes
    in Bipolar I Disorder in adolescents aged 13 years and older.
