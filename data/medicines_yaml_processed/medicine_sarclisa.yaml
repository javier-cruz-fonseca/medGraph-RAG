  therapeutic_indication: SARCLISA is indicated:&nbsp;  In combination with pomalidomide
    and dexamethasone, for the treatment of adult patients with relapsed and refractory
    multiple myeloma who have received at least two prior therapies including lenalidomide
    and a proteasome inhibitor and have demonstrated disease progression on the last
    therapy. In combination with carfilzomib and dexamethasone, for the treatment
    of adult patients with multiple myeloma who have received at least one prior therapy.
    In combination with bortezomib, lenalidomide, and dexamethasone, for the treatment
    of adult patients with newly diagnosed multiple myeloma who are ineligible for
    autologous stem cell transplant. In combination with bortezomib, lenalidomide,
    and dexamethasone, for the induction treatment of adult patients with newly diagnosed
    multiple myeloma who are eligible for autologous stem cell transplant.
