  therapeutic_indication: Rapamune is indicated for the prophylaxis of organ rejection
    in adult patients at low to moderate immunological risk receiving a renal transplant.
    It is recommended that Rapamune be used initially in combination with ciclosporin
    microemulsion and corticosteroids for 2 to 3 months. Rapamune may be continued
    as maintenance therapy with corticosteroids only if ciclosporin microemulsion
    can be progressively discontinued. Rapamune is indicated for the treatment of
    patients with sporadic lymphangioleiomyomatosis with moderate lung disease or
    declining lung function.
