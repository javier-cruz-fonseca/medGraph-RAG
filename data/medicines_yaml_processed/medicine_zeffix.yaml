  therapeutic_indication: 'Zeffix is indicated for the treatment of chronic hepatitis
    B in adults with:  compensated liver disease with evidence of active viral replication,
    persistently elevated serum alanine aminotransferase (ALT) levels and histological
    evidence of active liver inflammation and / or fibrosis. Initiation of lamivudine
    treatment should only be considered when the use of an alternative antiviral agent
    with a higher genetic barrier is not available or appropriate; decompensated liver
    disease in combination with a second agent without cross-resistance to lamivudine.'
