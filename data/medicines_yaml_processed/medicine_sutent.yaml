  therapeutic_indication: Gastrointestinal stromal tumour (GIST) Sutent is indicated
    for the treatment of unresectable and/or metastatic malignant gastrointestinal
    stromal tumour (GIST) in adults after failure of imatinib mesilate treatment due
    to resistance or intolerance. Metastatic renal cell carcinoma (MRCC) Sutent is
    indicated for the treatment of advanced/metastatic renal cell carcinoma (MRCC)
    in adults. Pancreatic neuroendocrine tumours (pNET) Sutent is indicated for the
    treatment of unresectable or metastatic, well-differentiated pancreatic neuroendocrine
    tumours with disease progression in adults. Experience with Sutent as first-line
    treatment is limited (see section 5.1).
