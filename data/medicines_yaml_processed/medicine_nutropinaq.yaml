  therapeutic_indication: Long-term treatment of children with growth failure due
    to inadequate endogenous growth hormone secretion. Long-term treatment of growth
    failure associated with Turner syndrome. Treatment of prepubertal children with
    growth failure associated with chronic renal insufficiency up to the time of renal
    transplantation. Replacement of endogenous growth hormone in adults with growth
    hormone deficiency of either childhood or adult-onset etiology. Growth hormone
    deficiency should be confirmed appropriately prior to treatment.
