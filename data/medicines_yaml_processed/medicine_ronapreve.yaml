  therapeutic_indication: Ronapreve is indicated for:- Treatment of COVID-19 in adults,
    adolescents and children aged 2 years and older weighing at least 10 kg who do
    not require supplemental oxygen and who are at increased risk of progressing to
    severe COVID-19.- Treatment of COVID-19 in adults and adolescents aged 12 years
    and older weighing at least 40 kg and receiving supplemental oxygen, who have
    a negative SARS-CoV-2 antibody test result.&nbsp;- Prevention of COVID-19 in adults
    and adolescents aged 12 years and older weighing at least 40 kg.Ronapreve should
    be used in accordance with official recommendations where available and based
    on information on the activity of casirivimab and imdevimab against presently
    circulating viral variants.
