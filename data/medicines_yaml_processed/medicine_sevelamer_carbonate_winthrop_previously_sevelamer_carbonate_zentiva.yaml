  therapeutic_indication: Sevelamer carbonate Winthrop is indicated for the control
    of hyperphosphataemia in adult patients receiving haemodialysis or peritoneal
    dialysis. Sevelamer carbonate Winthrop is also indicated for the control of hyperphosphataemia
    in adult patients with chronic kidney disease not on dialysis with serum phosphorus
    &gt; 1.78 mmol/L. Sevelamer carbonate Winthrop should be used within the context
    of a multiple therapeutic approach, which could include calcium supplement, 1,25-dihydroxy
    Vitamin D3 or one of its analogues to control the development of renal bone disease.
