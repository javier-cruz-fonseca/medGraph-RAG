  therapeutic_indication: Malignant pleural mesothelioma Alimta in combination with
    cisplatin is indicated for the treatment of chemotherapy-naïve patients with unresectable
    malignant pleural mesothelioma. Non-small-cell lung cancer Alimta in combination
    with cisplatin is indicated for the first-line treatment of patients with locally
    advanced or metastatic non-small-cell lung cancer other than predominantly squamous
    cell histology. Alimta is indicated as monotherapy for the maintenance treatment
    of locally advanced or metastatic non-small-cell lung cancer other than predominantly
    squamous cell histology in patients whose disease has not progressed immediately
    following platinum-based chemotherapy. Alimta is indicated as monotherapy for
    the second line treatment of patients with locally advanced or metastatic non-small-cell
    lung cancer other than predominantly squamous cell histology.
