  therapeutic_indication: Cotronak is indicated for the treatment of chronic hepatitis
    C and must only be used as part of a combination regimen with peginterferon alfa-2b
    or interferon alfa-2b. Cotronak monotherapy must not be used.There is no safety
    or efficacy information on the use of Cotronak with other forms of interferon
    (i.e., not alfa-2b).Please refer also to the peginterferon alfa-2b or interferon
    alfa-2b Summary of Product Characteristics (SPC) for prescribing information particular
    to that product.
