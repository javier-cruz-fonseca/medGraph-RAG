  therapeutic_indication: Tasmar is indicated in combination with levodopa / benserazide
    or levodopa / carbidopa for use in patients with levodopa-responsive idiopathic
    Parkinson’s disease and motor fluctuations, who failed to respond to or are intolerant
    of other catechol-O-methyltransferase (COMT) inhibitors. Because of the risk of
    potentially fatal, acute liver injury, Tasmar should not be considered as a first-line
    adjunct therapy to levodopa / benserazide or levodopa / carbidopa. Since Tasmar
    should be used only in combination with levodopa / benserazide and levodopa /
    carbidopa, the prescribing information for these levodopa preparations is also
    applicable to their concomitant use with Tasmar.
