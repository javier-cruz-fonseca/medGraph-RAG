  therapeutic_indication: 'Segluromet is indicated in adults aged 18 years and older
    with type 2 diabetes mellitus as an adjunct to diet and exercise to improve glycaemic
    control:  in patients not adequately controlled on their maximally tolerated dose
    of metformin alone in patients on their maximally tolerated doses of metformin
    in addition to other medicinal products for the treatment of diabetes in patients
    already being treated with the combination of ertugliflozin and metformin as separate
    tablets.'
