  therapeutic_indication: 'Treatment of symptomatic anaemia associated with chronic
    renal failure (CRF) in adult and paediatric patients:  treatment of anaemia associated
    with chronic renal failure in paediatric and adult patients on haemodialysis and
    adult patients on peritoneal dialysis; Treatment of severe anaemia of renal origin
    accompanied by clinical symptoms in adult patients with renal insufficiency not
    yet undergoing dialysis.  Treatment of anaemia and reduction of transfusion requirements
    in adult patients receiving chemotherapy for solid tumours, malignant lymphoma
    or multiple myeloma, and at risk of transfusion as assessed by the patient''s
    general status (e.g. cardiovascular status, pre-existing anaemia at the start
    of chemotherapy).'
