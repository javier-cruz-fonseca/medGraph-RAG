  therapeutic_indication: 'Somatropin Biopartners is indicated for the replacement
    therapy of endogenous growth hormone in adults with childhood- or adult-onset
    growth-hormone deficiency (GHD). Adult-onset: Patients with GHD in adulthood are
    defined as patients with known hypothalamic-pituitary pathology and at least one
    additional known deficiency of a pituitary hormone excluding prolactin. These
    patients should undergo a single dynamic test in order to diagnose or exclude
    a GHD. Childhood-onset: In patients with childhood-onset isolated GHD (no evidence
    of hypothalamic-pituitary disease or cranial irradiation), two dynamic tests should
    be performed after completion of growth, except for those having low insulin-like-growth-factor-I
    (IGF-I) concentrations (&lt; -2 standard-deviation score (SDS)), who may be considered
    for one test. The cut-off point of the dynamic test should be strict.'
