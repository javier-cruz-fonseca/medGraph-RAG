  inn_common_name: adjuvanted inactivated vaccine against avian influenza virus type
    A, subtype H5
  active_substance: inactivated whole avian influenza virus antigen of H5 subtype
    (strain H5N6, A/duck/Potsdam/2243/84)
therapeutic_information:
  therapeutic_area_mesh: ''
