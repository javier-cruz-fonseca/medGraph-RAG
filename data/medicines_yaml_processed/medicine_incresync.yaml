  therapeutic_indication: 'Incresync is indicated as a second- or third-line treatment
    in adult patients aged 18 years and older with type-2 diabetes mellitus:  as an
    adjunct to diet and exercise to improve glycaemic control in adult patients (particularly
    overweight patients) inadequately controlled on pioglitazone alone, and for whom
    metformin is inappropriate due to contraindications or intolerance; in combination
    with metformin (i.e. triple combination therapy) as an adjunct to diet and exercise
    to improve glycaemic control in adult patients (particularly overweight patients)
    inadequately controlled on their maximal tolerated dose of metformin and pioglitazone.  In
    addition, Incresync can be used to replace separate tablets of alogliptin and
    pioglitazone in those adult patients aged 18 years and older with type-2 diabetes
    mellitus already being treated with this combination. After initiation of therapy
    with Incresync, patients should be reviewed after three to six months to assess
    adequacy of response to treatment (e.g. reduction in HbA1c). In patients who fail
    to show an adequate response, Incresync should be discontinued. In light of potential
    risks with prolonged pioglitazone therapy, prescribers should confirm at subsequent
    routine reviews that the benefit of Incresync is maintained (see section 4.4).'
