  therapeutic_indication: Plaque psoriasis ABSIMKY is indicated for the treatment
    of moderate to severe plaque psoriasis in adults who failed to respond to, or
    who have a contraindication to, or are intolerant to other systemic therapies
    including ciclosporin, methotrexate (MTX) or PUVA (psoralen and ultraviolet A).
    Paediatric plaque psoriasis ABSIMKY is indicated for the treatment of moderate
    to severe plaque psoriasis in children and adolescent patients from the age of
    6 years and older, who are inadequately controlled by, or are intolerant to, other
    systemic therapies or phototherapies. Psoriatic arthritis (PsA) ABSIMKY, alone
    or in combination with MTX, is indicated for the treatment of active psoriatic
    arthritis in adult patients when the response to previous non-biological disease-modifying
    antirheumatic drug (DMARD) therapy has been inadequate. Crohn’s Disease Absimky&nbsp;is&nbsp;indicated&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients&nbsp;with&nbsp;moderately&nbsp;to&nbsp;severely&nbsp;active&nbsp;Crohn’s
    disease who have had an inadequate response with, lost response to, or were intolerant
    to either conventional therapy or a TNFα antagonist or have medical contraindications
    to such therapies. Ulcerative&nbsp;colitis Absimky&nbsp;is&nbsp;indicated&nbsp;for&nbsp;the&nbsp;treatment&nbsp;of&nbsp;adult&nbsp;patients&nbsp;with&nbsp;moderately&nbsp;to&nbsp;severely&nbsp;active&nbsp;ulcerative
    colitis who have had an inadequate response with, lost response to, or were intolerant
    to either conventional therapy or a biologic or have medical contraindications
    to such therapies.
