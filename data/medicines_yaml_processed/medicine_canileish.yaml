  therapeutic_indication: 'For the active immunisation of Leishmania-negative dogs
    from six months of age to reduce the risk to develop an active infection and clinical
    disease after contact with Leishmania infantum. The efficacy of the vaccine has
    been demonstrated in dogs submitted to multiple natural parasite exposure in zones
    with high infection pressure. Onset of immunity: 4 weeks after the primary vaccination
    course. Duration of immunity: 1 year after the last re-vaccination.'
