  therapeutic_indication: 'Zejula is indicated:  as monotherapy for the maintenance
    treatment of adult patients with advanced epithelial (FIGO Stages III and IV)
    high-grade ovarian, fallopian tube or primary peritoneal cancer who are in response
    (complete or partial) following completion of first-line platinum-based chemotherapy.
    as monotherapy for the maintenance treatment of adult patients with platinum sensitive
    relapsed high grade serous epithelial ovarian, fallopian tube, or primary peritoneal
    cancer who are in response (complete or partial) to platinum based chemotherapy.'
