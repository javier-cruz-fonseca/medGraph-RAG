  therapeutic_indication: 'Budesonide/Formoterol Teva Pharma B.V. is indicated in
    adults 18 years of age and older only. Asthma Budesonide/Formoterol Teva Pharma
    B.V. is indicated in the regular treatment of asthma, where use of a combination
    (inhaled corticosteroid and long-acting β2 adrenoceptor agonist) is appropriate:
    -in patients not adequately controlled with inhaled corticosteroids and “as needed”
    inhaled short-acting β2 adrenoceptor agonists. or -in patients already adequately
    controlled on both inhaled corticosteroids and long-acting β2 adrenoceptor agonists.
    COPD Symptomatic treatment of patients with COPD with forced expiratory volume
    in 1 second (FEV1)&nbsp;&lt;&nbsp;70% predicted normal (post bronchodilator) and
    a history of repeated exacerbations, who have significant symptoms despite regular
    therapy with long-acting bronchodilators.'
