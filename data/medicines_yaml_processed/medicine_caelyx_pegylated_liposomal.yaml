  therapeutic_indication: 'Caelyx&nbsp;pegylated liposomal is indicated:  as monotherapy
    for patients with metastatic breast cancer, where there is an increased cardiac
    risk; for treatment of advanced ovarian cancer in women who have failed a first-line
    platinum-based chemotherapy regimen; in combination with bortezomib for the treatment
    of progressive multiple myeloma in patients who have received at least one prior
    therapy and who have already undergone or are unsuitable for bone marrow transplant;
    for treatment of AIDS-related Kaposi’s sarcoma (KS) in patients with low CD4 counts
    (&lt;200 CD4 lymphocytes/mm3) and extensive mucocutaneous or visceral disease.  Caelyx
    pegylated liposomal may be used as first-line systemic chemotherapy, or as second
    line chemotherapy in AIDS-KS patients with disease that has progressed with, or
    in patients intolerant to, prior combination systemic chemotherapy comprising
    at least two of the following agents: a vinca alkaloid, bleomycin and standarddoxorubicin
    (or other anthracycline).'
