  therapeutic_indication: Renagel is indicated for the control of hyperphosphataemia
    in adult patients receiving  haemodialysis or peritoneal dialysis. Renagel should
    be used within the context of a multiple therapeutic approach, which could include
    calcium supplements, 1,25 - dihydroxy Vitamin D3 or one of its analogues to control
    the development of renal bone disease.
