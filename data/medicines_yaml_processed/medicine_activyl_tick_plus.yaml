  therapeutic_indication: Treatment of flea infestations (Ctenocephalides felis);
    the product has persistent insecticidal efficacy for up to 4 weeks against Ctenocephalides
    felis. The product has persistent acaricidal efficacy for up to 5 weeks against
    Ixodes ricinus and up to 3 weeks against Rhipicephalus sanguineus. One treatment
    provides repellent (anti-feeding) activity against sand flies (Phlebotomus perniciosus)
    for up to 3 weeks.
