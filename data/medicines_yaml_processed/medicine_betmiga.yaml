  therapeutic_indication: Overactive bladder in adults&nbsp;  Betmiga prolonged-release
    tablets are indicated for symptomatic treatment of urgency, increased micturition
    frequency and/or urgency incontinence as may occur in adult patients with overactive
    bladder (OAB) syndrome.&nbsp;  Neurogenic detrusor overactivity in the paediatric
    population&nbsp;  Betmiga prolonged release tablets are indicated for treatment
    of neurogenic detrusor overactivity (NDO) in paediatric patients aged 3 to less
    than 18 years.
