  therapeutic_indication: "Secondary prevention of atherothrombotic events Clopidogrel\
    \ is indicated in:  adult patients suffering from myocardial infarction (from\
    \ a few days until less than 35 days), ischaemic stroke (from seven days until\
    \ less than six months) or established peripheral arterial disease; adult patients\
    \ suffering from acute coronary syndrome:  non-ST-segment-elevation acute coronary\
    \ syndrome (unstable angina or non-Q-wave myocardial infarction), including patients\
    \ undergoing a stent placement following percutaneous coronary intervention, in\
    \ combination with acetylsalicylic acid (ASA); ST-segment-elevation acute myocardial\
    \ infarction, in combination with ASA in patients undergoing percutaneous coronary\
    \ intervention (including patients undergoing a stent replacement) or medically\
    \ treated patients eligible for thrombolytic/fibrinolytic therapy. In patients\
    \ with moderate to high-risk Transient Ischemic Attack (TIA) or minor Ischemic\
    \ Stroke (IS) \t\tClopidogrel in combination with ASA is indicated in:  Adult\
    \ patients with moderate to high-risk TIA (ABCD2&nbsp; score ?4) or minor IS (NIHSS&nbsp;\
    \ ?3) within 24 hours of either the TIA or IS event.      Prevention of atherothrombotic\
    \ and thromboembolic events in atrial fibrillation In adult patients with atrial\
    \ fibrillation who have at least one risk factor for vascular events, are not\
    \ suitable for treatment with vitamin-K antagonists and who have a low bleeding\
    \ risk, clopidogrel is indicated in combination with ASA for the prevention of\
    \ atherothrombotic and thromboembolic events, including stroke."
