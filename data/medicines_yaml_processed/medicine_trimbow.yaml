  therapeutic_indication: Maintenance treatment of asthma, in adults not adequately
    controlled with a maintenance combination of a long-acting beta2-agonist and high
    dose of inhaled corticosteroid, and who experienced one or more asthma exacerbations
    in the previous year. COPDMaintenance treatment in adult patients with moderate
    to severe chronic obstructive pulmonary disease (COPD) who are not adequately
    treated by a combination of an inhaled corticosteroid and a long-acting beta2-agonist
    or a combination of a long-acting beta2-agonist and a long-acting muscarinic antagonist
    (for effects on symptoms control and prevention of exacerbations see section 5.1).
    AsthmaMaintenance treatment of asthma, in adults not adequately controlled with
    a maintenance combination of a long-acting beta2-agonist and medium dose of inhaled
    corticosteroid, and who experienced one or more asthma exacerbations in the previous
    year.
