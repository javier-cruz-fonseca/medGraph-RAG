  therapeutic_indication: 'Rebif is indicated for the treatment of:  patients with
    a single demyelinating event with an active inflammatory process, if alternative
    diagnoses have been excluded, and if they are determined to be at high risk of
    developing clinically definite multiple sclerosis; patients with relapsing multiple
    sclerosis. In clinical trials, this was characterised by two or more acute exacerbations
    in the previous two years.  Efficacy has not been demonstrated in patients with
    secondary progressive multiple sclerosis without ongoing relapse activity.'
