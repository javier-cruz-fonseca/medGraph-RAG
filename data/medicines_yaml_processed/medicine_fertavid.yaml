  therapeutic_indication: 'In the female: Fertavid is indicated for the treatment
    of female infertility in the following clinical situations:  Anovulation (including
    polycystic ovarian disease, PCOD) in women who have been unresponsive to treatment
    with clomifene citrate Controlled ovarian hyperstimulation to induce the development
    of multiple follicles in medically assisted reproduction programs [e.g. in vitro
    fertilisation/embryo transfer (IVF/ET), gamete intra-fallopian transfer (GIFT)
    and intracytoplasmic sperm injection (ICSI).  In the male:  Deficient spermatogenesis
    due to hypogonadotrophic hypogonadism.'
