  therapeutic_indication: Melanoma Dabrafenib as monotherapy or in combination with
    trametinib is indicated for the treatment of adult patients with unresectable
    or metastatic melanoma with a BRAF V600 mutation (see sections 4.4 and 5.1). Adjuvant
    treatment of melanoma Dabrafenib in combination with trametinib is indicated for
    the adjuvant treatment of adult patients with Stage III melanoma with a BRAF V600
    mutation, following complete resection. Non-small cell lung cancer (NSCLC) Dabrafenib
    in combination with trametinib is indicated for the treatment of adult patients
    with advanced non-small cell lung cancer with a BRAF V600 mutation.
