  therapeutic_indication: Treatment of HIV-1 infection Emtricitabine/tenofovir disoproxil
    Krka is indicated in antiretroviral combination therapy for the treatment of HIV-1
    infected adults. Emtricitabine/Tenofovir disoproxil Krka is also indicated for
    the treatment of HIV-1 infected adolescents, with NRTI resistance or toxicities
    precluding the use of first line agents, aged 12 to &lt; 18 years (see section
    5.1 Pre-exposure prophylaxis (PrEP) Emtricitabine/Tenofovir disoproxil Krka is
    indicated in combination with safer sex practices for pre-exposure prophylaxis
    to reduce the risk of sexually acquired HIV-1 infection in adults at high risk.
