  therapeutic_indication: Type 2 diabetes mellitus Forxiga is indicated in adults
    and children aged 10 years and above for the treatment of insufficiently controlled
    type 2 diabetes mellitus as an adjunct to diet and exercise  as monotherapy when
    metformin is considered inappropriate due to intolerance. in addition to other
    medicinal products for the treatment of type 2 diabetes.  For study results with
    respect to combination of therapies, effects on glycaemic control, cardiovascular
    and renal events, and the populations studied, see sections 4.4, 4.5 and 5.1.
    Heart failure Forxiga is indicated in adults for the treatment of symptomatic
    chronic heart failure. Chronic kidney disease Forxiga is indicated in adults for
    the treatment of chronic kidney disease.
