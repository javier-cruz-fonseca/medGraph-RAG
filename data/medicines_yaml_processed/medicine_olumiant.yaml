  therapeutic_indication: 'Rheumatoid arthritis Baricitinib is indicated for the treatment
    of moderate to severe active rheumatoid arthritis in adult patients who have responded
    inadequately to, or who are intolerant to one or more disease modifying anti rheumatic
    drugs (DMARDs). Olumiant may be used as monotherapy or in combination with methotrexate.
    Atopic Dermatitis Olumiant is indicated for the treatment of moderate to severe
    atopic dermatitis in adult and paediatric patients 2 years of age and older who
    are candidates for systemic therapy. Alopecia areata Baricitinib is indicated
    for the treatment of severe alopecia areata in adult patients (see section 5.1).
    Juvenile idiopathic arthritis Baricitinib is indicated for the treatment of active
    juvenile idiopathic arthritis in patients 2 years of age and older who have had
    an inadequate response or intolerance to one or more prior conventional synthetic
    or biologic DMARDs: - Polyarticular juvenile idiopathic arthritis (polyarticular
    rheumatoid factor positive [RF+] or negative [RF-], extended oligoarticular),
    - Enthesitis related arthritis, and - Juvenile psoriatic arthritis. Baricitinib
    may be used as monotherapy or in combination with methotrexate.'
