  therapeutic_indication: 'Jayempi is indicated in combination with other immunosuppressive
    agents for the prophylaxis of transplant rejection in patients receiving allogenic
    kidney, liver, heart, lung or pancreas transplants. Azathioprine is indicated
    in immunosuppressive regimens as an adjunct to immunosuppressive agents that form
    the mainstay of treatment (basis immunosuppression). Jayempi is used as an immunosuppressant
    antimetabolite either alone or, more commonly, in combination with other agents
    (usually corticosteroids) and/ or procedures which influence the immune response.
    Jayempi is indicated in patients who are intolerant to glucocorticosteroids or
    if the therapeutic response is inadequate despite treatment with high doses of
    glucocorticosteroids, in the following diseases:  severe active rheumatoid arthritis
    (chronic polyarthritis) that cannot be kept under control by less toxic agents
    (disease-modifying anti-rheumatic -medicinal products – DMARDs) auto-immune hepatitis
    &nbsp;systemic lupus erythematosus dermatomyositis polyarteritis nodosa pemphigus
    vulgaris and bullous pemphigoid Behçet’s disease refractory auto-immune haemolytic
    anaemia, caused by warm IgG antibodies chronic refractory idiopathic thrombocytopenic
    purpura  Jayempi is used for the treatment of moderately severe to severe forms
    of chronic inflammatory bowel disease (IBD) (Crohn’s disease or ulcerative colitis)
    in patients in whom glucocorticosteroid therapy is necessary, but where glucocorticosteroids
    are not tolerated, or in whom the disease is untreatable with other common means
    of first choice. It is also indicated in adult patients in relapsing multiple
    sclerosis, if an immunomodulatory therapy is indicated but beta interferon therapy
    is not possible, or a stable course has been achieved with previous treatment
    with azathioprine. 3 Jayempi is indicated for the treatment of generalised myasthenia
    gravis. Depending on the severity of the disease, Jayempi should be given in combination
    with glucocorticosteroids because of slow onset of action at the beginning of
    treatment and the glucocorticosteroid dose should be gradually reduced after several
    months of treatment.'
