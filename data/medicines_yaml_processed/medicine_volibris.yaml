  therapeutic_indication: Volibris is indicated for treatment of pulmonary arterial
    hypertension (PAH) in adult patients of WHO Functional Class (FC) II to III, including
    use in combination treatment (see section 5.1).  Efficacy has been shown in idiopathic
    PAH (IPAH) and in PAH associated with connective tissue disease. Volibris is indicated
    for treatment of PAH in adolescents and children (aged 8 to less than 18 years)
    of WHO Functional Class (FC) II to III including use in combination treatment.
    Efficacy has been shown in IPAH, familial, corrected congenital and in PAH associated
    with connective tissue disease (see section 5.1).
