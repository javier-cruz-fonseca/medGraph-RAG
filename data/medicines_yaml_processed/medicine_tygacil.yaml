  therapeutic_indication: 'Tygacil is indicated in adults and in children from the
    age of eight years for the treatment of the following infections:  Complicated
    skin and soft tissue infections (cSSTI), excluding diabetic foot infections Complicated
    intra-abdominal infections (cIAI)  Tygacil should be used only in situations where
    other alternative antibiotics are not suitable. Consideration should be given
    to official guidance on the appropriate use of antibacterial agents. appropriate
    use of antibacterial agents.'
