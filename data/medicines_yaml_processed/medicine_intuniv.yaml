  therapeutic_indication: Intuniv is indicated for the treatment of attention deficit
    hyperactivity disorder (ADHD) in children and adolescents 6 17 years old for whom
    stimulants are not suitable, not tolerated or have been shown to be ineffective.
    Intuniv must be used as a part of a comprehensive ADHD treatment programme, typically
    including psychological, educational and social measures.
