  therapeutic_indication: 'Eperzan is indicated for the treatment of type 2 diabetes
    mellitus in adults to improve glycaemic control as: Monotherapy When diet and
    exercise alone do not provide adequate glycaemic control in patients for whom
    use of metformin is considered inappropriate due to contraindications or intolerance.
    Add-on combination therapy In combination with other glucose-lowering medicinal
    products including basal insulin, when these, together with diet and exercise,
    do not provide adequate glycaemic control (see section 4.4 and 5.1 for available
    data on different combinations).'
