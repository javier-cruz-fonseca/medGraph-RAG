  therapeutic_indication: Integrilin is intended for use with acetylsalicylic acid
    and unfractionated heparin. Integrilin is indicated for the prevention of early
    myocardial infarction in patients presenting with unstable angina or non-Q-wave
    myocardial infarction with the last episode of chest pain occurring within 24
    hours and with ECG changes and / or elevated cardiac enzymes. Patients most likely
    to benefit from Integrilin treatment are those at high risk of developing myocardial
    infarction within the first 3-4 days after onset of acute angina symptoms including
    for instance those that are likely to undergo an early percutaneous transluminal
    coronary angioplasty (PTCA).
