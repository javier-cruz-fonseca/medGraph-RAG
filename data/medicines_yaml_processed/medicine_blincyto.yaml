  therapeutic_indication: Blincyto is indicated as monotherapy for the treatment of
    adults with CD19 positive relapsed or refractory B‑cell precursor acute lymphoblastic
    leukaemia (ALL). Patients with Philadelphia chromosome-positive B-cell precursor
    ALL should have failed treatment with at least 2 tyrosine kinase inhibitors (TKIs)
    and have no alternative treatment options. Blincyto is indicated as monotherapy
    for the treatment of adults with Philadelphia chromosome-negative CD19 positive
    B-cell precursor ALL in first or second complete remission with minimal residual
    disease (MRD) greater than or equal to 0.1%. Blincyto is indicated as monotherapy
    for the treatment of paediatric patients aged&nbsp;1&nbsp;month or older with
    Philadelphia chromosome-negative CD19 positive B‑cell precursor ALL which is refractory
    or in relapse after receiving at least two prior therapies or in relapse after
    receiving prior allogeneic haematopoietic stem cell transplantation. Blincyto
    is indicated as monotherapy for the treatment of paediatric patients aged&nbsp;1&nbsp;month
    or older with high-risk first relapsed Philadelphia chromosome-negative CD19 positive
    B-cell precursor ALL as part of the consolidation therapy (see section&nbsp;4.2).
    Blincyto is indicated as monotherapy as part of consolidation therapy for the
    treatment of adult patients with newly diagnosed Philadelphia chromosome negative
    CD19 positive B-cell precursor ALL.
