  therapeutic_indication: Adults&nbsp;Opsumit, as monotherapy or in combination, is
    indicated for the long-term treatment of pulmonary arterial hypertension (PAH)
    in adult patients of WHO Functional Class (FC) II to III. Paediatric populationOpsumit,
    as monotherapy or in combination, is indicated for the long-term treatment of
    pulmonary arterial hypertension (PAH) in paediatric patients aged less than 18
    years and bodyweight ≥ 40 kg with WHO Functional Class (FC) II to III. Opsumit,
    as monotherapy or in combination, is indicated for the long-term treatment of
    pulmonary arterial hypertension (PAH) in paediatric patients aged 2 years to less
    than 18 years with WHO Functional Class (FC) II to III.
