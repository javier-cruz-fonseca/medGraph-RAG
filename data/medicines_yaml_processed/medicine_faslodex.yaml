  therapeutic_indication: 'Faslodex is indicated  as monotherapy for the treatment
    of estrogen receptor positive, locally advanced or metastatic breast cancer in
    postmenopausal women:  not previously treated with endocrine therapy, or with
    disease relapse on or after adjuvant antiestrogen therapy, or disease progression
    on antiestrogen therapy.   in combination with palbociclib for the treatment of
    hormone receptor (HR)-positive, human epidermal growth factor receptor 2 (HER2)-negative
    locally advanced or metastatic breast cancer in women who have received prior
    endocrine therapy.  In pre- or perimenopausal women, the combination treatment
    with palbociclib should be combined with a luteinizing hormone releasing hormone
    (LHRH) agonist.'
