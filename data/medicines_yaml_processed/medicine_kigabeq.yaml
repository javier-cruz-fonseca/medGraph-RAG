  therapeutic_indication: 'Kigabeq is indicated in infants and children from 1 month
    to less than 7 years of age for:  Treatment in monotherapy of infantile spasms
    (West''s syndrome). Treatment in combination with other antiepileptic medicinal
    products for patients with resistant partial epilepsy (focal onset seizures) with
    or without secondary generalisation, that is where all other appropriate medicinal
    product combinations have proved inadequate or have not been tolerated.'
