  therapeutic_indication: 'Alhemo is indicated for routine prophylaxis of bleeding
    in patients 12 years of age or more with: •&nbsp;&nbsp;&nbsp;&nbsp;haemophilia
    A (congenital factor VIII deficiency) with FVIII inhibitors.•&nbsp;&nbsp;&nbsp;&nbsp;severe
    haemophilia A (congenital factor VIII deficiency, FVIII &lt; 1%) without FVIII
    inhibitors.•&nbsp;&nbsp;&nbsp;&nbsp;haemophilia B (congenital factor IX deficiency)
    with FIX inhibitors.•&nbsp;&nbsp;&nbsp;&nbsp;moderate/severe haemophilia B (congenital
    factor IX deficiency, FIX ≤ 2%) without FIX inhibitors.'
