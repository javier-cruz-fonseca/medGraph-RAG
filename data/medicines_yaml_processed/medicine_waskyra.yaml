  inn_common_name: etuvetidigene autotemcel
  active_substance: genetically modified autologous CD34+ cell enriched population
    that contains haematopoietic stem and progenitor cells (HSPC) transduced ex vivo
    using a lentiviral vector encoding the human Wiskott-Aldrich Syndrome (WAS) gene
therapeutic_information:
  therapeutic_area_mesh: Wiskott-Aldrich Syndrome
  atc_code_human: B06
  atcvet_code_veterinary: ''
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: Waskyra is indicated for the treatment of patients aged
    6 months and older with Wiskott-Aldrich Syndrome (WAS) who have a mutation in
    the WAS gene for whom haematopoietic stem cell (HSC) transplantation is appropriate
    and no suitable human leukocyte antigen (HLA)-matched related haematopoietic stem
    cell donor is available.
