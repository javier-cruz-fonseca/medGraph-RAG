  therapeutic_indication: 'Leqvio is indicated in adults with primary hypercholesterolaemia
    (heterozygous familial and non-familial) or mixed dyslipidaemia, as an adjunct
    to diet:  in combination with a statin or statin with other lipid-lowering therapies
    in patients unable to reach LDL-C goals with the maximum tolerated dose of a statin,
    or alone or in combination with other lipid-lowering therapies in patients who
    are statin-intolerant, or for whom a statin is contraindicated.'
