  therapeutic_indication: Juvenile idiopathic arthritis&nbsp; Polyarticular juvenile
    idiopathic arthritis&nbsp; Hulio in combination with methotrexate is indicated
    for the treatment of active polyarticular juvenile idiopathic arthritis, in patients
    from the age of 2 years who have had an inadequate response to one or more disease-modifying
    anti-rheumatic drugs (DMARDs). Hulio can be given as monotherapy in case of intolerance
    to methotrexate or when continued treatment with methotrexate is inappropriate
    (for the efficacy in monotherapy see section 5.1). Adalimumab has not been studied
    in patients aged less than 2 years.&nbsp; Enthesitis-related arthritis&nbsp; Hulio
    is indicated for the treatment of active enthesitis-related arthritis in patients,
    6 years of age and older, who have had an inadequate response to, or who are intolerant
    of, conventional therapy (see section 5.1).&nbsp; Paediatric plaque psoriasis&nbsp;
    Hulio is indicated for the treatment of severe chronic plaque psoriasis in children
    and adolescents from 4 years of age who have had an inadequate response to or
    are inappropriate candidates for topical therapy and phototherapies.&nbsp; Paediatric
    Crohn's disease&nbsp; Hulio is indicated for the treatment of moderately to severely
    active Crohn's disease in paediatric patients (from 6 years of age) who have had
    an inadequate response to conventional therapy including primary nutrition therapy
    and a corticosteroid and/or an immunomodulator, or who are intolerant to or have
    contraindications for such therapies. Paediatric Uveitis&nbsp; Hulio is indicated
    for the treatment of paediatric chronic non-infectious anterior uveitis in patients
    from 2 years of age who have had an inadequate response to or are intolerant to
    conventional therapy, or in whom conventional therapy is inappropriate.
