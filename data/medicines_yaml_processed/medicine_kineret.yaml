  therapeutic_indication: 'Rheumatoid Arthritis (RA) Kineret is indicated in adults
    for the treatment of the signs and symptoms of RA in combination with methotrexate,
    with an inadequate response to methotrexate alone. COVID-19 Kineret is indicated
    for the treatment of coronavirus disease 2019 (COVID-19) in adult patients with
    pneumonia requiring supplemental oxygen (low- or high-flow oxygen) who are at
    risk of progressing to severe respiratory failure determined by plasma concentration
    of soluble urokinase plasminogen activator receptor (suPAR) ? 6 ng/ml. Periodic
    fever syndromes Kineret is indicated for the treatment of the following autoinflammatory
    periodic fever syndromes in adults, adolescents, children and infants aged 8 months
    and older with a body weight of 10 kg or above: Cryopyrin-Associated Periodic
    Syndromes (CAPS) Kineret is indicated for the treatment of CAPS, including:  Neonatal-Onset
    Multisystem Inflammatory Disease (NOMID) / Chronic Infantile Neurological, Cutaneous,
    Articular Syndrome (CINCA) Muckle-Wells Syndrome (MWS) Familial Cold Autoinflammatory
    Syndrome (FCAS)  Familial Mediterranean Fever (FMF) Kineret is indicated for the
    treatment of Familial Mediterranean Fever (FMF). Kineret should be given in combination
    with colchicine, if appropriate. Still’s Disease Kineret is indicated in adults,
    adolescents, children and infants aged 8 months and older with a body weight of
    10 kg or above for the treatment of Still’s disease, including Systemic Juvenile
    Idiopathic Arthritis (SJIA) and Adult-Onset Still’s Disease (AOSD), with active
    systemic features of moderate to high disease activity, or in patients with continued
    disease activity after treatment with non-steroidal anti-inflammatory drugs (NSAIDs)
    or glucocorticoids. Kineret can be given as monotherapy or in combination with
    other anti-inflammatory drugs and disease-modifying antirheumatic drugs (DMARDs).'
