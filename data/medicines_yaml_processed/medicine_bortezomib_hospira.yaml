  therapeutic_indication: Bortezomib Hospira as monotherapy or in combination with
    pegylated liposomal doxorubicin or dexamethasone is indicated for the treatment
    of adult patients with progressive multiple myeloma who have received at least
    1 prior therapy and who have already undergone or are unsuitable for haematopoietic
    stem cell transplantation. Bortezomib Hospira in combination with melphalan and
    prednisone is indicated for the treatment of adult patients with previously untreated
    multiple myeloma who are not eligible for high-dose chemotherapy with haematopoietic
    stem cell transplantation. Bortezomib Hospira in combination with dexamethasone,
    or with dexamethasone and thalidomide, is indicated for the induction treatment
    of adult patients with previously untreated multiple myeloma who are eligible
    for high-dose chemotherapy with haematopoietic stem cell transplantation. Bortezomib
    Hospira in combination with rituximab, cyclophosphamide, doxorubicin and prednisone
    is indicated for the treatment of adult patients with previously untreated mantle
    cell lymphoma who are unsuitable for haematopoietic stem cell transplantation.
