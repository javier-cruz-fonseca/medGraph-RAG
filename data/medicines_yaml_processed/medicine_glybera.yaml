  therapeutic_indication: Glybera is indicated for adult patients diagnosed with familial
    lipoprotein lipase deficiency (LPLD) and suffering from severe or multiple pancreatitis
    attacks despite dietary fat restrictions. The diagnosis of LPLD has to be confirmed
    by genetic testing. The indication is restricted to patients with detectable levels
    of LPL protein.
