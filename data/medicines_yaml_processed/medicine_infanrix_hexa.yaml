  inn_common_name: diphtheria (D), tetanus (T), pertussis (acellular, component) (Pa),
    hepatitis B (rDNA) (HBV), poliomyelitis (inactivated) (IPV) and Haemophilus influenzae
    type-b (Hib) conjugate vaccine (adsorbed)
  active_substance: Diphtheria toxoid;tetanus toxoid;Bordetella pertussis antigens
    (pertussis toxoid, filamentous haemagglutinin, pertactin);hepatitis B surface
    antigen;poliovirus (inactivated) (type-1 (Mahoney strain), type-2 (MEF-1 strain),
    type-3 (Saukett strain));Haemophilus influenzae type b polysaccharide
therapeutic_information:
  therapeutic_area_mesh: Hepatitis B;Tetanus;Immunization;Meningitis, Haemophilus;Whooping
