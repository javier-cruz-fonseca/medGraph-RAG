  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: Infanrix hexa is indicated for primary and booster vaccination
    of infants from the age of 6 weeks and toddlers against diphtheria, tetanus, pertussis,
    hepatitis B, poliomyelitis and disease caused by Haemophilus influenzae type b.
    The use of Infanrix hexa should be in accordance with official recommendations.
