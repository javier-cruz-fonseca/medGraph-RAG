  therapeutic_indication: '4 mg / 5 ml and 4 mg / 100 ml:  Prevention of skeletal-related
    events (pathological fractures, spinal compression, radiation or surgery to bone,
    or tumour-induced hypercalcaemia) in adult patients with advanced malignancies
    involving bone. Treatment of adult patients with tumour-induced hypercalcaemia
    (TIH).  5 mg / 100 ml: Treatment of osteoporosis:  in post-menopausal women; in
    men;  at increased risk of fracture, including those with a recent low-trauma
    hip fracture. Treatment of osteoporosis associated with long-term systemic glucocorticoid
    therapy:  in post-menopausal women; in men;  at increased risk of fracture. Treatment
    of Paget''s disease of the bone in adults.'
