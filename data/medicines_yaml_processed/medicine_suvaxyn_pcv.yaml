  inn_common_name: adjuvanted inactivated vaccine against porcine circovirus type
    2 in piglets
  active_substance: porcine circovirus recombinant virus (CPCV) 1-2, inactivated
therapeutic_information:
  therapeutic_area_mesh: ''
