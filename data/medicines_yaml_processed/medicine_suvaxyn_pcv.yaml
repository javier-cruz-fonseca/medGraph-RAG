  therapeutic_indication: Active immunisation of pigs over the age of three weeks
    against porcine circovirus type 2 (PCV2) to reduce viral load in blood and lymphoid
    tissues, and the lesions in lymphoid tissues associated with PCV2 infection, as
    well as to reduce clinical signs - including loss of daily weight gain, and mortality
    associated with post-weaning multisystemic wasting syndrome.
