  therapeutic_indication: Uptravi is indicated for the long-term treatment of pulmonary
    arterial hypertension (PAH) in adult patients with WHO functional class (FC) II–III,
    either as combination therapy in patients insufficiently controlled with an endothelin
    receptor antagonist (ERA) and/or a phosphodiesterase type 5 (PDE-5) inhibitor,
    or as monotherapy in patients who are not candidates for these therapies. Efficacy
    has been shown in a PAH population including idiopathic and heritable PAH, PAH
    associated with connective tissue disorders, and PAH associated with corrected
    simple congenital heart disease.
