  therapeutic_indication: Intelence, in combination with a boosted protease inhibitor
    and other antiretroviral medicinal products, is indicated for the treatment of
    human-immunodeficiency-virus-type-1 (HIV-1) infection in antiretroviral-treatment-experienced
    adult patients and in antiretroviral-treatment-experienced paediatric patients
    from six years of age. This indication is based on week-48 analyses from two phase-III
    trials in highly pretreated patients where Intelence was investigated in combination
    with an optimised background regimen (OBR) which included darunavir/ritonavir.
    The indication in paediatric patients is based on 48-week analyses of a single-arm,
    phase-II trial in antiretroviral-treatment-experienced paediatric patients.
