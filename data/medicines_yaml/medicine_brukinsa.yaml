  therapeutic_indication: Brukinsa&nbsp;as monotherapy is indicated for the treatment
    of adult patients with Waldenström’s macroglobulinaemia (WM) who have received
    at least one prior therapy, or in first line treatment for patients unsuitable
    for chemo-immunotherapy. Brukinsa&nbsp;as monotherapy is indicated for the treatment
    of adult patients with marginal zone lymphoma (MZL) who have received at least
    one prior anti-CD20-based therapy. Brukinsa&nbsp;as monotherapy is indicated for
    the treatment of adult patients with chronic lymphocytic leukemia (CLL). Brukinsa
    in combination with obinutuzumab is indicated for the treatment of adult patients
    with refractory or relapsed follicular lymphoma (FL) who have received at least
    two prior systemic therapies.
