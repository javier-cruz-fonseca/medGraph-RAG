  therapeutic_indication: This medicinal product is for diagnostic use only. Flortaucipir
    (18F) is a radiopharmaceutical indicated for positron emission tomography (PET)
    imaging of the brain to assess the neocortical distribution of aggregated tau
    neurofibrillary tangles (NFTs) in adult patients with cognitive impairment who
    are being evaluated for Alzheimer’s disease (AD). Flortaucipir (18F) is an adjunct
    to clinical and other diagnostic evaluations. For limitations of use, see sections
    4.4 and 5.1.
