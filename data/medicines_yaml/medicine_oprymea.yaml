  therapeutic_indication: Oprymea is indicated for treatment of the signs and symptoms
    of idiopathic Parkinson's disease, alone (without levodopa) or in combination
    with levodopa, i.e. over the course of the disease, through to late stages when
    the effect of levodopa wears off or becomes inconsistent and fluctuations of the
    therapeutic effect occur (end of dose or "on off" fluctuations). Oprymea is indicated
    in adults for symptomatic treatment of moderate to severe idiopathic Restless
    Legs Syndrome in doses up to 0.54 mg of base (0.75 mg of salt) (see section 4.2).
