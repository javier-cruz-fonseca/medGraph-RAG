  therapeutic_indication: Coated tablets Adults Olanzapine is indicated for the treatment
    of schizophrenia. Olanzapine is effective in maintaining the clinical improvement
    during continuation therapy in patients who have shown an initial treatment response.
    Olanzapine is indicated for the treatment of moderate to severe manic episode.
    In patients whose manic episode has responded to olanzapine treatment, olanzapine
    is indicated for the prevention of recurrence in patients with bipolar disorder.
    Injection Adults Zyprexa powder for solution for injection is indicated for the
    rapid control of agitation and disturbed behaviours in patients with schizophrenia
    or manic episode, when oral therapy is not appropriate. Treatment with Zyprexa
    powder for solution for injection should be discontinued and the use of oral olanzapine
    should be initiated as soon as clinically appropriate.
