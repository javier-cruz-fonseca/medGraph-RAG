  therapeutic_indication: Eyluxvi is indicated for adults for the treatment of- neovascular
    (wet) age-related macular degeneration (AMD) (see section 5.1),- visual impairment
    due to macular oedema secondary to retinal vein occlusion (branch RVO or central
    RVO) (see section 5.1),- visual impairment due to diabetic macular oedema (DME)
    (see section 5.1),- visual impairment due to myopic choroidal neovascularisation
    (myopic CNV) (see section 5.1).&nbsp;
