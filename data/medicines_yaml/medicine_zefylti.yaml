  therapeutic_indication: Zefylti is indicated for the reduction in the duration of
    neutropenia and the incidence of febrile neutropenia in patients treated with
    established cytotoxic chemotherapy for malignancy (with the exception of chronic
    myeloid leukaemia and myelodysplastic syndromes) and for the reduction in the
    duration of neutropenia in patients undergoing myeloablative therapy followed
    by bone marrow transplantation considered to be at increased risk of prolonged
    severe neutropenia.&nbsp;The safety and efficacy of Zefylti are similar in adults
    and children receiving cytotoxic chemotherapy.&nbsp;Zefylti is indicated for the
    mobilisation of peripheral blood progenitor cells (PBPCs).&nbsp;In patients, children
    or adults, with severe congenital, cyclic, or idiopathic neutropenia with an absolute
    neutrophil count (ANC) of ≤ 0.5 x 109/L, and a history of severe or recurrent
    infections, long term administration of Zefylti is indicated to increase neutrophil
    counts and to reduce the incidence and duration of infection related events. Zefylti
    is indicated for the treatment of persistent neutropenia (ANC less than or equal
    to 1&nbsp;x&nbsp; 109/L) in patients with advanced HIV infection, in order to
    reduce the risk of bacterial infections when other options to manage neutropenia
    are inappropriate.
