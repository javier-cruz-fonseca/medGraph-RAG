  therapeutic_indication: 'Vildagliptin is indicated as an adjunct to diet and exercise
    to improve glycaemic control in adults with type 2 diabetes mellitus:  as monotherapy
    in patients in whom metformin is inappropriate due to contraindications or intolerance.
    in combination with other medicinal products for the treatment of diabetes, including
    insulin, when these do not provide adequate glycaemic control (see sections 4.4,
    4.5 and 5.1 for available data on different combinations).'
