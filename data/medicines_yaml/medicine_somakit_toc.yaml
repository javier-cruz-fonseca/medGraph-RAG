  therapeutic_indication: This medicinal product is for diagnostic use only. After
    radiolabelling with gallium (68Ga) chloride solution, the solution of gallium
    (68Ga) edotreotide obtained is indicated for Positron Emission Tomography (PET)
    imaging of somatostatin receptor overexpression in adult patients with confirmed
    or suspected well-differentiated gastro-enteropancreatic neuroendocrine tumours
    (GEP-NET) for localizing primary tumours and their metastases.
