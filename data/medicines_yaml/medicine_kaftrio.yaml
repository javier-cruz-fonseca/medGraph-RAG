  therapeutic_indication: Kaftrio tablets are indicated in a combination regimen with
    ivacaftor for the treatment of cystic fibrosis (CF) in patients aged 6 years and
    older who have at least one non-Class I mutation in the cystic fibrosis transmembrane
    conductance regulator (CFTR) gene. Kaftrio granules are indicated in a combination
    regimen with ivacaftor for the treatment of cystic fibrosis (CF) in paediatric
    patients aged 2 to less than 6 years who have at least one non-Class I mutation
    in the cystic fibrosis transmembrane conductance regulator (CFTR) gene.
