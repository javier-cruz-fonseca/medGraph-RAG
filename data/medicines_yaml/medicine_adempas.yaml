  therapeutic_indication: Chronic thromboembolic pulmonary hypertension (CTEPH) Adempas
    is indicated for the treatment of adult patients with WHO Functional Class (FC)
    II to III with  inoperable CTEPH, persistent or recurrent CTEPH after surgical
    treatment, to improve exercise capacity.  Pulmonary arterial hypertension (PAH)
    AdultsAdempas, as monotherapy or in combination with endothelin receptor antagonists,
    is indicated for the treatment of adult patients with pulmonary arterial hypertension
    (PAH) with WHO Functional Class (FC) II to III to improve exercise capacity. Efficacy
    has been shown in a PAH population including aetiologies of idiopathic or heritable
    PAH or PAH associated with connective tissue disease. PaediatricsAdempas is indicated
    for the treatment of PAH in paediatric patients aged less than 18 years of age
    and body weight ? 50 kg with WHO Functional Class (FC) II to III in combination
    with endothelin receptor antagonists.
