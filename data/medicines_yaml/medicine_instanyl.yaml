  therapeutic_indication: Instanyl is indicated for the management of breakthrough
    pain in adults already receiving maintenance opioid therapy for chronic cancer
    pain. Breakthrough pain is a transitory exacerbation of pain that occurs on a
    background of otherwise controlled persistent pain.  Patients receiving maintenance
    opioid therapy are those who are taking at least 60 mg of oral morphine daily,
    at least 25 micrograms of transdermal fentanyl per hour, at least 30 mg oxycodone
    daily, at least 8 mg of oral hydromorphone daily or an equianalgesic dose of another
    opioid for a week or longer.
