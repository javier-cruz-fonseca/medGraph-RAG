  therapeutic_indication: Ferriprox monotherapy is indicated for the treatment of
    iron overload in patients with thalassaemia major when current chelation therapy
    is contraindicated or inadequate. Ferriprox in combination with another chelator
    is indicated in patients with thalassaemia major when monotherapy with any iron
    chelator is ineffective, or when prevention or treatment of life-threatening consequences
    of iron overload (mainly cardiac overload) justifies rapid or intensive correction.
