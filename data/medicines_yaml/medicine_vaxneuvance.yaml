  therapeutic_indication: Vaxneuvance is indicated for active immunisation for the
    prevention of invasive disease, pneumonia and acute otitis media caused by Streptococcus
    pneumoniae in infants, children and adolescents from 6 weeks to less than 18 years
    of age. Vaxneuvance is indicated for active immunisation for the prevention of
    invasive disease and pneumonia caused by Streptococcus pneumoniae in individuals
    18 years of age and older. See sections 4.4 and 5.1 for information on protection
    against specific pneumococcal serotypes. The use of Vaxneuvance should be in accordance
    with official recommendations.
