    \ who have either responded inadequately to, or who were intolerant to, previous\
    \ therapy with one or more disease-modifying anti-rheumatic drugs (DMARDs) or\
    \ tumour necrosis factor (TNF) antagonists. \tIn these patients, RoActemra can\
