    \ methotrexate (MTX) is indicated for the treatment of juvenile idiopathic polyarthritis\
    \ (pJIA; rheumatoid factor positive or negative and extended oligoarthritis) in\
    \ patients 2 years of age and older, who have responded inadequately to previous\
