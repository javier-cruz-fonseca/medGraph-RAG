    \ RoActemra is indicated for the treatment of active systemic juvenile idiopathic\
    \ arthritis (sJIA) in patients 2 years of age and older, who have responded inadequately\
    \ to previous therapy with NSAIDs and systemic corticosteroids. RoActemra can\
