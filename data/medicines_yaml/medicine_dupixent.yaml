  therapeutic_indication: Atopic dermatitis Adults and adolescentsDupixent is indicated
    for the treatment of moderate-to-severe atopic dermatitis in adults and adolescents
    12 years and older who are candidates for systemic therapy. Children 6 months
    to 11 years of ageDupixent is indicated for the treatment of severe atopic dermatitis
    in children 6 months to 11 years old who are candidates for systemic therapy.
    Asthma Adults and adolescentsDupixent is indicated in adults and adolescents 12
    years and older as add-on maintenance treatment for severe asthma with type 2
    inflammation characterised by raised blood eosinophils and/or raised fraction
    of exhaled nitric oxide (FeNO), see section 5.1, who are inadequately controlled
    with high dose inhaled corticosteroids (ICS) plus another medicinal product for
    maintenance treatment. Children 6 to 11 years of ageDupixent is indicated in children
    6 to 11 years old as add-on maintenance treatment for severe asthma with type
    2 inflammation characterised by raised blood eosinophils and/or raised fraction
    of exhaled nitric oxide (FeNO), who are inadequately controlled with medium to
    high dose inhaled corticosteroids (ICS) plus another medicinal product for maintenance
    treatment. Chronic rhinosinusitis with nasal polyposis (CRSwNP) Dupixent is indicated
    as an add-on therapy with intranasal corticosteroids for the treatment of adults
    with severe CRSwNP for whom therapy with systemic corticosteroids and/or surgery
    do not provide adequate disease control. Prurigo Nodularis (PN) Dupixent is indicated
    for the treatment of adults with moderate-to-severe prurigo nodularis (PN) who
    are candidates for systemic therapy. Eosinophilic esophagitis (EoE) Dupixent is
    indicated for the treatment of eosinophilic esophagitis in adults, adolescents
    and children aged 1 year and older, weighing at least 15 kg, who are inadequately
    controlled by, are intolerant to, or who are not candidates for conventional medicinal
    therapy. Chronic obstructive pulmonary disease (COPD) Dupixent is indicated in
    adults as add-on maintenance treatment for uncontrolled chronic obstructive pulmonary
    disease (COPD) characterised by raised blood eosinophils on a combination of an
    inhaled corticosteroid (ICS), a long-acting beta2-agonist (LABA), and a long-acting
    muscarinic antagonist (LAMA), or on a combination of a LABA and a LAMA if ICS
    is not appropriate. Chronic Spontaneous Urticaria (CSU) Dupixent is indicated
    for the treatment of moderate to severe chronic spontaneous urticaria in adults
    and adolescents (12 years and above) patientswith inadequate response to H1 antihistamines
    and who are naive to anti-IgE therapy for CSU.
