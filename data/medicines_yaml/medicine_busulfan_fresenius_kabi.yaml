  therapeutic_indication: Busulfan Fresenius Kabi followed by cyclophosphamide (BuCy2)
    is indicated as conditioning treatment prior to conventional haematopoietic progenitor
    cell transplantation (HPCT) in adult patients when the combination is considered
    the best available option. Busulfan Fresenius Kabi followed by cyclophosphamide
    (BuCy4) or melphalan (BuMel) is indicated as conditioning treatment prior to conventional
    haematopoietic progenitor cell transplantation in paediatric patients.
