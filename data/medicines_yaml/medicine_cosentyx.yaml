  therapeutic_indication: Plaque psoriasis Cosentyx is indicated for the treatment
    of moderate to severe plaque psoriasis in adults and children from the age of
    6 years old who are candidates for systemic therapy. Hidradenitis suppurativa
    (HS) Cosentyx is indicated for the treatment of active moderate to severe hidradenitis
    suppurativa (acne inversa) in adults with an inadequate response to conventional
    systemic HS therapy. Psoriatic arthritis Cosentyx, alone or in combination with
    methotrexate (MTX), is indicated for the treatment of active psoriatic arthritis
    in adult patients when the response to previous disease modifying anti rheumatic
    drug (DMARD) therapy has been inadequate. Axial spondyloarthritis (axSpA) Ankylosing
    spondylitis (AS, radiographic axial spondyloarthritis) Cosentyx is indicated for
    the treatment of active ankylosing spondylitis in adults who have responded inadequately
    to conventional therapy. Non-radiographic axial spondyloarthritis (nr-axSpA) Cosentyx
    is indicated for the treatment of active non-radiographic axial spondyloarthritis
    with objective signs of inflammation as indicated by elevated C-reactive protein
    (CRP) and/or magnetic resonance imaging (MRI) evidence in adults who have responded
    inadequately to non steroidal anti inflammatory drugs (NSAIDs). Juvenile idiopathic
    arthritis (JIA) Enthesitis-related arthritis (ERA) Cosentyx, alone or in combination
    with methotrexate (MTX), is indicated for the treatment of active enthesitis-related
    arthritis in patients 6 years and older whose disease has responded inadequately
    to, or who cannot tolerate, conventional therapy. Juvenile psoriatic arthritis
    (JPsA) Cosentyx, alone or in combination with methotrexate (MTX), is indicated
    for the treatment of active juvenile psoriatic arthritis in patients 6 years and
    older whose disease has responded inadequately to, or who cannot tolerate, conventional
    therapy.
