  therapeutic_indication: Adult Crohn’s DiseaseSTELARA is indicated for the treatment
    of adult patients with moderately to severely active Crohn’s disease who have
    had an inadequate response with, lost response to, or were intolerant to either
    conventional therapy or a TNFα antagonist.Paediatric Crohn's DiseaseSTELARA is
    indicated for the treatment of moderately to severely active Crohn’s disease in
    paediatric patients weighing at least 40 kg, who have had an inadequate response
    to, or were intolerant to either conventional or biologic therapy.Ulcerative colitisSTELARA
    is indicated for the treatment of adult patients with moderately to severely active
    ulcerative colitis who have had an inadequate response with, lost response to,
    or were intolerant to either conventional therapy or a biologic. Plaque psoriasisSTELARA
    is indicated for the treatment of moderate to severe plaque psoriasis in adults
    who failed to respond to, or who have a contraindication to, or are intolerant
    to other systemic therapies including ciclosporin, methotrexate (MTX) or PUVA
    (psoralen and ultraviolet A) (see section 5.1).Psoriatic arthritis (PsA)STELARA,
    alone or in combination with MTX, is indicated for the treatment of active psoriatic
    arthritis in adult patients when the response to previous non-biological disease
    modifying anti rheumatic drug (DMARD) therapy has been inadequate (see section
    5.1).
