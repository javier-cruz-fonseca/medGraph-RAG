  therapeutic_indication: 'Qtern, fixed dose combination of saxagliptin and dapagliflozin,
    is indicated in adults aged 18 years and older with type 2 diabetes mellitus:  to
    improve glycaemic control when metformin and/or sulphonylurea (SU) and one of
    the monocomponents of Qtern do not provide adequate glycaemic control, when already
    being treated with the free combination of dapagliflozin and saxagliptin.  (See
    sections 4.2, 4.4, 4.5 and 5.1 for available data on combinations studied.)'
