  therapeutic_indication: Reyataz capsules, co-administered with low dose ritonavir,
    are indicated for the treatment of HIV-1 infected adults and paediatric patients
    6 years of age and older in combination with other antiretroviral medicinal products
    (see section 4.2). Based on available virological and clinical data from adult
    patients, no benefit is expected in patients with strains resistant to multiple
    protease inhibitors (? 4 PI mutations). The choice of Reyataz in treatment experienced
    adult and paediatric patients should be based on individual viral resistance testing
    and the patient’s treatment history (see sections 4.4 and 5.1). Reyataz oral powder,
    co-administered with low dose ritonavir, is indicated in combination with other
    antiretroviral medicinal products for the treatment of HIV-1 infected paediatric
    patients at least 3 months of age and weighing at least 5 kg (see section 4.2).
    Based on available virological and clinical data from adult patients, no benefit
    is expected in patients with strains resistant to multiple protease inhibitors
    (? 4 PI mutations). The choice of Reyataz in treatment experienced adult and paediatric
    patients should be based on individual viral resistance testing and the patient’s
    treatment history (see sections 4.4 and 5.1).
