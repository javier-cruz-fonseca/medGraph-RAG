  therapeutic_indication: 'Treatment Ertapenem SUN is indicated in paediatric patients
    (3 months to 17 years of age) and in adults for the treatment of the following
    infections when caused by bacteria known or very likely to be susceptible to ertapenem
    and when parenteral therapy is required (see sections 4.4 and 5.1):  Intra-abdominal
    infections Community acquired pneumonia Acute gynaecological infections Diabetic
    foot infections of the skin and soft tissue (see section 4.4)  Prevention Ertapenem
    SUN is indicated in adults for the prophylaxis of surgical site infection following
    elective colorectal surgery (see section 4.4). Consideration should be given to
    official guidance on the appropriate use of antibacterial agents.'
