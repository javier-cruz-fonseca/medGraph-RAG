  therapeutic_indication: 'Nordimet is indicated for the treatment of:  active rheumatoid
    arthritis in adult patients, polyarthritic forms of severe, active juvenile idiopathic
    arthritis (JIA), when the response to nonsteroidal anti-inflammatory drugs (NSAIDs)
    has been inadequate, moderate to severe plaque&nbsp;psoriasis in adults who are
    candidates&nbsp;for systemic therapy, and severe psoriatic arthritis in adult
    patients,&nbsp; induction of remission in moderate steroid-dependent Crohn''s
    disease in adult patients, in combination with corticosteroids and for maintenance
    of remission, as monotherapy, in patients who have responded to methotrexate.'
