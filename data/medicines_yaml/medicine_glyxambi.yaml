  therapeutic_indication: 'Glyxambi, fixed dose combination of empagliflozin and linagliptin,
    is indicated in adults aged 18 years and older with type 2 diabetes mellitus:  to
    improve glycaemic control when metformin and/or sulphonylurea (SU) and one of
    the monocomponents of Glyxambi do not provide adequate glycaemic control; when
    already being treated with the free combination of empagliflozin and linagliptin.'
