  therapeutic_indication: TachoSil is indicated in adults and children from 1 month
    of age for supportive treatment in surgery for improvement of haemostasis, to
    promote tissue sealing and for suture support in vascular surgery where standard
    techniques are insufficient. TachoSil is indicated in adults for supportive sealing
    of the dura mater to prevent postoperative cerebrospinal leakage following neurological
    surgery (see section 5.1).
