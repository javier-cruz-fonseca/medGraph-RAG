  therapeutic_indication: 'Noxafil gastro-resistant tablets are indicated for use
    in the treatment of the following fungal infections in adults (see sections 4.2
    and 5.1):  Invasive aspergillosis  Noxafil gastro-resistant tablets are indicated
    for use in the treatment of the following fungal infections in paediatric patients
    from 2 years of age weighing more than 40 kg and adults (see sections&nbsp; 4.2
    and 5.1):  Invasive aspergillosis in patients with disease that is refractory
    to amphotericin B or itraconazole or in patients who are intolerant of these medicinal
    products; Fusariosis in patients with disease that is refractory to amphotericin
    B or in patients who are intolerant of amphotericin B; Chromoblastomycosis and
    mycetoma in patients with disease that is refractory to itraconazole or in patients
    who are intolerant of itraconazole; Coccidioidomycosis in patients with disease
    that is refractory to amphotericin B, itraconazole or fluconazole or in patients
    who are intolerant of these medicinal products.  Refractoriness is defined as
    progression of infection or failure to improve after a minimum of 7 days of prior
    therapeutic doses of effective antifungal therapy. Noxafil gastro-resistant tablets
    are also indicated for prophylaxis of invasive fungal infections in the following
    paediatric patients from 2 years of age weighing more than 40 kg and adults (see
    sections 4.2 and 5.1):  Patients receiving remission-induction chemotherapy for
    acute myelogenous leukaemia (AML) or myelodysplastic syndromes (MDS) expected
    to result in prolonged neutropenia and who are at high risk of developing invasive
    fungal infections; Hematopoietic stem cell transplant (HSCT) recipients who are
    undergoing high-dose immunosuppressive therapy for graft versus host disease and
    who are at high risk of developing invasive fungal infections.  Please refer to
    the Summary of Product Characteristics of Noxafil oral suspension for use in oropharyngeal
    candidiasis. Noxafil concentrate for solution for infusion is indicated for use
    in the treatment of the following fungal infections in adults (see sections 4.2
    and 5.1):  Invasive aspergillosis  Noxafil concentrate for solution for infusion
    is indicated for use in the treatment of the following fungal infections in adult
    and paediatric patients from 2 years of age (see sections 4.2 and 5.1):  Invasive
    aspergillosis in patients with disease that is refractory to amphotericin B or
    itraconazole or in patients who are intolerant of these medicinal products; Fusariosis
    in patients with disease that is refractory to amphotericin B or in patients who
    are intolerant of amphotericin B; Chromoblastomycosis and mycetoma in patients
    with disease that is refractory to itraconazole or in patients who are intolerant
    of itraconazole; Coccidioidomycosis in patients with disease that is refractory
    to amphotericin B, itraconazole or fluconazole or in patients who are intolerant
    of these medicinal products.  Refractoriness is defined as progression of infection
    or failure to improve after a minimum of 7 days of prior therapeutic doses of
    effective antifungal therapy. Noxafil concentrate for solution for infusion is
    also indicated for prophylaxis of invasive fungal infections in the following
    adult and paediatric patients from 2 years of age (see sections 4.2 and 5.1):  Patients
    receiving remission-induction chemotherapy for acute myelogenous leukaemia (AML)
    or myelodysplastic syndromes (MDS) expected to result in prolonged neutropenia
    and who are at high risk of developing invasive fungal infections; Hematopoietic
    stem cell transplant (HSCT) recipients who are undergoing high-dose immunosuppressive
    therapy for graft versus host disease (GVHD) and who are at high risk of developing
    invasive fungal infections.  Please refer to the Summary of Product Characteristics
    of Noxafil oral suspension for use in oropharyngeal candidiasis. Noxafil gastro
    resistant powder and solvent for oral suspension is indicated for use in the treatment
    of the following fungal infections in paediatric patients from 2 years of age
    (see sections 4.2 and 5.1):  Invasive aspergillosis in patients with disease that
    is refractory to amphotericin B or itraconazole or in patients who are intolerant
    of these medicinal products; Fusariosis in patients with disease that is refractory
    to amphotericin B or in patients who are intolerant of amphotericin B; Chromoblastomycosis
    and mycetoma in patients with disease that is refractory to itraconazole or in
    patients who are intolerant of itraconazole; Coccidioidomycosis in patients with
    disease that is refractory to amphotericin B, itraconazole or fluconazole or in
    patients who are intolerant of these medicinal products.  Refractoriness is defined
    as progression of infection or failure to improve after a minimum of 7 days of
    prior therapeutic doses of effective antifungal therapy. Noxafil gastro-resistant
    powder and solvent for oral suspension is indicated for prophylaxis of invasive
    fungal infections in the following paediatric patients from 2&nbsp; years of age:  Patients
    receiving remission-induction chemotherapy for acute myelogenous leukaemia (AML)
    or myelodysplastic syndromes (MDS) expected to result in prolonged neutropenia
    and who are at high&nbsp; risk of developing invasive fungal infections; Haematopoietic
    stem cell transplant (HSCT) recipients who are undergoing high-dose immunosuppressive
    therapy for graft versus host disease and who are at high&nbsp; risk of developing
    invasive fungal infections.  Please refer to the Summary of Product Characteristics
    of Noxafil concentrate for solution for infusion and the gastro-resistant tablets
    for use in primary treatment of invasive aspergillosis. Please refer to the Summary
    of Product Characteristics of Noxafil oral suspension for use in oropharyngeal
    candidiasis. Noxafil oral suspension is indicated for use in the treatment of
    the following fungal infections in adults (see section 5.1):  Invasive aspergillosis
    in patients with disease that is refractory to amphotericin B or itraconazole
    or in patients who are intolerant of these medicinal products; Fusariosis in patients
    with disease that is refractory to amphotericin B or in patients who are intolerant
    of amphotericin B; Chromoblastomycosis and mycetoma in patients with disease that
    is refractory to itraconazole or in patients who are intolerant of itraconazole;
    Coccidioidomycosis in patients with disease that is refractory to amphotericin
    B, itraconazole or fluconazole or in patients who are intolerant of these medicinal
    products; Oropharyngeal candidiasis: as first-line therapy in patients who have
    severe disease or are immunocompromised, in whom response to topical therapy is
    expected to be poor.  Refractoriness is defined as progression of infection or
    failure to improve after a minimum of 7 days of prior therapeutic doses of effective
    antifungal therapy. Noxafil oral suspension is also indicated for prophylaxis
    of invasive fungal infections in the following patients:  Patients receiving remission-induction
    chemotherapy for acute myelogenous leukaemia (AML) or myelodysplastic syndromes
    (MDS) expected to result in prolonged neutropenia and who are at high risk of
    developing invasive fungal infections; Hematopoietic stem cell transplant (HSCT)
    recipients who are undergoing high-dose immunosuppressive therapy for graft versus
    host disease and who are at high risk of developing invasive fungal infections.  Please
    refer to the Summary of Product Characteristics of Noxafil concentrate for solution
    for infusion and the gastro-resistant tablets for use in primary treatment of
    invasive aspergillosis.'
