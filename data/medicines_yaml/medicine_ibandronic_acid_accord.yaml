  therapeutic_indication: Ibandronic acid is indicated in adults for  Prevention of
    skeletal events (pathological fractures, bone complications requiring radiotherapy
    or surgery) in patients with breast cancer and bone metastases. Treatment of tumour
    induced hypercalcaemia with or without metastases.  Treatment of osteoporosis
    in postmenopausal women at increased risk of fracture (see section 5.1). A reduction
    in the risk of vertebral fractures has been demonstrated, efficacy on femoral
    neck fractures has not been established.
