  therapeutic_indication: Non-Small Cell Lung Cancer (NSCLC)IMFINZI in combination
    with platinum-based chemotherapy as neoadjuvant treatment, followed by IMFINZI
    as monotherapy as adjuvant treatment, is indicated for the treatment of adults
    with resectable NSCLC at high risk of recurrence and no EGFR mutations or ALK
    rearrangements (for selection criteria, see section 5.1). IMFINZI as monotherapy
    is indicated for the treatment of locally advanced, unresectable non small cell
    lung cancer (NSCLC) in adults whose tumours express PD-L1 on ≥ 1% of tumour cells
    and whose disease has not progressed following platinum based chemoradiation therapy
    (see section 5.1).IMFINZI in combination with tremelimumab and platinum-based
    chemotherapy is indicated for the first-line treatment of adults with metastatic
    NSCLC with no sensitising EGFR mutations or ALK positive mutations. Small Cell
    Lung Cancer (SCLC)IMFINZI in combination with etoposide and either carboplatin
    or cisplatin is indicated for the first-line treatment of adults with extensive-stage
    small cell lung cancer (ES-SCLC). Biliary Tract Cancer (BTC)IMFINZI in combination
    with gemcitabine and cisplatin is indicated for the first line treatment of adults
    with unresectable or metastatic biliary tract cancer (BTC). Hepatocellular Carcinoma
    (HCC)IMFINZI as monotherapy is indicated for the first line treatment of adults
    with advanced or unresectable hepatocellular carcinoma (HCC).&nbsp; IMFINZI in
    combination with tremelimumab is indicated for the first line treatment of adults
    with advanced or unresectable hepatocellular carcinoma (HCC). Endometrial Cancer&nbsp;IMFINZI
    in combination with carboplatin and paclitaxel is indicated for the first-line
    treatment of adults with primary advanced or recurrent endometrial cancer who
    are candidates for systemic therapy, followed by maintenance treatment with:&nbsp;-
    IMFINZI as monotherapy in endometrial cancer that is mismatch repair deficient
    (dMMR)&nbsp;- IMFINZI in combination with olaparib in endometrial cancer that
    is mismatch repair proficient (pMMR). Muscle Invasive Bladder Cancer (MIBC)&nbsp;IMFINZI
    in combination with gemcitabine and cisplatin as neoadjuvant treatment, followed
    by IMFINZI as monotherapy adjuvant treatment after radical cystectomy, is indicated
    for the treatment of adults with resectable muscle invasive bladder cancer (MIBC).
