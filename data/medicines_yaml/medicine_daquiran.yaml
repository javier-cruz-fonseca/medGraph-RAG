  therapeutic_indication: DAQUIRAN tablets are indicated for treatment of the signs
    and symptoms of advanced idiopathic Parkinson's disease in combination with levodopa,
    i.e. over the course of the disease, when the effect of levodopa wears off or
    becomes inconsistent and fluctuations of the therapeutic effect occur (end of
    dose or "on off" fluctuations).
