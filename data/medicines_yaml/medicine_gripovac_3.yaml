  therapeutic_indication: 'Active immunisation of pigs from the age of 56 days onwards
    including pregnant sows against swine influenza caused by subtypes H1N1, H3N2
    and H1N2 to reduce clinical signs and viral lung load after infection. Onset of
    immunity: 7 days after primary vaccination. Duration of immunity: 4 months in
    pigs vaccinated between the age of 56 and 96 days and 6 months in pigs vaccinated
    for the first time at 96 days and above. Active immunisation of pregnant sows
    after finished primary immunisation by administration of a single dose 14 days
    prior to farrowing to develop high colostral immunity which provides clinical
    protection of piglets for at least 33 days after birth.'
