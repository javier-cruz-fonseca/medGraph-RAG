  therapeutic_indication: This medicinal product is for diagnostic use only.Elucirem
    is indicated in adults and children from birth for contrast-enhanced magnetic
    resonance imaging (MRI) to improve detection and visualization of pathologies
    with disruption of the blood-brain-barrier (BBB) and/or abnormal vascularity of:-
    the brain, spine, and associated tissues of the central nervous system (CNS);-
    the liver, kidney, pancreas, breast, lung, prostate, and musculoskeletal system.It
    should be used only when diagnostic information is essential and not available
    with unenhanced MRI.
