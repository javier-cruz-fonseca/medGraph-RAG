  therapeutic_indication: Paroxysmal nocturnal haemoglobinuria Fabhalta is indicated
    as monotherapy in the treatment of adult patients with paroxysmal nocturnal haemoglobinuria
    (PNH) who have haemolytic anaemia. Complement 3 glomerulopathy Fabhalta is indicated
    for the treatment of adult patients with complement 3 glomerulopathy (C3G) in
    combination with a renin-angiotensin system (RAS) inhibitor, or in patients who
    are RAS-inhibitor intolerant, or for whom a RAS inhibitor is contraindicated (see
    section 5.1).
