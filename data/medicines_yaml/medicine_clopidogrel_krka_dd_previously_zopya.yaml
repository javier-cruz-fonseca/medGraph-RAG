  therapeutic_indication: 'Secondary prevention of atherothrombotic events Clopidogrel
    is indicated in:  Adult patients suffering from myocardial infarction (from a
    few days until less than 35days), ischaemic stroke (from 7days until less than
    6months) or established peripheral arterial disease. Adult patients suffering
    from acute coronary syndrome: Non-ST segment elevation acute coronary syndrome
    (unstable angina or non-Q-wave myocardial infarction), including patients undergoing
    a stent placement following percutaneous coronary intervention, in combination
    with acetylsalicylic acid (ASA). ST segment elevation acute myocardial infarction,
    in combination with ASA in medically treated patients eligible for thrombolytic
    therapy.  Prevention of atherothrombotic and thromboembolic events in atrial fibrillation
    In adult patients with atrial fibrillation who have at least one risk factor for
    vascular events, are not suitable for treatment with Vitamin K antagonists (VKA)
    and who have a low bleeding risk, clopidogrel is indicated in combination with
    ASA for the prevention of atherothrombotic and thromboembolic events, including
    stroke.'
