  therapeutic_indication: Miglustat Gen.Orph is indicated for the oral treatment of
    adult patients with mild to moderate type 1 Gaucher disease.&nbsp; Miglustat Gen.Orph
    may be used only in the treatment of patients for whom enzyme replacement therapy
    is unsuitable. Miglustat Gen.Orph is indicated for the treatment of progressive
    neurological manifestations in adult patients and paediatric patients with Niemann-Pick
    type C disease.
