  therapeutic_indication: 'Trajenta is indicated in the treatment of type 2 diabetes
    mellitus to improve glycaemic control in adults: as monotherapy  in patients inadequately
    controlled by diet and exercise alone and for whom metformin is inappropriate
    due to intolerance, or contraindicated due to renal impairment.  as combination
    therapy  in combination with metformin when diet and exercise plus metformin alone
    do not provide adequate glycaemic control. in combination with a sulphonylurea
    and metformin when diet and exercise plus dual therapy with these medicinal products
    do not provide adequate glycaemic control. in combination with insulin with or
    without metformin, when this regimen alone, with diet and exercise, does not provide
    adequate glycaemic control.'
