  therapeutic_indication: Emblaveo is indicated for the treatment of the following
    infections in adult patients (see sections 4.4 and 5.1):• Complicated intra-abdominal
    infection (cIAI)• Hospital-acquired pneumonia (HAP), including ventilator-associated
    pneumonia (VAP)&nbsp;• Complicated urinary tract infection (cUTI), including pyelonephritisEmblaveo
    is also indicated for the treatment of infections due to aerobic Gram-negative
    organisms in adult patients with limited treatment options (see sections 4.2,
    4.4, and 5.1).Consideration should be given to official guidance on the appropriate
    use of antibacterial agents.
