  therapeutic_indication: Renvela is indicated for the control of hyperphosphataemia
    in adult patients receiving haemodialysis or peritoneal dialysis. Renvela is also
    indicated for the control of hyperphosphataemia in adult patients with chronic
    kidney disease not on dialysis with serum phosphorus ? 1.78 mmol/l. Renvela should
    be used within the context of a multiple therapeutic approach, which could include
    calcium supplement, 1,25-dihydroxy vitamin D3 or one of its analogues to control
    the development of renal bone disease.
