  therapeutic_indication: Pomalidomide Accord in combination with bortezomib and dexamethasone
    is indicated in the treatment of adult patients with multiple myeloma who have
    received at least one prior treatment regimen including lenalidomide. Pomalidomide
    Accord in combination with dexamethasone is indicated in the treatment of adult
    patients with relapsed and refractory multiple myeloma who have received at least
    two prior treatment regimens, including both lenalidomide and bortezomib, and
    have demonstrated disease progression on the last therapy.&nbsp;
