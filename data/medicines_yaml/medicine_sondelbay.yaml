  therapeutic_indication: Sondelbay is indicated in adults. Treatment of osteoporosis
    in postmenopausal women and in men at increased risk of fracture. In postmenopausal
    women, a significant reduction in the incidence of vertebral and non-vertebral
    fractures but not hip fractures have been demonstrated. Treatment of osteoporosis
    associated with sustained systemic glucocorticoid therapy in women and men at
    increased risk for fracture.
