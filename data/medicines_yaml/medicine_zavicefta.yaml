  therapeutic_indication: 'Zavicefta is indicated in adults and paediatric patients
    aged 3 months and older for the treatment of the following infections:  Complicated
    intra-abdominal infection (cIAI) Complicated urinary tract infection (cUTI), including
    pyelonephritis Hospital-acquired pneumonia (HAP), including ventilator associated
    pneumonia (VAP)  Treatment of patients with bacteraemia that occurs in association
    with, or is suspected to be associated with, any of the infections listed above.
    Zavicefta is also indicated for the treatment of infections due to aerobic Gram-negative
    organisms in adults and paediatric patients aged 3 months and older with limited
    treatment options. Consideration should be given to official guidance on the appropriate
    use of antibacterial agents.'
