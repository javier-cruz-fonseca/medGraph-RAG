  therapeutic_indication: Loqtorzi, in combination with cisplatin and gemcitabine,
    is indicated for the first-line treatment of adult patients with recurrent, not
    amenable to surgery or radiotherapy, or metastatic nasopharyngeal carcinoma. Loqtorzi,
    in combination with cisplatin and paclitaxel, is indicated for the first-line
    treatment of adult patients with unresectable advanced, recurrent, or metastatic
    oesophageal squamous cell carcinoma.
