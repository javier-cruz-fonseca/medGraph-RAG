  therapeutic_indication: Multiple myeloma Revlimid as monotherapy is indicated for
    the maintenance treatment of adult patients with newly diagnosed multiple myeloma
    who have undergone autologous stem cell transplantation. Revlimid as combination
    therapy with dexamethasone, or bortezomib and dexamethasone, or melphalan and
    prednisone (see section 4.2) is indicated for the treatment of adult patients
    with previously untreated multiple myeloma who are not eligible for transplant.
    Revlimid in combination with dexamethasone is indicated for the treatment of multiple
    myeloma in adult patients who have received at least one prior therapy. Myelodysplastic
    syndromes Revlimid as monotherapy is indicated for the treatment of adult patients
    with transfusion-dependent anemia due to low- or intermediate-1-risk myelodysplastic
    syndromes associated with an isolated deletion 5q cytogenetic abnormality when
    other therapeutic options are insufficient or inadequate. Mantle cell lymphoma
    Revlimid as monotherapy is indicated for the treatment of adult patients with
    relapsed or refractory mantle cell lymphoma. Follicular lymphoma Revlimid in combination
    with rituximab (anti-CD20 antibody) is indicated for the treatment of adult patients
    with previously treated follicular lymphoma (Grade 1 – 3a).
