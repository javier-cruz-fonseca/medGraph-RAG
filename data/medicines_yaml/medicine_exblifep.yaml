  therapeutic_indication: 'Exblifep is indicated for the treatment of the following
    infections in adults (see sections 4.4 and 5.1): - Complicated urinary tract infections
    (cUTI), including pyelonephritis - Hospital-acquired pneumonia (HAP), including
    ventilator associated pneumonia (VAP) Treatment of patients with bacteraemia that
    occurs in association with, or is suspected to be associated with, any of the
    infections listed above. Consideration should be given to official guidance on
    the appropriate use of antibacterial agents.'
