  inn_common_name: adjuvanted inactivated vaccine against Ornithobacterium rhinotracheale
    serotype A
  active_substance: inactivated whole cell suspension of Ornithobacterium rhinotracheale
    serotype A, strain B3263/91
therapeutic_information:
  therapeutic_area_mesh: ''
