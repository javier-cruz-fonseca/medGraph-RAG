  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: For passive immunisation of broilers induced by active immunisation
    of female broiler breeders to reduce infection with Ornithobacterium rhinotracheale
    serotype A when this agent is involved. Under field conditions passive immunity
    is transferred during lay for 43 weeks after the last vaccination of broiler breeders,
    resulting in a duration of passive immunity in broilers of at least 14 days after
    hatching.
