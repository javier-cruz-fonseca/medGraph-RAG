  therapeutic_indication: 'NovoSeven is indicated for the treatment of bleeding episodes
    and for the prevention of bleeding in those undergoing surgery or invasive procedures
    in the following patient groups:  in patients with congenital haemophilia with
    inhibitors to coagulation factors VIII or IX &gt; 5 Bethesda units (BU); in patients
    with congenital haemophilia who are expected to have a high anamnestic response
    to factor-VIII or factor-IX administration; in patients with acquired haemophilia;
    in patients with congenital factor-VII deficiency; in patients with Glanzmann''s
    thrombasthenia with antibodies to platelet glycoprotein (GP) IIb-IIIa and / or
    human leucocyte antigens (HLA), and with past or present refractoriness to platelet
    transfusions. in patients with Glanzmann’s thrombasthenia with past or present
    refractoriness to platelet transfusions, or where platelets are not readily available.'
