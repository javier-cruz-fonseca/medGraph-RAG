  therapeutic_indication: Selincro is indicated for the reduction of alcohol consumption
    in adult patients with alcohol dependence who have a high drinking-risk level
    (see section 5.1), without physical withdrawal symptoms and who do not require
    immediate detoxification. Selincro should only be prescribed in conjunction with
    continuous psychosocial support focused on treatment adherence and reducing alcohol
    consumption. Selincro should be initiated only in patients who continue to have
    a high drinking-risk level two weeks after initial assessment.
