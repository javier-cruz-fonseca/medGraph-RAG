  therapeutic_indication: Riltrava Aerosphere is indicated as a maintenance treatment
    in adult patients with moderate to severe chronic obstructive pulmonary disease
    (COPD) who are not adequately treated by a combination of an inhaled corticosteroid
    and a long-acting beta2 agonist or combination of a long-acting beta2 agonist
    and a long-acting muscarinic antagonist (for effects on symptoms control and prevention
    of exacerbations see section 5.1).
