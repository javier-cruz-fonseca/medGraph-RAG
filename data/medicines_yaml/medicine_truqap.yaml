  therapeutic_indication: Truqap is indicated in combination with fulvestrant for
    the treatment of adult patients with oestrogen receptor (ER)-positive, HER2-negative
    locally advanced or metastatic breast cancer with one or more PIK3CA/AKT1/PTEN-alterations
    following recurrence or progression on or after an endocrine-based regimen. In
    pre- or perimenopausal women, Truqap plus fulvestrant should be combined with
    a luteinising hormone releasing hormone (LHRH) agonist. For men, administration
    of LHRH agonist according to current clinical practice standards should be considered.
