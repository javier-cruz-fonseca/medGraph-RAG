  therapeutic_indication: 1.5-mg/0.3-ml and 2.5-mg/0.5-ml solution for injection Prevention
    of venous thromboembolic events (VTE) in adults undergoing major orthopaedic surgery
    of the lower limbs such as hip fracture, major knee surgery or hip-replacement
    surgery. Prevention of VTE in adults undergoing abdominal surgery who are judged
    to be at high risk of thromboembolic complications, such as patients undergoing
    abdominal cancer surgery. Prevention of VTE in adult medical patients who are
    judged to be at high risk for VTE and who are immobilised due to acute illness
    such as cardiac insufficiency and / or acute respiratory disorders, and / or acute
    infectious or inflammatory disease. Treatment of adults with acute symptomatic
    spontaneous superficial-vein thrombosis of the lower limbs without concomitant
    deep-vein thrombosis. 2.5-mg/0.5-ml solution for injection Treatment of unstable
    angina or non-ST-segment-elevation myocardial infarction (UA/NSTEMI) in adult
    patients for whom urgent (&lt; 120 mins) invasive management (PCI) is not indicated.
    infarction (STEMI) in adult patients who are managed with thrombolytics or who
    initially are to receive no other form of reperfusion therapy. 5-mg/0.4-ml, 7.5-mg/0.6-ml
    and 10-mg/0.8-ml solution for injection Treatment of adults with acute deep-vein
    thrombosis (DVT) and treatment of acute pulmonary embolism (PE), except in haemodynamically
    unstable patients or patients who require thrombolysis or pulmonary embolectomy.
