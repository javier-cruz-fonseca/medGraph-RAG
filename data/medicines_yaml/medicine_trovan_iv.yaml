  therapeutic_indication: 'Trovafloxacin is a synthetic broad spectrum quinolone antibacterial
    agent indicated for the treatment of the following infections in adults:  Pneumonia:
    Community Acquired Pneumonia and Nosocomial Pneumonia (mild, moderate, and severe).  Note:
    Efficacy in patients with very severe nosocomial pneumonia and in particular infections
    due to less susceptible pathogens e.g. P. aeruginosa, has not been established.
    See also section 4.2.  Acute Exacerbations of Chronic Bronchitis Acute Sinusitis
    Complicated Intra-abdominal Infections and Acute Pelvic Infections Salpingitis
    Uncomplicated Gonococcal Urethritis and Cervicitis Chlamydial Cervicitis Complicated
    Skin and Soft Tissue Infections  Consideration should be given to official guidance
    on the appropriate use of antibacterial agents.'
