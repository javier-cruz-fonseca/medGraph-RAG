  therapeutic_indication: Repaglinide is indicated in patients with type-2 diabetes
    (non-insulin-dependent diabetes mellitus (NIDDM)) whose hyperglycaemia can no
    longer be controlled satisfactorily by diet, weight reduction and exercise. Repaglinide
    is also indicated in combination with metformin in type-2 diabetes patients who
    are not satisfactorily controlled on metformin alone. Treatment should be initiated
    as an adjunct to diet and exercise to lower the blood glucose in relation to meals.
