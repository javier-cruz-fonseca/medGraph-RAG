  therapeutic_indication: Hard capsules Zerit is indicated in combination with other
    antiretroviral medicinal products for the treatment of HIV-infected adult patients
    and paediatric patients (over the age of three months) only when other antiretrovirals
    can not be used. The duration of therapy with Zerit should be limited to the shortest
    time possible. Powder for oral solution Zerit is indicated in combination with
    other antiretroviral medicinal products for the treatment of HIV-infected adult
    patients and paediatric patients (from birth) only when other antiretrovirals
    can not be used. The duration of therapy with Zerit should be limited to the shortest
    time possible.
