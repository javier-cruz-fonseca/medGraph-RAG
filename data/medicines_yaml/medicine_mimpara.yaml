  therapeutic_indication: 'Secondary hyperparathyroidism Adults Treatment of secondary
    hyperparathyroidism (HPT) in adult patients with end stage renal disease (ESRD)
    on maintenance dialysis therapy. Paediatric population Treatment of secondary
    hyperparathyroidism (HPT) in children aged 3 years and older with end stage renal
    disease (ESRD) on maintenance dialysis therapy in whom secondary HPT is not adequately
    controlled with standard of care therapy. Mimpara may be used as part of a therapeutic
    regimen including phosphate binders and/or Vitamin D sterols, as appropriate.
    Parathyroid carcinoma and primary hyperparathyroidism in adults. Reduction of
    hypercalcaemia in adult patients with:  parathyroid carcinoma; primary HPT for
    whom parathyroidectomy would be indicated on the basis of serum calcium levels
    (as defined by relevant treatment guidelines), but in whom parathyroidectomy is
    not clinically appropriate or is contraindicated.'
