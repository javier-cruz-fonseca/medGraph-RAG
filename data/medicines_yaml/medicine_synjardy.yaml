  therapeutic_indication: Synjardy is indicated in adults and children aged 10 years
    and above for the treatment of type 2 diabetes mellitus as an adjunct to diet
    and exercise:•&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; in patients
    insufficiently controlled on their maximally tolerated dose of metformin alone•&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    in combination with other medicinal products for the treatment of diabetes, in
    patients insufficiently controlled with metformin and these medicinal products•&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    in patients already being treated with the combination of empagliflozin and metformin
    as separate tablets.For study results with respect to combinations, effects on
    glycaemic control and cardiovascular events, and the population studied, see sections
    4.4, 4.5 and 5.1.
