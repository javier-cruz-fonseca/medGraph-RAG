  therapeutic_indication: In chickens and turkeys Pulsaflox oral solution is indicated
    for treatment of chronic respiratory infections caused by sensitive strains of
    Escherichia coli and Mycoplasma gallisepticum.In turkeys Pulsaflox oral solution
    is also indicated for the treatment of infections caused by Pasteurella multocida.Pulsaflox
    oral solution should only be used based on susceptibility testing.
