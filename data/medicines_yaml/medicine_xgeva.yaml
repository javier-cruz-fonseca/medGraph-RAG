  therapeutic_indication: Prevention of skeletal related events (pathological fracture,
    radiation to bone, spinal cord compression or surgery to bone) in adults with
    advanced malignancies involving bone (see section 5.1). Treatment of adults and
    skeletally mature adolescents with giant cell tumour of bone that is unresectable
    or where surgical resection is likely to result in severe morbidity.&nbsp;&nbsp;
