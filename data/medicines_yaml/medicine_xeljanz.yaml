  therapeutic_indication: Rheumatoid arthritisTofacitinib in combination with methotrexate
    (MTX) is indicated for the treatment of moderate to severe active rheumatoid arthritis
    (RA) in adult patients who have responded inadequately to, or who are intolerant
    to one or more disease-modifying antirheumatic drugs (DMARDs) (see section 5.1).
    Tofacitinib can be given as monotherapy in case of intolerance to MTX or when
    treatment with MTX is inappropriate (see sections 4.4 and 4.5). Psoriatic arthritisTofacitinib
    in combination with MTX is indicated for the treatment of active psoriatic arthritis
    (PsA) in adult patients who have had an inadequate response or who have been intolerant
    to a prior disease modifying antirheumatic drug (DMARD) therapy (see section 5.1).
    Ulcerative colitisTofacitinib is indicated for the treatment of adult patients
    with moderately to severely active ulcerative colitis (UC) who have had an inadequate
    response, lost response, or were intolerant to either conventional therapy or
    a biologic agent (see section 5.1). Tofacitinib is indicated for the treatment
    of active polyarticular juvenile idiopathic arthritis (rheumatoid factor positive
    [RF+] or negative [RF-] polyarthritis and extended oligoarthritis), and juvenile
    psoriatic arthritis (PsA) in patients 2 years of age and older, who have responded
    inadequately to previous therapy with disease modifying antirheumatic drugs (DMARDs).
    Tofacitinib can be given in combination with methotrexate (MTX) or as monotherapy
    in case of intolerance to MTX or where continued treatment with MTX is inappropriate.
    Ankylosing spondylitisTofacitinib is indicated for the treatment of adult patients
    with active ankylosing spondylitis (AS) who have responded inadequately to conventional
    therapy.
