  therapeutic_indication: 'For active immunisation of chickens and ducks against avian
    influenza virus type A, subtype H5. Chickens:Reduction of mortality and virus
    excretion after challenge.Onset of immunity: 3 weeks after the second injection.Duration
    of immunity in chickens has not been established yet. Ducks: Reduction of clinical
    signs and virus excretion after challenge.Onset of immunity: 3 weeks after the
    second injection.Duration of immunity in ducks : 14 weeks after the second injection.'
