  therapeutic_indication: Plaque psoriasisTaltz is indicated for the treatment of
    moderate to severe plaque psoriasis in adults who are candidates for systemic
    therapy.Paediatric plaque psoriasisTaltz is indicated for the treatment of moderate
    to severe plaque psoriasis in children from the age of 6 years and with a body
    weight of at least 25 kg and adolescents who are candidates for systemic therapy.Psoriatic
    arthritisTaltz, alone or in combination with methotrexate, is indicated for the
    treatment of active psoriatic arthritis in adult patients who have responded inadequately
    to, or who are intolerant to one or more disease-modifying anti-rheumatic drug
    (DMARD) therapies.&nbsp;Axial spondyloarthritis Ankylosing spondylitis (radiographic
    axial spondyloarthritis)Taltz is indicated for the treatment of adult patients
    with active ankylosing spondylitis who have responded inadequately to conventional
    therapy. Non-radiographic axial spondyloarthritis Taltz is indicated for the treatment
    of adult patients with active non-radiographic axial spondyloarthritis with objective
    signs of inflammation as indicated by elevated C-reactive protein (CRP) and/or
    magnetic resonance imaging (MRI) who have responded inadequately to nonsteroidal
    anti-inflammatory drugs (NSAIDs).Juvenile idiopathic arthritis (JIA)Juvenile psoriatic
    arthritis (JPsA)Taltz, alone or in combination with methotrexate, is indicated
    for the treatment of active JPsA in patients 6 years of age and older and with
    a body weight of at least 25 kg, who have had an inadequate response to, or who
    are intolerant of, conventional therapy.Enthesitis-related arthritis (ERA)Taltz,
    alone or in combination with methotrexate, is indicated for the treatment of active
    ERA in patients 6 years of age and older and with a body weight of at least 25
    kg, who have had an inadequate response to, or who are intolerant of, conventional
    therapy.
