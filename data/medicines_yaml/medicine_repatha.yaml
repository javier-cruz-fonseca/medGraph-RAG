  therapeutic_indication: 'Hypercholesterolaemia and mixed dyslipidaemia Repatha is
    indicated in adults with primary hypercholesterolaemia (heterozygous familial
    and non-familial) or mixed dyslipidaemia, as an adjunct to diet:  in combination
    with a statin or statin with other lipid lowering therapies in patients unable
    to reach LDL-C goals with the maximum tolerated dose of a statin or, alone or
    in combination with other lipid-lowering therapies in patients who are statin-intolerant,
    or for whom a statin is contraindicated.  Homozygous familial hypercholesterolaemia
    Repatha is indicated in adults and adolescents aged 12 years and over with homozygous
    familial hypercholesterolaemia in combination with other lipid-lowering therapies.
    Established atherosclerotic cardiovascular disease Repatha is indicated in adults
    with established atherosclerotic cardiovascular disease (myocardial infarction,
    stroke or peripheral arterial disease) to reduce cardiovascular risk by lowering
    LDL-C levels, as an adjunct to correction of other risk factors:  in combination
    with the maximum tolerated dose of a statin with or without other lipid-lowering
    therapies or, alone or in combination with other lipid-lowering therapies in patients
    who are statin-intolerant, or for whom a statin is contraindicated.  For study
    results with respect to effects on LDL-C, cardiovascular events and populations
    studied see section 5.1.'
