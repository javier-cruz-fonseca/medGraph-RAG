  therapeutic_indication: 'TAGRISSO as monotherapy is indicated for:  the adjuvant
    treatment after complete tumour resection in adult patients with stage IB-IIIA
    non-small cell lung cancer (NSCLC) whose tumours have epidermal growth factor
    receptor (EGFR) exon 19 deletions or exon 21 (L858R) substitution mutations (see
    section 5.1). the treatment of adult patients with locally advanced, unresectable
    NSCLC whose tumours have EGFR exon 19 deletions or exon 21 (L858R) substitution
    mutations and whose disease has not progressed during or following platinum‑based
    chemoradiation therapy. the first-line treatment of adult patients with locally
    advanced or metastatic NSCLC with activating EGFR mutations. the treatment of
    adult patients with locally advanced or metastatic EGFR T790M mutation-positive
    NSCLC.  TAGRISSO is indicated in combination with:  pemetrexed and platinum-based
    chemotherapy for the first-line treatment of adult patients with advanced NSCLC
    whose tumours have EGFR exon 19 deletions or exon 21 (L858R) substitution mutations.'
