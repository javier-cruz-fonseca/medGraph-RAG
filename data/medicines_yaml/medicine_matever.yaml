  therapeutic_indication: 'Matever is indicated as monotherapy in the treatment of
    partial-onset seizures with or without secondary generalisation in patients from
    16 years of age with newly diagnosed epilepsy. Matever is indicated as adjunctive
    therapy:  in the treatment of partial-onset seizures with or without secondary
    generalisation in adults, children and infants from one month of age with epilepsy;
    in the treatment of myoclonic seizures in adults and adolescents from 12 years
    of age with juvenile myoclonic epilepsy; in the treatment of primary generalised
    tonic-clonic seizures in adults and adolescents from 12 years of age with idiopathic
    generalised epilepsy.'
