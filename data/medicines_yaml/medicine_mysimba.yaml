  therapeutic_indication: Mysimba is indicated, as an adjunct to a reduced-calorie
    diet and increased physical activity, for the management of weight in adult patients
    (≥18 years) with an initial Body Mass Index (BMI) of  ≥ 30 kg/m2 (obese), or ≥
    27 kg/m2 to &lt; 30 kg/m2 (overweight) in the presence of one or more weight-related
    co morbidities (e.g., type 2 diabetes, dyslipidaemia, or controlled hypertension)  Treatment
    with Mysimba should be discontinued after 16 weeks if patients have not lost at
    least 5% of their initial body weight.
