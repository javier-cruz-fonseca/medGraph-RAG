  therapeutic_indication: Hepatocellular carcinoma Nexavar is indicated for the treatment
    of hepatocellular carcinoma. Renal cell carcinoma Nexavar is indicated for the
    treatment of patients with advanced renal cell carcinoma who have failed prior
    interferon-alpha or interleukin-2 based therapy or are considered unsuitable for
    such therapy. Differentiated thyroid carcinoma Nexavar is indicated for the treatment
    of patients with progressive, locally advanced or metastatic, differentiated (papillary/follicular/Hürthle
    cell) thyroid carcinoma, refractory to radioactive iodine.
