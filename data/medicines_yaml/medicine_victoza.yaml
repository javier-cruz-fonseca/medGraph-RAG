  therapeutic_indication: Victoza is indicated for the treatment of adults, adolescents
    and children aged 10 years and above with insufficiently controlled type 2 diabetes
    mellitus as an adjunct to diet and exercise  as monotherapy when metformin is
    considered inappropriate due to intolerance or contraindications in addition to
    other medicinal products for the treatment of diabetes.  For study results with
    respect to combinations, effects on glycaemic control and cardiovascular events,
    and the populations studied.
