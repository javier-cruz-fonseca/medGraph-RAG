  therapeutic_indication: 'For the treatment and prevention of flea (Ctenocephalides
    felis) infestations in dogs where one or more of the following indications are
    required concurrently:    prevention of heartworm disease (L3, L4 Dirofilaria
    immitis); prevention of angiostrongylosis by reducing the level of infection with
    immature adult (L5) Angiostrongylus vasorum; treatment of gastrointestinal nematode
    infections caused by hookworm (L4, immature adult, L5) and adult Ancylostoma caninum),
    roundworms (immature adult L5, and adult Toxocara canis and adult Toxascaris leonina)
    and whipworm (adult Trichuris vulpis).'
