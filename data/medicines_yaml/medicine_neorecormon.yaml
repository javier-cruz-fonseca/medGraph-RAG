  therapeutic_indication: Treatment of symptomatic anaemia associated with chronic
    renal failure (CRF) in adult and paediatric patients; treatment of symptomatic
    anaemia in adult patients with non-myeloid malignancies receiving chemotherapy;
    increasing the yield of autologous blood from patients in a pre-donation programme.
    Its use in this indication must be balanced against the reported increased risk
    of thromboembolic events. Treatment should only be given to patients with moderate
    anaemia (Hb 10 - 13 g/dl [6.21 - 8.07 mmol/l], no iron deficiency) if blood conserving
    procedures are not available or insufficient when the scheduled major elective
    surgery requires a large volume of blood (4 or more units of blood for females
    or 5 or more units for males).
