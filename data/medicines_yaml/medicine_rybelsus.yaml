  therapeutic_indication: Rybelsus is indicated for the treatment of adults with insufficiently
    controlled type 2 diabetes mellitus to improve glycaemic control as an adjunct
    to diet and exercise  as monotherapy when metformin is considered inappropriate
    due to intolerance or contraindications in combination with other medicinal products
    for the treatment of diabetes.  For study results with respect to combinations,
    effects on glycaemic control and cardiovascular events, and the populations studied,
    see sections 4.4, 4.5 and 5.1.
