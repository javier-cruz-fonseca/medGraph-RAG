  therapeutic_indication: Topotecan monotherapy is indicated for the treatment of
    patients with relapsed small cell lung cancer (SCLC) for whom re-treatment with
    the first-line regimen is not considered appropriate. Topotecan in combination
    with cisplatin is indicated for patients with carcinoma of the cervix recurrent
    after radiotherapy and for patients with Stage IVB disease. Patients with prior
    exposure to cisplatin require a sustained treatment free interval to justify treatment
    with the combination.
