  therapeutic_indication: Vibativ is indicated for the treatment of adults with nosocomial
    pneumonia including ventilator-associated pneumonia, known or suspected to be
    caused by methicillin-resistant Staphylococcus aureus (MRSA). Vibativ should be
    used only in situations where it is known or suspected that other alternatives
    are not suitable. Consideration should be given to official guidance on the appropriate
    use of antibacterial agents.
