  therapeutic_indication: 'Zydelig is indicated in combination with an anti?CD20 monoclonal
    antibody (rituximab or ofatumumab) for the treatment of adult patients with chronic
    lymphocytic leukaemia (CLL):  who have received at least one prior therapy, or
    as first line treatment in the presence of 17p deletion or TP53 mutation in patients
    who are not eligible for any other therapies.  Zydelig is indicated as monotherapy
    for the treatment of adult patients with follicular lymphoma (FL) that is refractory
    to two prior lines of treatment.'
