name: Comirnaty
basic_information:
  category: Human
  ema_product_number: EMEA/H/C/005735
  medicine_status: Authorised
  opinion_status: ''
  inn_common_name: COVID-19 mRNA vaccine
  active_substance: single-stranded, 5’-capped messenger RNA produced using a cell-free
    in vitro transcription from the corresponding DNA templates, encoding the viral
    spike (S) protein of SARS-CoV-2
therapeutic_information:
  therapeutic_area_mesh: COVID-19 virus infection
  atc_code_human: J07BN01
  atcvet_code_veterinary: ''
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: Comirnaty JN.1 dispersion for injection is indicated for
    active immunisation to prevent COVID-19 caused by SARS-CoV-2 in individuals 5
    years of age and older. The use of this vaccine should be in accordance with official
    recommendations. Comirnaty JN.1 concentrate for dispersion for injection is indicated
    for active immunisation to prevent COVID-19 caused by SARS-CoV-2 in infants and
    children aged 6 months to 11 years. The use of this vaccine should be in accordance
    with official recommendations. Comirnaty KP.2 dispersion for injection is indicated
    for active immunisation to prevent COVID-19 caused by SARS-CoV-2 in individuals
    5 years of age and older. The use of this vaccine should be in accordance with
    official recommendations. Comirnaty KP.2 concentrate for dispersion for injection
    is indicated for active immunisation to prevent COVID-19 caused by SARS-CoV-2
    in infants and children aged 6 months to 4 years. The use of this vaccine should
    be in accordance with official recommendations. Comirnaty LP.8.1 dispersion for
    injection is indicated for active immunisation to prevent COVID-19 caused by SARS-CoV-2
    in individuals 5 years of age and older. The use of this vaccine should be in
    accordance with official recommendations. Comirnaty LP.8.1 concentrate for dispersion
    for injection is indicated for active immunisation to prevent COVID-19 caused
    by SARS-CoV-2 in infants and children aged 6 months to 4 years. The use of this
    vaccine should be in accordance with official recommendations.
