    virus. This indication is based on immunogenicity data from healthy subjects from
    the age of 18 years onwards following administration of two doses of vaccine prepared
    from A/VietNam/1194/2004 NIBRG-14 (H5N1) (see section 5.1). Prepandemic influenza
    vaccine (H5N1) (split virion, inactivated, adjuvanted) GlaxoSmithKline Biologicals
    3.75 µg should be used in accordance with official guidance.
