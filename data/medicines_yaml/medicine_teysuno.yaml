  therapeutic_indication: 'Teysuno is indicated in adults: - for the treatment of
    advanced gastric cancer when given in combination with cisplatin (see section
    5.1). - as monotherapy or in combination with oxaliplatin or irinotecan, with
    or without bevacizumab, for the treatment of patients with metastatic colorectal
    cancer for whom it is not possible to continue treatment with another fluoropyrimidine
    due to hand-foot syndrome or cardiovascular toxicity that developed in the adjuvant
    or metastatic setting.'
