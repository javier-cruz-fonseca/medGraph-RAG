  therapeutic_indication: 'Urothelial carcinoma&nbsp;Tecentriq as monotherapy is indicated
    for the treatment of adult patients with locally advanced or metastatic urothelial
    carcinoma (UC):  after prior platinum containing chemotherapy, or who are considered
    cisplatin ineligible, and whose tumours have a PD-L1 expression ≥ 5% (see section
    5.1).  Early-stage non-small cell lung cancer (NSCLC)&nbsp;Tecentriq as monotherapy
    is indicated as adjuvant treatment following complete resection and platinum-based
    chemotherapy for adult patients with NSCLC with a high risk of recurrence whose
    tumours have PD-L1 expression on ≥ 50% of tumour cells (TC) and who do not have
    EGFR mutant or ALK positive NSCLC (see section 5.1 for selection criteria).&nbsp;Advanced
    NSCLC&nbsp;&nbsp;Tecentriq, in combination with bevacizumab, paclitaxel and carboplatin,
    is indicated for the first-line treatment of adult patients with metastatic non-squamous
    non small cell lung cancer (NSCLC). In patients with EGFR mutant or ALK-positive
    NSCLC, Tecentriq, in combination with bevacizumab, paclitaxel and carboplatin,
    is indicated only after failure of appropriate targeted therapies (see section
    5.1).Tecentriq, in combination with nab paclitaxel and carboplatin, is indicated
    for the first line treatment of adult patients with metastatic non-squamous NSCLC
    who do not have EGFR mutant or ALK positive NSCLC (see section 5.1).Tecentriq
    as monotherapy is indicated for the first-line treatment of adult patients with
    metastatic non-small cell lung cancer (NSCLC) whose tumours have a PD-L1 expression
    ≥ 50% tumour cells (TC) or ≥ 10% tumour-infiltrating immune cells (IC) and who
    do not have EGFR mutant or ALK-positive NSCLC (see section 5.1).Tecentriq as monotherapy
    is indicated for the first-line treatment of adult patients with advanced NSCLC
    who are ineligible for platinum-based therapy (see section 5.1 for selection criteria).Tecentriq
    as monotherapy is indicated for the treatment of adult patients with locally advanced
    or metastatic NSCLC after prior chemotherapy. Patients with EGFR mutant or ALK
    positive NSCLC should also have received targeted therapies before receiving Tecentriq
    (see section 5.1).Small cell lung cancer (SCLC)Tecentriq, in combination with
    carboplatin and etoposide, is indicated for the first-line treatment of adult
    patients with extensive-stage small cell lung cancer (ES-SCLC) (see section 5.1).&nbsp;Triple-negative
    breast cancer (TNBC)Tecentriq in combination with nab-paclitaxel is indicated
    for the treatment of adult patients with unresectable locally advanced or metastatic
    TNBC whose tumours have PD-L1 expression ≥ 1% and who have not received prior
    chemotherapy for metastatic disease.Hepatocellular carcinomaTecentriq, in combination
    with bevacizumab, is indicated for the treatment of adult patients with advanced
    or unresectable hepatocellular carcinoma (HCC) who have not received prior systemic
    therapy (see section 5.1). Urothelial carcinoma (UC)&nbsp;Tecentriq as monotherapy
    is indicated for the treatment of adult patients with locally advanced or metastatic
    UC:  after prior platinum containing chemotherapy, or who are considered cisplatin
    ineligible, and whose tumours have a PD-L1 expression ≥ 5% (see section 5.1).  Early-stage
    non-small cell lung cancer (NSCLC)&nbsp;Tecentriq as monotherapy is indicated
    as adjuvant treatment following complete resection and platinum-based chemotherapy
    for adult patients with NSCLC with a high risk of recurrence whose tumours have
    PD-L1 expression on ≥ 50% of tumour cells (TC) and who do not have EGFR mutant
    or ALK positive NSCLC (see section 5.1 for selection criteria).&nbsp;Advanced
    NSCLC&nbsp;&nbsp;Tecentriq, in combination with bevacizumab, paclitaxel and carboplatin,
    is indicated for the first-line treatment of adult patients with metastatic non-squamous
    NSCLC. In patients with EGFR mutant or ALK-positive NSCLC, Tecentriq, in combination
    with bevacizumab, paclitaxel and carboplatin, is indicated only after failure
    of appropriate targeted therapies (see section 5.1).Tecentriq, in combination
    with nab paclitaxel and carboplatin, is indicated for the first line treatment
    of adult patients with metastatic non-squamous NSCLC who do not have EGFR mutant
    or ALK positive NSCLC (see section 5.1).Tecentriq as monotherapy is indicated
    for the first-line treatment of adult patients with metastatic NSCLC whose tumours
    have a PD-L1 expression ≥ 50% TC or ≥ 10% tumour-infiltrating immune cells (IC)
    and who do not have EGFR mutant or ALK-positive NSCLC (see section 5.1).Tecentriq
    as monotherapy is indicated for the first-line treatment of adult patients with
    advanced NSCLC who are ineligible for platinum-based therapy (see section 5.1
    for selection criteria).Tecentriq as monotherapy is indicated for the treatment
    of adult patients with locally advanced or metastatic NSCLC after prior chemotherapy.
    Patients with EGFR mutant or ALK positive NSCLC should also have received targeted
    therapies before receiving Tecentriq (see section 5.1).Small cell lung cancer
    (SCLC)&nbsp;Tecentriq, in combination with carboplatin and etoposide, is indicated
    for the first-line treatment of adult patients with extensive-stage small cell
    lung cancer (ES-SCLC) (see section 5.1).&nbsp;Triple-negative breast cancer (TNBC)Tecentriq
    in combination with nab-paclitaxel is indicated for the treatment of adult patients
    with unresectable locally advanced or metastatic TNBC whose tumours have PD-L1
    expression ≥ 1% and who have not received prior chemotherapy for metastatic disease.Hepatocellular
    carcinoma (HCC)Tecentriq, in combination with bevacizumab, is indicated for the
    treatment of adult patients with advanced or unresectable HCC who have not received
    prior systemic therapy (see section 5.1).'
