  therapeutic_indication: Polivy in combination with bendamustine and rituximab is
    indicated for the treatment of adult patients with relapsed/refractory diffuse
    large B-cell lymphoma (DLBCL) who are not candidates for haematopoietic stem cell
    transplant. Polivy in combination with rituximab, cyclophosphamide, doxorubicin,
    and prednisone (R-CHP) is indicated for the treatment of adult patients with previously
    untreated diffuse large B-cell lymphoma (DLBCL).
