  therapeutic_indication: 'Rituzena is indicated in adults for the following indications:
    Non-Hodgkin’s lymphoma (NHL)  Rituzena is indicated for the treatment of previously
    untreated patients with stage III IV follicular lymphoma in combination with chemotherapy.
    Rituzena monotherapy is indicated for treatment of patients with stage III IV
    follicular lymphoma who are chemo resistant or are in their second or subsequent
    relapse after chemotherapy. Rituzena is indicated for the treatment of patients
    with CD20 positive diffuse large B cell non Hodgkin’s lymphoma in combination
    with CHOP (cyclophosphamide, doxorubicin, vincristine, prednisolone) chemotherapy.  Chronic
    lymphocytic leukaemia (CLL)  Rituzena in combination with chemotherapy is indicated
    for the treatment of patients with previously untreated and relapsed/refractory
    CLL. Only limited data are available on efficacy and safety for patients previously
    treated with monoclonal antibodies including Rituzenaor patients refractory to
    previous Rituzena plus chemotherapy.  Granulomatosis with polyangiitis and microscopic
    polyangiitis  Rituzena, in combination with glucocorticoids, is indicated for
    the induction of remission in adult patients with severe, active granulomatosis
    with polyangiitis (Wegener’s) (GPA) and microscopic polyangiitis (MPA).'
