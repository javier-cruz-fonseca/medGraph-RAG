  therapeutic_indication: Adults  Treatment of adult patients with pulmonary arterial
    hypertension classified as WHO functional class II and III, to improve exercise
    capacity. Efficacy has been shown in primary pulmonary hypertension and pulmonary
    hypertension associated with connective tissue disease.  Paediatric population  Treatment
    of paediatric patients aged 1 year to 17 years old with pulmonary arterial hypertension.
    Efficacy in terms of improvement of exercise capacity or pulmonary haemodynamics
    has been shown in primary pulmonary hypertension and pulmonary hypertension associated
    with congenital heart disease.
