  therapeutic_indication: 'This medicinal product is for diagnostic use only. Striascan
    is indicated for detecting loss of functional dopaminergic neuron terminals in
    the striatum:  In adult patients with clinically uncertain parkinsonian syndromes,
    for example those with early symptoms, in order to help differentiate essential
    tremor from parkinsonian syndromes related to idiopathic Parkinson’s disease,
    multiple system atrophy and progressive supranuclear palsy. Striascan is unable
    to discriminate between Parkinson''s disease, multiple system atrophy and progressive
    supranuclear palsy. In adult patients, to help differentiate probable dementia
    with Lewy bodies from Alzheimer’s disease. Striascan is unable to discriminate
    between dementia with Lewy bodies and Parkinson’s disease dementia.'
