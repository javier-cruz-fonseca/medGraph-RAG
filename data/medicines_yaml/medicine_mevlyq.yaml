  therapeutic_indication: Mevlyq is indicated for the treatment of adult patients
    with locally advanced or metastatic breast cancer who have progressed after at
    least one chemotherapeutic regimen for advanced disease. Prior therapy should
    have included an anthracycline and a taxane in either the adjuvant or metastatic
    setting unless patients were not suitable for these treatments. Mevlyq is indicated
    for the treatment of adult patients with unresectable liposarcoma who have received
    prior anthracycline containing therapy (unless unsuitable) for advanced or metastatic
    disease.
