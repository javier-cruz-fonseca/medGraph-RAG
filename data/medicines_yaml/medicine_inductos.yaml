  therapeutic_indication: Inductos is indicated for single level lumbar interbody
    spine fusion as a substitute for autogenous bone graft in adults with degenerative
    disc disease who have had at least 6 months of non operative treatment for this
    condition. Inductos is indicated for the treatment of acute tibia fractures in
    adults, as an adjunct to standard care using open fracture reduction and intramedullary
    unreamed nail fixation.
