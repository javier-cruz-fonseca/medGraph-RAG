  therapeutic_indication: Mvasi in combination with fluoropyrimidine-based chemotherapy
    is indicated for treatment of adult patients with metastatic carcinoma of the
    colon or rectum. Mvasi in combination with paclitaxel is indicated for first-line
    treatment of adult patients with metastatic breast cancer. For further information
    as to human epidermal growth factor receptor 2 (HER2) status, please refer to
    section 5.1. Mvasi, in addition to platinum-based chemotherapy, is indicated for
    first-line treatment of adult patients with unresectable advanced, metastatic
    or recurrent non-small cell lung cancer other than predominantly squamous cell
    histology. Mvasi in combination with interferon alfa-2a is indicated for first-line
    treatment of adult patients with advanced and/or metastatic renal cell cancer.
    Mvasi, in combination with carboplatin and paclitaxel is indicated for the front-line
    treatment of adult patients with advanced (International Federation of Gynecology
    and Obstetrics (FIGO) stages IIIB, IIIC and IV) epithelial ovarian, fallopian
    tube, or primary peritoneal cancer. Mvasi, in combination with carboplatin and
    gemcitabine or in combination with carboplatin and paclitaxel, is indicated for
    treatment of adult patients with first recurrence of platinum-sensitive epithelial
    ovarian, fallopian tube or primary peritoneal cancer who have not received prior
    therapy with bevacizumab or other VEGF inhibitors or VEGF receptor-targeted agents.
    Mvasi in combination with paclitaxel, topotecan, or pegylated liposomal doxorubicin
    is indicated for the treatment of adult patients with platinum-resistant recurrent
    epithelial ovarian, fallopian tube, or primary peritoneal cancer who received
    no more than two prior chemotherapy regimens and who have not received prior therapy
    with bevacizumab or other VEGF inhibitors or VEGF receptor-targeted agents. Mvasi,
    in combination with paclitaxel and cisplatin or, alternatively, paclitaxel and
    topotecan in patients who cannot receive platinum therapy, is indicated for the
    treatment of adult patients with persistent, recurrent, or metastatic carcinoma
    of the cervix.
