  therapeutic_indication: Adults Olanzapine is indicated for the treatment of schizophrenia.
    Olanzapine is effective in maintaining the clinical improvement during continuation
    therapy in patients who have shown an initial treatment response. Olanzapine is
    indicated for the treatment of moderate to severe manic episode. In patients whose
    manic episode has responded to olanzapine treatment, olanzapine is indicated for
    the prevention of recurrence in patients with bipolar disorder.
