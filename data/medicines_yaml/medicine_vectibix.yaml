  therapeutic_indication: 'Vectibix is indicated for the treatment of adult patients
    with wild-type RAS metastatic colorectal cancer (mCRC):  in first-line in combination
    with Folfox or Folfiri. in second-line in combination with Folfiri for patients
    who have received first-line fluoropyrimidine-based chemotherapy (excluding irinotecan).
    as monotherapy after failure of fluoropyrimidine-, oxaliplatin-, and irinotecan-containing
    chemotherapy regimens.'
