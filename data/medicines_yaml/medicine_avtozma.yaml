    factor (TNF) antagonists.  In these patients, Avtozma can be given as monotherapy
    in case of intolerance to MTX or where continued treatment with MTX is inappropriate.
    Avtozma has been shown to reduce the rate of progression of joint damage as measured
    by X-ray and to improve physical function when given in combination with methotrexate.
    Avtozma is indicated for the treatment of active systemic juvenile idiopathic
