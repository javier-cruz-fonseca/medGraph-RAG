  therapeutic_indication: Zevalin is indicated in adults. [90Y]-radiolabelled Zevalin
    is indicated as consolidation therapy after remission induction in previously
    untreated patients with follicular lymphoma. The benefit of Zevalin following
    rituximab in combination with chemotherapy has not been established. [90Y]-radiolabelled
    Zevalin is indicated for the treatment of adult patients with rituximab relapsedorrefractory
    CD20+ follicular B-cell non-Hodgkin's lymphoma (NHL).
