  therapeutic_indication: Atazanavir Viatris, co-administered with low dose ritonavir,
    is indicated for the treatment of HIV 1 infected adults and paediatric patients
    6 years of age and older in combination with other antiretroviral medicinal products.Based
    on available virological and clinical data from adult patients, no benefit is
    expected in patients with strains resistant to multiple protease inhibitors (≥
    4 PI mutations). There are very limited data available from children aged 6 to
    less than 18 years.&nbsp;The choice of Atazanavir&nbsp; Viatrisin treatment experienced
    adult and paediatric patients should be based on individual viral resistance testing
    and the patient’s treatment history.
