  therapeutic_indication: Cimzia, in combination with methotrexate (MTX), is indicated
    for the treatment of moderate to severe, active rheumatoid arthritis (RA) in adult
    patients when the response to disease-modifying antirheumatic drugs (DMARD) including
    methotrexate, has been inadequate.Cimzia can be given as monotherapy in case of
    intolerance to methotrexate or when continued treatment with methotrexate is inappropriate.Cimzia
    has been shown to reduce the rate of progression of joint damage as measured by
    X-ray and to improve physical function, when given in combination with methotrexate.
