  therapeutic_indication: 'Ibrance is indicated for the treatment of hormone receptor
    (HR) positive, human epidermal growth factor receptor 2 (HER2) negative locally
    advanced or metastatic breast cancer:  in combination with an aromatase inhibitor;
    in combination with fulvestrant in women who have received prior endocrine therapy.  In
    pre- or perimenopausal women, the endocrine therapy should be combined with a
    luteinizing hormone releasing hormone (LHRH) agonist.'
