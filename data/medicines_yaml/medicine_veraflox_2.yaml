  therapeutic_indication: Dogs:Infections of the skin and soft tissues, i.e. superficial
    and deep pyoderma and wound infections caused by Gram-positive organisms, typically
    Staphylococcus spp. and Streptococcus spp., and Gram-negative organisms such as
    Escherichia coli, Pseudomonas spp. and Proteus spp.Infections of the urinary tract
    caused by Gram-negative bacteria such as enterobacteriaceae, e.g. Escherichia
    coli, Enterobacter spp., Klebsiella spp. and Proteus spp., Pseudomonas spp., and
    Gram-positive organisms, typically Staphylococcus spp.Infections of the gingiva
    and periodontal tissues caused by anaerobic organisms, for example Porphyromonas
    spp., Prevotella spp.; Fusobacterium spp., Eikenella spp. and capnophilic bacteria
    such as Capnocytophaga spp. Cats:Infections of the respiratory tract caused by
    Gram-negative organisms such as Pasteurella spp., Escherichia coli and Pseudomonas
    spp., and Gram-positive organisms such as Streptococcus spp. and Staphylococcus
    spp.
