  therapeutic_indication: Busilvex followed by cyclophosphamide (BuCy2) is indicated
    as conditioning treatment prior to conventional haematopoietic progenitor cell
    transplantation (HPCT) in adult patients when the combination is considered the
    best available option. Busilvex following fludarabine (FB) is indicated as conditioning
    treatment prior to haematopoietic progenitor cell transplantation (HPCT) in adult
    patients who are candidates for a reduced-intensity conditioning (RIC) regimen.
    Busilvex followed by cyclophosphamide (BuCy4) or melphalan (BuMel) is indicated
    as conditioning treatment prior to conventional haematopoietic progenitor cell
    transplantation in paediatric patients.
