  therapeutic_indication: Plaque psoriasis Bimzelx is indicated for the treatment
    of moderate to severe plaque psoriasis in adults who are candidates for systemic
    therapy. Psoriatic arthritis Bimzelx, alone or in combination with methotrexate,
    is indicated for the treatment of active psoriatic arthritis in adults who have
    had an inadequate response or who have been intolerant to one or more disease-modifying
    antirheumatic drugs (DMARDs). Axial spondyloarthritis Non-radiographic axial spondyloarthritis
    (nr-axSpA) Bimzelx is indicated for the treatment of adults with active non-radiographic
    axial spondyloarthritis with objective signs of inflammation as indicated by elevated
    C-reactive protein (CRP) and/or magnetic resonance imaging (MRI) who have responded
    inadequately or are intolerant to non-steroidal anti-inflammatory drugs (NSAIDs).
    Ankylosing spondylitis (AS, radiographic axial spondyloarthritis) Bimzelx is indicated
    for the treatment of adults with active ankylosing spondylitis who have responded
    inadequately or are intolerant to conventional therapy. Hidradenitis suppurativa
    (HS)Bimzelx is indicated for the treatment of active moderate to severe hidradenitis
    suppurativa (acne inversa) in adults with an inadequate response to conventional
    systemic HS therapy.
