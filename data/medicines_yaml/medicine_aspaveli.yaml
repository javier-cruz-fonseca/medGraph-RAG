  therapeutic_indication: Aspaveli is indicated as monotherapy in the treatment of
    adult patients with paroxysmal nocturnal haemoglobinuria (PNH) who have haemolytic
    anaemia. Aspaveli is indicated for the treatment of adult and adolescent patients
    aged 12 to 17 years with C3 glomerulopathy (C3G) or primary immune-complex membranoproliferative
    glomerulonephritis (IC-MPGN) in combination with a renin-angiotensin system (RAS)
    inhibitor, unless RAS inhibitor treatment is not tolerated or contraindicated.
