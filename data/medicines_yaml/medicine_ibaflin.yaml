  therapeutic_indication: 'Dogs: Ibaflin is indicated for the treatment of the following
    conditions in dogs:  dermal infections (pyoderma - superficial and deep, wounds,
    abscesses) caused by susceptible strains of Staphylococci, Escherichia coli and
    Proteus mirabilis; acute, uncomplicated urinary-tract infections, caused by susceptible
    strains of Staphylococci, Proteus species, Enterobacter spp., E. coli and Klebsiella
    spp.; respiratory-tract infections (upper tract) caused by susceptible strains
    of Staphylococci, E. coli, and Klebsiella spp.  Ibaflin gel is indicated in dogs
    for the treatment of the following conditions:  dermal infections (pyoderma -
    superficial and deep, wounds, abscesses) caused by susceptible pathogens such
    as Staphylococcus spp., E. coli and P. mirabilis.  Cats: Ibaflin gel is indicated
    in cats for treatment of the following conditions:  dermal infections (soft-tissue
    infections - wounds, abscesses) caused by susceptible pathogens such as Staphylococcus
    spp., E. coli, Proteus spp. and Pasteurella spp.; upper respiratory-tract infections
    caused by susceptible pathogens such as Staphylococcus spp., E. coli, Klebsiella
    spp. and Pasteurella spp.'
