  therapeutic_indication: Active immunisation against invasive disease and acute otitis
    media caused by Streptococcus pneumoniae in infants and children from six weeks
    up to five years of age. See sections 4.4 and 5.1 in product information for information
    on protection against specific pneumococcal serotypes. The use of Synflorix should
    be determined on the basis of official recommendations taking into consideration
    the impact of invasive disease in different age groups as well as the variability
    of serotype epidemiology in different geographical areas.
