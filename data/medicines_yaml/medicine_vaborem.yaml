  therapeutic_indication: 'Vaborem is indicated for the treatment of the following
    infections in adults:  Complicated urinary tract infection (cUTI), including pyelonephritis
    Complicated intra-abdominal infection (cIAI) Hospital-acquired pneumonia (HAP),
    including ventilator associated pneumonia (VAP).  Treatment of patients with bacteraemia
    that occurs in association with, or is suspected to be associated with, any of
    the infections listed above. Vaborem is also indicated for the treatment of infections
    due to aerobic Gram-negative organisms in adults with limited treatment options.
    Consideration should be given to official guidance on the appropriate use of antibacterial
    agents.'
