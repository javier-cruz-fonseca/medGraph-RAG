  therapeutic_indication: Conbriza is indicated for the treatment of postmenopausal
    osteoporosis in women at increased risk of fracture. A significant reduction in
    the incidence of vertebral fractures has been demonstrated; efficacy on hip fractures
    has not been established. When determining the choice of Conbriza or other therapies,
    including oestrogens, for an individual postmenopausal woman, consideration should
    be given to menopausal symptoms, effects on uterine and breast tissues, and cardiovascular
    risks and benefits.
