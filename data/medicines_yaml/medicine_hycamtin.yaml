  therapeutic_indication: Hycamtin capsules are indicated as monotherapy for the treatment
    of adult patients with relapsed small cell lung cancer (SCLC) for whom re-treatment
    with the first-line regimen is not considered appropriate. Topotecan is indicated
    for the treatment of patients with metastatic carcinoma of the ovary after failure
    of first-line or subsequent therapy. Hycamtin capsules are indicated as monotherapy
    for the treatment of adult patients with relapsed small cell lung cancer (SCLC)
    for whom re-treatment with the first-line regimen is not considered appropriate.
