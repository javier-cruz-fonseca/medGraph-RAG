  therapeutic_indication: 'Prevention of lower respiratory tract disease (LRTD) and
    acute respiratory disease (ARD) caused by respiratory syncytial virus (RSV). mRESVIA
    is indicated for active immunisation for the prevention of lower respiratory tract
    disease (LRTD) caused by Respiratory Syncytial Virus (RSV) in: - adults 60 years
    of age and older - adults 18 through 59 years of age who are at increased risk
    for LRTD caused by RSV. &nbsp; The use of this vaccine should be in accordance
    with official recommendations.'
