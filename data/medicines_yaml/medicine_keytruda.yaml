  therapeutic_indication: 'Melanoma Keytruda as monotherapy is indicated for the treatment
    of adults and adolescents aged 12 years and older with advanced (unresectable
    or metastatic) melanoma. Keytruda&nbsp;as monotherapy is indicated for the adjuvant
    treatment of adults and adolescents aged 12 years and older with Stage IIB, IIC,
    or with Stage III melanoma and lymph node involvement who have undergone complete
    resection. Non small cell lung carcinoma (NSCLC) Keytruda, in combination with
    platinum-containing chemotherapy as neoadjuvant treatment, and then continued
    as monotherapy as adjuvant treatment, is indicated for the treatment of resectable
    non small cell lung carcinoma at high risk of recurrence in adults Keytruda as
    monotherapy is indicated for the adjuvant treatment of adults with non-small cell
    lung carcinoma who are at high risk of recurrence following complete resection
    and platinum based chemotherapy (for selection criteria, see section 5.1). Keytruda&nbsp;as
    monotherapy is indicated for the first line treatment of metastatic non small
    cell lung carcinoma in adults whose tumours express PD L1 with a ≥ 50% tumour
    proportion score (TPS) with no EGFR or ALK positive tumour mutations. Keytruda,
    in combination with pemetrexed and platinum chemotherapy, is indicated for the
    first-line treatment of metastatic non squamous non small cell lung carcinoma
    in adults whose tumours have no EGFR or ALK positive mutations. Keytruda, in combination
    with carboplatin and either paclitaxel or nab paclitaxel, is indicated for the
    first line treatment of metastatic squamous non small cell lung carcinoma in adults.
    Keytruda&nbsp; as monotherapy is indicated for the treatment of locally advanced
    or metastatic non small cell lung carcinoma in adults whose tumours express PD
    L1 with a&nbsp;≥ 1% TPS and who have received at least one prior chemotherapy
    regimen. Patients with EGFR or ALK positive tumour mutations should also have
    received targeted therapy before receiving KEYTRUDA. Malignant pleural mesothelioma
    (MPM) Keytruda, in combination with pemetrexed and platinum chemotherapy, is indicated
    for the first‑line treatment of adults with unresectable non-epithelioid malignant
    pleural mesothelioma. Classical Hodgkin lymphoma (cHL) Keytruda&nbsp;as monotherapy
    is indicated for the treatment of adult and paediatric patients aged 3 years and
    older with relapsed or refractory classical Hodgkin lymphoma who have failed autologous
    stem cell transplant (ASCT) or following at least two prior therapies when ASCT
    is not a treatment option. Urothelial carcinoma Keytruda as monotherapy is indicated
    for the treatment of locally advanced or metastatic urothelial carcinoma in adults
    who have received prior platinum containing chemotherapy.Keytruda as monotherapy
    is indicated for the treatment of locally advanced or metastatic urothelial carcinoma
    in adults who are not eligible for cisplatin containing chemotherapy and whose
    tumours express PD L1 with a combined positive score (CPS) ≥ 10. Head and neck
    squamous cell carcinoma (HNSCC) Keytruda as monotherapy is indicated for the treatment
    of resectable locally advanced head and neck squamous cell carcinoma as neoadjuvant
    treatment, continued as adjuvant treatment in combination with radiation therapy
    with or without concomitant cisplatin and then as monotherapy in adults whose
    tumours express PD-L1 with a CPS&nbsp;≥&nbsp;1. Keytruda, as monotherapy or in
    combination with platinum and 5 fluorouracil (5 FU) chemotherapy, is indicated
    for the first line treatment of metastatic or unresectable recurrent head and
    neck squamous cell carcinoma in adults whose tumours express PD L1 with a CPS
    ≥&nbsp;1. Keytruda&nbsp;as monotherapy is indicated for the treatment of recurrent
    or metastatic head and neck squamous cell carcinoma in adults whose tumours express
    PD L1 with a ? 50% TPS and progressing on or after platinum containing chemotherapy.
    Renal cell carcinoma (RCC) Keytruda, in combination with axitinib, is indicated
    for the first line treatment of advanced renal cell carcinoma in adults. Keytruda,
    in combination with lenvatinib, is indicated for the first line treatment of advanced
    renal cell carcinoma in adults. Keytruda as monotherapy is indicated for the adjuvant
    treatment of adults with renal cell carcinoma at increased risk of recurrence
    following nephrectomy, or following nephrectomy and resection of metastatic lesions
    (for selection criteria, please see section 5.1). Microsatellite instability high
    (MSI-H) or mismatch repair deficient (dMMR) cancers Colorectal cancer (CRC)Keytruda&nbsp;as
    monotherapy is indicated for theadults with MSI-H or dMMR colorectal cancer in
    the following settings:  first line treatment of metastatic microsatellite instability
    high (MSI H) or mismatch repair deficient (dMMR) colorectal cancer in adults;
    treatment of unresectable or metastatic colorectal cancer after previous fluoropyrimidine
    based combination therapy.&nbsp;  Non-colorectal cancersKeytruda&nbsp;as monotherapy
    is indicated for the treatment of the following MSI H or dMMR tumours in adults
    with:  advanced or recurrent endometrial carcinoma, who have disease progression
    on or following prior treatment with a platinum containing therapy in any setting
    and who are not candidates for curative surgery or radiation; unresectable or
    metastatic gastric, small intestine, or biliary cancer, who have disease progression
    on or following at least one prior therapy.  Oesophageal carcinoma Keytruda, in
    combination with platinum and fluoropyrimidine based chemotherapy, is indicated
    for the first-line treatment of locally advanced unresectable or metastatic carcinoma
    of the oesophagus in adults whose tumours express PD L1 with a CPS&nbsp;≥ 10.
    Triple negative breast cancer (TNBC) Keytruda, in combination with chemotherapy
    as neoadjuvant treatment, and then continued as monotherapy as adjuvant treatment
    after surgery, is indicated for the treatment of adults with locally advanced,
    or early stage triple negative breast cancer at high risk of recurrence. Keytruda,
    in combination with chemotherapy, is indicated for the treatment of locally recurrent
    unresectable or metastatic triple negative breast cancer in adults whose tumours
    express PD L1 with a CPS&nbsp;≥ 10 and who have not received prior chemotherapy
    for metastatic disease. Endometrial carcinoma (EC) Keytruda, in combination with
    carboplatin and paclitaxel, is indicated for the first-line treatment of primary
    advanced or recurrent endometrial carcinoma in adults who are candidates for systemic
    therapy.&nbsp; Keytruda, in combination with lenvatinib, is indicated for the
    treatment of advanced or recurrent endometrial carcinoma in adults who have disease
    progression on or following prior treatment with a platinum containing therapy
    in any setting and who are not candidates for curative surgery or radiation. Cervical
    cancer Keytruda, in combination with chemoradiotherapy (external beam radiation
    therapy followed by brachytherapy), is indicated for the treatment of FIGO 2014
    Stage III - IVA locally advanced cervical cancer in adults who have not received
    prior definitive therapy.&nbsp; Keytruda, in combination with chemotherapy with
    or without bevacizumab, is indicated for the treatment of persistent, recurrent,
    or metastatic cervical cancer in adults whose tumours express PD L1 with a CPS&nbsp;≥
    1. Gastric or gastro-oesophageal junction (GEJ) adenocarcinoma Keytruda, in combination
    with trastuzumab, fluoropyrimidine and platinum-containing chemotherapy, is indicated
    for the first-line treatment of locally advanced unresectable or metastatic HER2-positive
    gastric or gastro-oesophageal junction adenocarcinoma in adults whose tumours
    express PD-L1 with a CPS ≥ 1. Keytruda, in combination with fluoropyrimidine and
    platinum-containing chemotherapy, is indicated for the first-line treatment of
    locally advanced unresectable or metastatic HER2-negative gastric or gastro-oesophageal
    junction adenocarcinoma in adults whose tumours express PD L1 with a CPS ≥ 1 (see
    section 5.1). Biliary tract carcinoma (BTC) Keytruda, in combination with gemcitabine
    and cisplatin, is indicated for the first-line treatment of locally advanced unresectable
    or metastatic biliary tract carcinoma in adults.'
