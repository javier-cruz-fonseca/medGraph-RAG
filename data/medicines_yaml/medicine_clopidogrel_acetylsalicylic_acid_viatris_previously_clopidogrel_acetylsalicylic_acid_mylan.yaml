  therapeutic_indication: '&nbsp;Clopidogrel/Acetylsalicylic acid Viatris is indicated
    for the secondary prevention of atherothrombotic events in adult patients already
    taking both clopidogrel and acetylsalicylic acid (ASA). Clopidogrel/Acetylsalicylic
    acid Viatris is a fixed-dose combination medicinal product for continuation of
    therapy in: - Non-ST segment elevation acute coronary syndrome (unstable angina
    or non-Q-wave myocardial infarction) including patients undergoing a stent placement
    following percutaneous coronary intervention - ST segment elevation acute myocardial
    infarction in medically treated patients eligible for thrombolytic therapy'
