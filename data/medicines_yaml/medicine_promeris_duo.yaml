  therapeutic_indication: For the treatment and prevention of infestations by fleas
    (Ctenocephalides canis and C. felis), and ticks (Ixodes ricinus, Ixodes hexagonus,
    Rhipicephalus sanguineus, Dermacentor reticulatus and Dermacentor variabilis),
    and treatment of demodicosis (caused by Demodex spp.) and lice (Trichodectes canis)
    in dogs. The veterinary medicinal product can be used as part of a treatment strategy
    for flea allergy dermatitis (FAD).
