  therapeutic_indication: 'Previously untreated chronic lymphocytic leukaemia (CLL):
    Arzerra in combination with chlorambucil or bendamustine is indicated for the
    treatment of patients with CLL who have not received prior therapy and who are
    not eligible for fludarabine-based therapy. Relapsed CLL: Arzerra is indicated
    in combination with fludarabine and cyclophosphamide for the treatment of adult
    patients with relapsed CLL. Refractory CLL: Arzerra is indicated for the treatment
    of CLL in patients who are refractory to fludarabine and alemtuzumab.'
