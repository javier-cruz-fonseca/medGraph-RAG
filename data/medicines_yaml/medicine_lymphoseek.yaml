  therapeutic_indication: This medicinal product is for diagnostic use only. Radiolabelled
    Lymphoseek is indicated for imaging and intraoperative detection of sentinel lymph
    nodes draining a primary tumour in adult patients with breast cancer, melanoma,
    or localised squamous cell carcinoma of the oral cavity. External imaging and
    intraoperative evaluation may be performed using a gamma detection device.
