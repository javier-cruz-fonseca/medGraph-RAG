  therapeutic_indication: Columvi in combination with gemcitabine and oxaliplatin
    is indicated for the treatment of adult patients with relapsed or refractory diffuse
    large B-cell lymphoma not otherwise specified (DLBCL NOS) who are ineligible for
    autologous stem cell transplant (ASCT).Columvi as monotherapy is indicated for
    the treatment of adult patients with relapsed or refractory diffuse large B cell
    lymphoma (DLBCL), after two or more lines of systemic therapy.
