  therapeutic_indication: Multaq is indicated for the maintenance of sinus rhythm
    after successful cardioversion in adult clinically stable patients with paroxysmal
    or persistent atrial fibrillation (AF). Due to its safety profile, Multaq should
    only be prescribed after alternative treatment options have been considered. Multaq
    should not be given to patients with left ventricular systolic dysfunction or
    to patients with current or previous episodes of heart failure.
