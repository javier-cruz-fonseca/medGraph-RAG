  therapeutic_indication: Sivextro tablets are indicated for the treatment of acute
    bacterial skin and skin structure infections (ABSSSI) in adults, adolescents and
    children weighing at least 35 kg.Consideration should be given to official guidance
    on the appropriate use of antibacterial agents. Sivextro powder for concentrate
    for solution for infusion is indicated for the treatment of acute bacterial skin
    and skin structure infections (ABSSSI) from birth. Consideration should be given
    to official guidance on the appropriate use of antibacterial agents.
