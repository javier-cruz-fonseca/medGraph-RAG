  therapeutic_indication: 'Cholic Acid FGK is indicated for the treatment of inborn
    errors of primary bile acid synthesis, in infants from one month of age for continuous
    lifelong treatment through adulthood, encompassing the following single enzyme
    defects:  sterol 27-hydroxylase (presenting as cerebrotendinous xanthomatosis,
    CTX) deficiency; 2- (or alpha-) methylacyl-CoA racemase (AMACR) deficiency; cholesterol
    7 alpha-hydroxylase (CYP7A1) deficiency.'
