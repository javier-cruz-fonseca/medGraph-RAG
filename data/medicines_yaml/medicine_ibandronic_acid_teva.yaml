  therapeutic_indication: Ibandronic acid 50mg Ibandronic Acid Teva is indicated for
    the prevention of skeletal events (pathological fractures, bone complications
    requiring radiotherapy or surgery) in patients with breast cancer and bone metastases.
    Ibandronic acid 150mg Treatment of osteoporosis in postmenopausal women at increased
    risk of fracture. A reduction in the risk of vertebral fractures has been demonstrated,
    efficacy on femoral neck fractures has not been established.
