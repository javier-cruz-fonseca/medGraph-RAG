  therapeutic_indication: Viramune 50 mg/5 mL oral suspension and 200 mg tablets Viramune
    is indicated in combination with other anti-retroviral medicinal products for
    the treatment of HIV-1 infected adults, adolescents, and children of any age.Most
    of the experience with Viramune is in combination with nucleoside reverse transcriptase
    inhibitors (NRTIs). The choice of a subsequent therapy after Viramune should be
    based on clinical experience and resistance testing. Viramune 400 mg prolonged-release
    tablets Viramune is indicated in combination with other anti-retroviral medicinal
    products for the treatment of HIV-1 infected adults, adolescents, and children
    three years and above and able to swallow tablets (see section 4.2). Prolonged-release
    tablets are not suitable for the 14-day lead-in phase for patients starting nevirapine.
    Other nevirapine formulations, such as immediate-release tablets or oral suspension
    should be used (see section 4.2). Most of the experience with Viramune is in combination
    with nucleoside reverse transcriptase inhibitors (NRTIs). The choice of a subsequent
    therapy after Viramune should be based on clinical experience and resistance testing
    (see section 5.1).
