  therapeutic_indication: 'Abiraterone Mylan is indicated with prednisone or prednisolone
    for:  the treatment of newly diagnosed high risk metastatic hormone sensitive
    prostate cancer (mHSPC) in adult men in combination with androgen deprivation
    therapy (ADT). the treatment of metastatic castration resistant prostate cancer
    (mCRPC) in adult men who are asymptomatic or mildly symptomatic after failure
    of androgen deprivation therapy in whom chemotherapy is not yet clinically indicated.
    the treatment of mCRPC in adult men whose disease has progressed on or after a
    docetaxel based chemotherapy regimen.'
