  therapeutic_indication: 'Synagis is indicated for the prevention of serious lower-respiratory-tract
    disease requiring hospitalisation caused by respiratory syncytial virus (RSV)
    in children at high risk for RSV disease:  children born at 35 weeks of gestation
    or less and less than six months of age at the onset of the RSV season; children
    less than two years of age and requiring treatment for bronchopulmonary dysplasia
    within the last six months; children less than two years of age and with haemodynamically
    significant congenital heart disease.'
