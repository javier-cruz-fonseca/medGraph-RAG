  therapeutic_indication: Treatment of patients of 18 years and older with chronic
    hepatitis and serum markers for hepatitis C virus (HCV) infection e.g. those who
    have elevated serum transaminase levels without decompensated liver disease and
    who are positive for serum HCV-RNA (see section 4.4). Consideration should be
    given to current official guidance on the appropriate use of interferons for the
    treatment of patients with chronic hepatitis C.Interferon alfacon-1 should be
    given alone mainly in case of intolerance or contraindication to ribavirin.
