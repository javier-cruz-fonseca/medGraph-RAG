  therapeutic_indication: Renal Cell Carcinoma (RCC) Cabometyx is indicated as monotherapy
    for advanced renal cell carcinoma  as first-line treatment of adult patients with
    intermediate or poor risk, in adults following prior vascular endothelial growth
    factor (VEGF)-targeted therapy.  Cabometyx, in combination with nivolumab, is
    indicated for the first-line treatment of advanced renal cell carcinoma in adults.
    Hepatocellular carcinoma (HCC)Cabometyx is indicated as monotherapy for the treatment
    of hepatocellular carcinoma (HCC) in adults who have previously been treated with
    sorafenib.Differentiated thyroid carcinoma (DTC)Cabometyx is indicated as monotherapy
    for the treatment of adult patients with locally advanced or metastatic differentiated
    thyroid carcinoma (DTC), refractory or not eligible to radioactive iodine (RAI)
    who have progressed during or after prior systemic therapy.Neuroendocrine Tumours
    (NET)Cabometyx is indicated for the treatment of adult&nbsp;patients with unresectable
    or metastatic, well differentiated extra-pancreatic (epNET) and pancreatic (pNET)
    neuroendocrine tumours who have progressed following at least one prior systemic
    therapy other than somatostatin analogues.
