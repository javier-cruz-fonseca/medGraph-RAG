  therapeutic_indication: EchoGen is a transpulmonary echocardiographic contrast agent
    for use in patients with suspected or established cardiovascular disease to provide
    opacification of cardiac chambers, enhance left ventricular border delineation
    with resulting improvement in wall motion visualisation. EchoGen should only be
    used in patients where the study without contrast enhancement is inconclusive.
