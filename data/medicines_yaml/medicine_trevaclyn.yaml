  therapeutic_indication: Trevaclyn is indicated for the treatment of dyslipidaemia,
    particularly in patients with combined mixed dyslipidaemia (characterised by elevated
    levels of low-density-lipoprotein (LDL) cholesterol and triglycerides and low
    high-density-lipoprotein (HDL) cholesterol) and in patients with primary hypercholesterolaemia
    (heterozygous familial and non-familial). Trevaclyn should be used in patients
    in combination with 3-hydroxy-3-methyl-glutaryl-co-enzyme-A (HMG-CoA)-reductase
    inhibitors (statins), when the cholesterol-lowering effect of HMG-CoA-reductase-inhibitor
    monotherapy is inadequate. It can be used as monotherapy only in patients in whom
    HMG-CoA-reductase inhibitors are considered inappropriate or not tolerated. Diet
    and other non-pharmacological treatments (e.g. exercise, weight reduction) should
    be continued during therapy with Trevaclyn.
