  therapeutic_indication: LIVTENCITY is indicated for the treatment of cytomegalovirus
    (CMV) infection and/or disease that are refractory (with or without resistance)
    to one or more prior therapies, including ganciclovir, valganciclovir, cidofovir
    or foscarnet in adult patients who have undergone a haematopoietic stem cell transplant
    (HSCT) or solid organ transplant (SOT). Consideration should be given to official
    guidance on the appropriate use of antiviral agents.
