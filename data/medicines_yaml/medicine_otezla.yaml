  therapeutic_indication: Psoriatic arthritisOtezla, alone or in combination with
    Disease Modifying Antirheumatic Drugs (DMARDs), is indicated for the treatment
    of active psoriatic arthritis (PsA) in adult patients who have had an inadequate
    response or who have been intolerant to a prior DMARD therapy.&nbsp;PsoriasisOtezla
    is indicated for the treatment of moderate to severe chronic plaque psoriasis
    (PSOR) in adult patients who failed to respond to or who have a contraindication
    to, or are intolerant to other systemic therapy including cyclosporine, methotrexate
    or psoralen and ultraviolet-A light (PUVA).&nbsp;Paediatric psoriasisOtezla is
    indicated for the treatment of moderate to severe plaque psoriasis in children
    and adolescents from the age of 6 years and weighing at least 20 kg who are candidates
    for systemic therapy.Behçet’s diseaseOtezla is indicated for the treatment of
    adult patients with oral ulcers associated with Behçet’s disease (BD) who are
    candidates for systemic therapy.
