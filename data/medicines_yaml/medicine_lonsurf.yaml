  therapeutic_indication: Colorectal cancer Lonsurf is indicated in combination with
    bevacizumab for the treatment of adult patients with metastatic colorectal cancer
    (CRC) who have received two prior anticancer treatment regimens including fluoropyrimidine-,
    oxaliplatin- and irinotecan-based chemotherapies, anti-VEGF agents, and/or anti-EGFR
    agents. Lonsurf is indicated as monotherapy for the treatment of adult patients
    with metastatic colorectal cancer (CRC) who have been previously treated with,
    or are not considered candidates for, available therapies including fluoropyrimidine-,
    oxaliplatin- and irinotecan-based chemotherapies, anti-VEGF agents, and anti EGFR
    agents Gastric cancer Lonsurf is indicated as monotherapy for the treatment of
    adult patients with metastatic gastric cancer including adenocarcinoma of the
    gastroesophageal junction, who have been previously treated with at least two
    prior systemic treatment regimens for advanced disease.
