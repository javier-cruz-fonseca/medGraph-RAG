  therapeutic_indication: Rozlytrek as monotherapy is indicated for the treatment
    of adult and paediatric patients 12 years of age and older with solid tumours
    expressing a neurotrophic tyrosine receptor kinase (NTRK) gene fusion,  who have
    a disease that is locally advanced, metastatic or where surgical resection is
    likely to result in severe morbidity, and who have not received a prior NTRK inhibitor
    who have no satisfactory treatment options.  Rozlytrek as monotherapy is indicated
    for the treatment of adult patients with ROS1 positive, advanced non small cell
    lung cancer (NSCLC) not previously treated with ROS1 inhibitors.
