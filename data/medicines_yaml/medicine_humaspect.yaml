  therapeutic_indication: After reconstitution with sodium pertechnetate [99mTc] solution,
    HumaSPECT [99mTc] is indicated in patients with histologically proven carcinoma
    of the colon or rectum for imaging of recurrence and/or metastases. HumaSPECT
    [99mTc] is employed, in the above mentioned patients, as an adjunct to standard
    non invasive imaging techniques, such as ultrasonography or CT scan, in the following
    situations.• Patients with evidence of recurrence and/or metastatic carcinoma
    of the colon or rectum, who are undergoing an evaluation for extent of disease,
    such as prior to surgical resection and/or other therapy.• Patients with suspected
    recurrence and/or metastatic carcinoma of the colon or rectum in association with
    rising levels of carcinoembryonic antigen (CEA).
