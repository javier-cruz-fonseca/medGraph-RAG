  therapeutic_indication: 'Treatment of pulmonary arterial hypertension (PAH) to improve
    exercise capacity and symptoms in patients with World Health Organization (WHO)
    functional class III. Efficacy has been shown in:  primary (idiopathic and familial)
    PAH; PAH secondary to scleroderma without significant interstitial pulmonary disease;
    PAH associated with congenital systemic-to-pulmonary shunts and Eisenmenger’s
    physiology.  Some improvements have also been shown in patients with PAH WHO functional
    class II. Stayveer is also indicated to reduce the number of new digital ulcers
    in patients with systemic sclerosis and ongoing digital-ulcer disease.'
