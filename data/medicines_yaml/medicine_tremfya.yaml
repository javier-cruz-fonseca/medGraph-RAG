  therapeutic_indication: Adult plaque psoriasisTremfya is indicated for the treatment
    of moderate to severe plaque psoriasis in adults who are candidates for systemic
    therapy.  Paediatric plaque psoriasisTremfya is indicated for the treatment of
    moderate to severe plaque psoriasis in children and adolescents from the age of
    6 years who are candidates for systemic therapy.&nbsp;  Psoriatic arthritisTremfya,
    alone or in combination with methotrexate (MTX), is indicated for the treatment
    of active psoriatic arthritis in adult patients who have had an inadequate response
    or who have been intolerant to a prior disease-modifying antirheumatic drug (DMARD)
    therapy.Ulcerative colitisTremfya is indicated for the treatment of adult patients
    with moderately to severely active ulcerative colitis who have had an inadequate
    response, lost response, or were intolerant to either conventional therapy, or
    a biologic treatment.Crohn’s diseaseTremfya is indicated for the treatment of
    adult patients with moderately to severely active Crohn’s disease who have had
    an inadequate response, lost response, or were intolerant to either conventional
    therapy or a biologic treatment.
