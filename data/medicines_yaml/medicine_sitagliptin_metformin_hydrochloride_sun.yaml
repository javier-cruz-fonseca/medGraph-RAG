  therapeutic_indication: 'For adult patients with type 2 diabetes mellitus: Sitagliptin/Metformin
    hydrochloride SUN is indicated as an adjunct to diet and exercise to improve glycaemic
    control in patients inadequately controlled on their maximal tolerated dose of
    metformin alone or those already being treated with the combination of sitagliptin
    and metformin. Sitagliptin/Metformin hydrochloride SUN is indicated in combination
    with a sulphonylurea (i.e., triple combination therapy) as an adjunct to diet
    and exercise in patients inadequately controlled on their maximal tolerated dose
    of metformin and a sulphonylurea. Sitagliptin/Metformin hydrochloride SUN is indicated
    as triple combination therapy with a peroxisome proliferator-activated receptor
    gamma (PPAR?) agonist (i.e., a thiazolidinedione) as an adjunct to diet and exercise
    in patients inadequately controlled on their maximal tolerated dose of metformin
    and a PPAR? agonist. Sitagliptin/Metformin hydrochloride SUN is also indicated
    as add-on to insulin (i.e., triple combination therapy) as an adjunct to diet
    and exercise to improve glycaemic control in patients when stable dose of insulin
    and metformin alone do not provide adequate glycaemic control.'
