  therapeutic_indication: Retsevmo as monotherapy is indicated for the treatment of
    adults with:&nbsp;– advanced RET fusion positive non small cell lung cancer (NSCLC)
    not previously treated with a RET inhibitor– advanced RET fusion positive solid
    tumours, when treatment options not targeting RET provide limited clinical benefit,
    or have been exhausted (see sections 4.4 and 5.1)Retsevmo as monotherapy is indicated
    for the treatment of adults and adolescents 12 years and older with:– advanced
    RET fusion positive thyroid cancer who are radioactive iodine-refractory (if radioactive
    iodine is appropriate)– advanced RET mutant medullary thyroid cancer (MTC)
