  therapeutic_indication: Caprelsa is indicated for the treatment of aggressive and
    symptomatic medullary thyroid cancer (MTC) in patients with unresectable locally
    advanced or metastatic disease. Caprelsa is indicated in adults, children and
    adolescents aged 5 years and older. For patients in whom re-arranged-during-transfection(RET)
    mutation is not known or is negative, a possible lower benefit should be taken
    into account before individual treatment decision.
