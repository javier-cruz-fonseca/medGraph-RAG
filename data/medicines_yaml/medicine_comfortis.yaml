  therapeutic_indication: Treatment and prevention of flea infestations (Ctenocephalides
    felis). The preventive effect against re-infestations is a result of the adulticidal
    activity and the reduction in egg production and persists for up to 4 weeks after
    a single administration of the product. The veterinary medicinal product can be
    used as part of a treatment strategy for the control of flea allergy dermatitis
    (FAD).
