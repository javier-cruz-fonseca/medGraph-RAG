  therapeutic_indication: Myelofibrosis (MF)Jakavi is indicated for the treatment
    of disease related splenomegaly or symptoms in adult patients with primary myelofibrosis
    (also known as chronic idiopathic myelofibrosis), post polycythaemia vera myelofibrosis
    or post essential thrombocythaemia myelofibrosis.Polycythaemia vera (PV)Jakavi
    is indicated for the treatment of adult patients with polycythaemia vera who are
    resistant to or intolerant of hydroxyurea.Graft versus host disease (GvHD)Acute
    GvHDJakavi is indicated for the treatment of adults and paediatric patients aged
    28 days and older with acute graft versus host disease who have inadequate response
    to corticosteroids or other systemic therapies (see section 5.1).Chronic GvHDJakavi
    is indicated for the treatment of adults and paediatric patients aged 6 months
    and older with chronic graft versus host disease who have inadequate response
    to corticosteroids or other systemic therapies (see section 5.1). Myelofibrosis
    (MF)Jakavi is indicated for the treatment of disease related splenomegaly or symptoms
    in adult patients with primary myelofibrosis (also known as chronic idiopathic
    myelofibrosis), post polycythaemia vera myelofibrosis or post essential thrombocythaemia
    myelofibrosis.Polycythaemia vera (PV)Jakavi is indicated for the treatment of
    adult patients with polycythaemia vera who are resistant to or intolerant of hydroxyurea.Graft
    versus host disease (GvHD)Acute GvHDJakavi is indicated for the treatment of adults
    and paediatric patients aged 28 days and older with acute graft versus host disease
    who have inadequate response to corticosteroids or other systemic therapies (see
    section 5.1).Chronic GvHDJakavi is indicated for the treatment of adults and paediatric
    patients aged 6 months and older with chronic graft versus host disease who have
    inadequate response to corticosteroids or other systemic therapies (see section
    5.1).
