  therapeutic_indication: 'Azacitidine betapharm is indicated for the treatment of
    adult patients who are not eligible for haematopoietic stem cell transplantation
    (HSCT) with:  intermediate-2 and high-risk myelodysplastic syndromes (MDS) according
    to the International Prognostic Scoring System (IPSS), chronic myelomonocytic
    leukaemia (CMML) with 10 % to 29 % marrow blasts without myeloproliferative disorder,
    acute myeloid leukaemia (AML) with 20 % to 30 % blasts and multi-lineage dysplasia,
    according to World Health Organization (WHO) classification, AML with &gt; 30
    % marrow blasts according to the WHO classification.'
