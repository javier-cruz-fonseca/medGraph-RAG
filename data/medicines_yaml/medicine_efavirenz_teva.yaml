  therapeutic_indication: Efavirenz is indicated in antiviral combination treatment
    of human-immunodeficiency-virus-1 (HIV-1)-infected adults, adolescents and children
    3 years of age and older. Efavirenz has not been adequately studied in patients
    with advanced HIV disease, namely in patients with CD4 counts &lt; 50 cells/mm3,
    or after failure of protease inhibitor (PI)-containing regimens. Although cross-resistance
    of efavirenz with protease inhibitors (PIs) has not been documented, there are
    at present insufficient data on the efficacy of subsequent use of PI-based combination
    therapy after failure of regimens containing efavirenz.
