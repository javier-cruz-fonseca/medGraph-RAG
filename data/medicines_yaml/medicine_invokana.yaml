  therapeutic_indication: Invokana is indicated for the treatment of adults and children
    aged 10 years and older with insufficiently controlled type 2 diabetes mellitus
    as an adjunct to diet and exercise:&nbsp;  as monotherapy when metformin is considered
    inappropriate due to intolerance or contraindications in addition to other medicinal
    products for the treatment of diabetes.  For study results with respect to combination
    of therapies, effects on glycaemic control, cardiovascular and renal events, and
    the populations studied, see sections 4.4, 4.5 and 5.1.
