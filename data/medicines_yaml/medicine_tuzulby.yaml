  therapeutic_indication: Tuzulby is indicated as part of a comprehensive treatment
    programme for attention-deficit / hyperactivity disorder (ADHD) in children and
    adolescents 6-17 years old when remedial measures alone prove insufficient. Treatment
    must be under the supervision of a specialist in childhood behavioural disorders.
    Diagnosis should be made according to Diagnostic and Statistical Manual of Mental
    Disorders Fourth Edition (DSM-IV) criteria or the guidelines in International
    Classification of Diseases, Tenth Revision (ICD-10) and should be based on a complete
    history and evaluation of the patient. Diagnosis cannot be made solely on the
    presence of one or more symptoms.
