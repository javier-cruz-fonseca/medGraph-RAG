  therapeutic_indication: 'Vylaer Spiromax is indicated in adults 18 years of age
    and older only. AsthmaVylaer Spiromax is indicated in the regular treatment of
    asthma, where use of a combination (inhaled corticosteroid and long-acting ?2
    adrenoceptor agonist) is appropriate:  in patients not adequately controlled with
    inhaled corticosteroids and “as needed” inhaled short-acting ?2 adrenoceptor agonists.or
    in patients already adequately controlled on both inhaled corticosteroids and
    long-acting ?2 adrenoceptor agonists.  COPDSymptomatic treatment of patients with
    severe COPD (FEV1 &lt; 50% predicted normal) and a history of repeated exacerbations,
    who have significant symptoms despite regular therapy with long-acting bronchodilators.'
