  therapeutic_indication: Adult patients Plerixafor Accord is indicated in combination
    with granulocyte-colony stimulating factor (G-CSF) to enhance mobilisation of
    haematopoietic stem cells to the peripheral blood for collection and subsequent
    autologous transplantation in adult patients with lymphoma or multiple myeloma
    whose cells mobilise poorly (see section 4.2). Paediatric patients (1 to less
    than 18 years) Plerixafor Accord is indicated in combination with G-CSF to enhance
    mobilisation of haematopoietic stem cells to the peripheral blood for collection
    and subsequent autologous transplantation in children with lymphoma or solid malignant
    tumours, either:- pre-emptively, when circulating stem cell count on the predicted
    day of collection after adequate mobilization with G-CSF (with or without chemotherapy)
    is expected to be insufficient with regards to desired hematopoietic stem cells
    yield, or- who previously failed to collect sufficient haematopoietic stem cells
    (see section 4.2).
