  therapeutic_indication: Emtriva is indicated for the treatment of HIV-1 infected
    adults and children in combination with other antiretroviral agents. This indication
    is based on studies in treatment-naive patients and treatment-experienced patients
    with stable virological control. There is no experience of the use of Emtriva
    in patients who are failing their current regimen or who have failed multiple
    regimens. When deciding on a new regimen for patients who have failed an antiretroviral
    regimen, careful consideration should be given to the patterns of mutations associated
    with different medicinal products and the treatment history of the individual
    patient. Where available, resistance testing may be appropriate.
