  therapeutic_indication: 'Deferasirox Mylan is indicated for  the treatment of chronic
    iron overload due to frequent blood transfusions (?7 ml/kg/month of packed red
    blood cells) in patients with beta thalassaemia major aged 6 years and older the
    treatment of chronic iron overload due to blood transfusions when deferoxamine
    therapy is contraindicated or inadequate in the following patient groups:  in
    paediatric patients with beta thalassaemia major with iron overload due to frequent
    blood transfusions (?7 ml/kg/month of packed red blood cells) aged 2 to 5 years,
    in adult and paediatric patients with beta thalassaemia major with iron overload
    due to infrequent blood transfusions (&lt;7 ml/kg/month of packed red blood cells)
    aged 2 years and older, in adult and paediatric patients with other anaemias aged
    2 years and older.   the treatment of chronic iron overload requiring chelation
    therapy when deferoxamine therapy is contraindicated or inadequate in patients
    with non-transfusion dependent thalassaemia syndromes aged 10 years and older.'
