  therapeutic_indication: 'Treatment of the following parasites:  Gastrointestinal
    Roundworms (Adult and L4):  - Ostertagia ostertagi/lyrata, Cooperia oncophora/surnabada,
    C. punctata, Haemonchus contortus, Trichostrongylus axei, T. colubriformis, Bunostomum
    phlebotomum, Nematodirus helvetianus, Oesophagostomum radiatum  Lungworm (Adults
    and L4):  - Dictyocaulus viviparus  Warbles (parasitic stages):  - Hypoderma bovis,
    H. lineatum  Mange mites:  - Sarcoptes scabiei var.  Bovis Lice: Linognathus vituli,
    Haematopinus eurysternus, Solenoptes capillatus  Horn flies: Haematobia irritans
    Prevention of reinfections with the following parasites:    - Dictyocaulus viviparus,
    Ostertagia ostertagi/lyrata, Trichostrongylus colubriformis, Haemonchus contortus,
    and Bunostomum phlebotomum; - Oesophagostomum radiatum, Cooperia oncophora/surnabada,
    C. punctata and Trichostrongylus axei.'
