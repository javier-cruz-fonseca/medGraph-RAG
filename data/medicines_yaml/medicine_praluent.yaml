  therapeutic_indication: 'Primary hypercholesterolaemia and mixed dyslipidaemia Praluent
    is indicated in adults with primary hypercholesterolaemia (heterozygous familial
    and non-familial) or mixed dyslipidaemia, and in paediatric patients 8 years of
    age and older with heterozygous familial hypercholesterolaemia (HeFH) as an adjunct
    to diet: - in combination with a statin or statin with other lipid lowering therapies
    in patients unable to reach LDL-C goals with the maximum tolerated dose of a statin
    or, - alone or in combination with other lipid-lowering therapies in patients
    who are statin-intolerant, or for whom a statin is contraindicated. Established
    atherosclerotic cardiovascular disease Praluent is indicated in adults with established
    atherosclerotic cardiovascular disease to reduce cardiovascular risk by lowering
    LDL-C levels, as an adjunct to correction of other risk factors: - in combination
    with the maximum tolerated dose of a statin with or without other lipid-lowering
    therapies or, - alone or in combination with other lipid-lowering therapies in
    patients who are statin-intolerant, or for whom a statin is contraindicated. For
    study results with respect to effects on LDL-C, cardiovascular events and populations
    studied see section 5.1.'
