  therapeutic_indication: 'Stivarga is indicated as monotherapy for the treatment
    of adult patients with:  metastatic colorectal cancer (CRC) who have been previously
    treated with, or are not considered candidates for, available therapies - these
    include fluoropyrimidine-based chemotherapy, an anti-VEGF therapy and an anti-EGFR
    therapy; unresectable or metastatic gastrointestinal stromal tumors (GIST) who
    progressed on or are intolerant to prior treatment with imatinib and sunitinib;
    hepatocellular carcinoma (HCC) who have been previously treated with sorafenib.'
