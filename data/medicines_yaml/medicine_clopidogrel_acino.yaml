  therapeutic_indication: 'Clopidogrel is indicated in adults for the prevention of
    atherothrombotic events in:  Patients suffering from myocardial infarction (from
    a few days until less than 35 days), ischaemic stroke (from 7 days until less
    than 6 months) or established peripheral arterial disease Non-ST segment elevation
    acute coronary syndrome (unstable angina or non-Q-wave myocardial infarction),
    including patients undergoing a stent placement following percutaneous coronary
    intervention, in combination with acetylsalicylic acid (ASA) ST segment elevation
    acute myocardial infarction, in combination with ASA in medically treated patients
    eligible for thrombolytic therapy Patients suffering from acute coronary syndrome.'
