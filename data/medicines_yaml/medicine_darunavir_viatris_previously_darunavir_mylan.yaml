  therapeutic_indication: 'Darunavir, co-administered with low dose ritonavir is indicated
    in combination with other antiretroviral medicinal products for the treatment
    of patients with human immunodeficiency virus (HIV-1) infection (see section 4.2).
    Darunavir Viatris 75 mg, 150 mg, 300 mg and 600 mg tablets may be used to provide
    suitable dose regimens (see section 4.2):  For the treatment of HIV-1 infection
    in antiretroviral treatment (ART)-experienced adult patients, including those
    that have been highly pre-treated. For the treatment of HIV-1 infection in paediatric
    patients from the age of 3 years and at least 15 kg body weight.  In deciding
    to initiate treatment with darunavir co-administered with low dose ritonavir,
    careful consideration should be given to the treatment history of the individual
    patient and the patterns of mutations associated with different agents. Genotypic
    or phenotypic testing (when available) and treatment history should guide the
    use of darunavir (see sections 4.2, 4.4 and 5.1). Darunavir co-administered with
    low dose ritonavir is indicated in combination with other antiretroviral medicinal
    products for the treatment of patients with human immunodeficiency virus (HIV-1)
    infection.&nbsp; Darunavir co-administered with cobicistat is indicated in combination
    with other antiretroviral medicinal products for the treatment of human immunodeficiency
    virus (HIV-1) infection in adults and adolescents (aged 12 years and older, weighing
    at least 40 kg) (see section 4.2).&nbsp; Darunavir Viatris 400 mg and 800 mg tablets
    may be used to provide suitable dose regimens for the treatment of HIV-1 infection
    in adult and paediatric patients from the age of 3 years and at least 40 kg body
    weight who are:&nbsp;  antiretroviral therapy (ART)-naïve (see section 4.2).&nbsp;
    ART-experienced with no darunavir resistance associated mutations (DRV-RAMs) and
    who have plasma HIV-1 RNA &lt; 100,000 copies/ml and CD4+ cell count ? 100 cells
    x 10?/L. In deciding to initiate treatment with darunavir in such ART-experienced
    patients, genotypic testing should guide the use of darunavir (see sections 4.2,
    4.3, 4.4 and 5.1).'
