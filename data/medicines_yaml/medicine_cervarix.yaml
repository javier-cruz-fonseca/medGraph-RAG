  therapeutic_indication: Cervarix is a vaccine for use from the age of 9 years for
    the prevention of premalignant ano-genital lesions (cervical, vulvar, vaginal
    and anal) and cervical and anal cancers causally related to certain oncogenic
    Human Papillomavirus (HPV) types. See sections 4.4 and 5.1 for important information
    on the data that support this indication. The use of Cervarix should be in accordance
    with official recommendations.
