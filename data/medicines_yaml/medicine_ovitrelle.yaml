  therapeutic_indication: 'Ovitrelle is indicated in the treatment of:  women undergoing
    superovulation prior to assisted reproductive techniques such as in vitro fertilisation
    (IVF): Ovitrelle is administered to trigger final follicular maturation and luteinisation
    after stimulation of follicular growth; anovulatory or oligo-ovulatory women:
    Ovitrelle is administered to trigger ovulation and luteinisation in anovulatory
    or oligo-ovulatory patients after stimulation of follicular growth.'
