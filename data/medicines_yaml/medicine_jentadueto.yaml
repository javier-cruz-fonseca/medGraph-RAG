  therapeutic_indication: 'Treatment of adult patients with type-2 diabetes mellitus:  Jentadueto
    is indicated as an adjunct to diet and exercise to improve glycaemic control in
    adult patients inadequately controlled on their maximal tolerated dose of metformin
    alone, or those already being treated with the combination of linagliptin and
    metformin. Jentadueto is indicated in combination with a sulphonylurea (i.e. triple
    combination therapy) as an adjunct to diet and exercise in adult patients inadequately
    controlled on their maximal tolerated dose of metformin and a sulphonylurea.'
