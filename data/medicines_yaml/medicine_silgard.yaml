  therapeutic_indication: 'Silgard is a vaccine for use from the age of 9 years for
    the prevention of:  premalignant genital lesions (cervical, vulvar and vaginal),
    premalignant anal lesions, cervical cancers and anal cancers causally related
    to certain oncogenic Human Papillomavirus (HPV) types; genital warts (condyloma
    acuminata) causally related to specific HPV types.  See sections 4.4 and 5.1 for
    important information on the data that support this indication. The use of Silgard
    should be in accordance with official recommendations.'
