  therapeutic_indication: Abraxane monotherapy is indicated for the treatment of metastatic
    breast cancer in adult patients who have failed first-line treatment for metastatic
    disease and for whom standard, anthracycline containing therapy is not indicated.
    Abraxane in combination with gemcitabine is indicated for the first-line treatment
    of adult patients with metastatic adenocarcinoma of the pancreas. Abraxane in
    combination with carboplatin is indicated for the first-line treatment of non-small
    cell lung cancer in adult patients who are not candidates for potentially curative
    surgery and/or radiation therapy.
