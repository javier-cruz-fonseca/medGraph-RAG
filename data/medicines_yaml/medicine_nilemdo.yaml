  therapeutic_indication: Hypercholesterolaemia and mixed dyslipidaemiaNilemdo is
    indicated in adults with primary hypercholesterolaemia (heterozygous familial
    and non familial) or mixed dyslipidaemia, as an adjunct to diet:• in combination
    with a statin or statin with other lipid-lowering therapies in patients unable
    to reach LDL C goals with the maximum tolerated dose of a statin (see sections
    4.2, 4.3, and 4.4) or,• alone or in combination with other lipid-lowering therapies
    in patients who are statin intolerant, or for whom a statin is contraindicated.Cardiovascular
    diseaseNilemdo is indicated in adults with established or at high risk for atherosclerotic
    cardiovascular disease to reduce cardiovascular risk by lowering LDL-C levels,
    as an adjunct to correction of other risk factors:• in patients on a maximum tolerated
    dose of a statin with or without ezetimibe or,• alone or in combination with ezetimibe
    in patients who are statin-intolerant, or for whom a statin is contraindicated.For
    study results with respect to effects on LDL-C, cardiovascular events and populations
    studied see section 5.1.
