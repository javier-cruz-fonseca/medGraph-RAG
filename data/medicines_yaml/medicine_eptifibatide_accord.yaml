  therapeutic_indication: Eptifibatide Accord is intended for use with acetylsalicylic
    acid and unfractionated heparin. Eptifibatide Accord is indicated for the prevention
    of early myocardial infarction in adults presenting with unstable angina or non-Q-wave
    myocardial infarction, with the last episode of chest pain occurring within 24
    hours and with electrocardiogram (ECG) changes and/or elevated cardiac enzymes.
    Patients most likely to benefit from Eptifibatide Accord treatment are those at
    high risk of developing myocardial infarction within the first 3-4 days after
    onset of acute angina symptoms including for instance those that are likely to
    undergo an early PTCA (Percutaneous Transluminal Coronary Angioplasty).
