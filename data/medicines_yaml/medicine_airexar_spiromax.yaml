  therapeutic_indication: 'Airexar Spiromax is indicated for use in adults aged 18
    years and older only. AsthmaAirexar Spiromax is indicated for the regular treatment
    of patients with severe asthma where use of a combination product (inhaled corticosteroid
    and long-acting ?2 agonist) is appropriate: - patients not adequately controlled
    on a lower strength corticosteroid combination product or - patients already controlled
    on a high dose inhaled corticosteroid and long-acting ?2 agonist. Chronic Obstructive
    Pulmonary Disease (COPD)Airexar Spiromax is indicated for the symptomatic treatment
    of patients with COPD, with a FEV1 &lt;60% predicted normal (pre-bronchodilator)
    and a history of repeated exacerbations, who have significant symptoms despite
    regular bronchodilator therapy.'
