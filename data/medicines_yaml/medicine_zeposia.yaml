  therapeutic_indication: Multiple sclerosis  Zeposia is indicated for the treatment
    of adult patients with relapsing remitting multiple sclerosis (RRMS) with active
    disease as defined by clinical or imaging features.  Ulcerative colitis  Zeposia
    is indicated for the treatment of adult patients with moderately to severely active
    ulcerative colitis (UC) who have had an inadequate response, lost response, or
    were intolerant to either conventional therapy or a biologic agent.
