name: Tecartus
basic_information:
  category: Human
  ema_product_number: EMEA/H/C/005102
  medicine_status: Authorised
  opinion_status: ''
  inn_common_name: brexucabtagene autoleucel
  active_substance: autologous peripheral blood T cells CD4 and CD8 selected and CD3
    and CD28 activated transduced with retroviral vector expressing anti-CD19 CD28/CD3-zeta
    chimeric antigen receptor and cultured (brexucabtagene autoleucel)
therapeutic_information:
  therapeutic_area_mesh: Lymphoma, Mantle-Cell
  atc_code_human: L01X
  atcvet_code_veterinary: ''
  pharmacotherapeutic_group_human: ''
  pharmacotherapeutic_group_veterinary: ''
  species_veterinary: ''
  therapeutic_indication: Mantle cell lymphoma Tecartus is indicated for the treatment
    of adult patients with relapsed or refractory mantle cell lymphoma (MCL) after
    two or more lines of systemic therapy including a Bruton’s tyrosine kinase (BTK)
    inhibitor. Acute lymphoblastic leukaemia Tecartus is indicated for the treatment
    of adult patients 26 years of age and above with relapsed or refractory B-cell
    precursor acute lymphoblastic leukaemia (ALL).
